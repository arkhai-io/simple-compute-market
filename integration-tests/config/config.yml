# config.yml
# ---------------------------------------------------------------------------
# Environment-level configuration file.
# Placed (or mounted) in the directory pointed to by CONFIG_DIRECTORY.
# Profile-specific overrides go in config-<profileName>.yml files in the
# same directory.  Sensitive values (private keys) are injected by
# Kubernetes secrets / Vault into config-<profileName>.yml at deploy time.
# ---------------------------------------------------------------------------

rpc:
  url: # injected from environment profile file
  chain_id: # injected from environment profile file
  timeout_seconds: 30
  retry_attempts: 3
  retry_backoff_seconds: 2

registry: # injected from environment profile file
  api_url:
  identity_address:
  reputation_address:
  validation_address:
  owner_address:

buyer: 
  api_url:           "" # injected from environment profile file
  base_url_override: "" # agent's BASE_URL_OVERRIDE; used as resource_id in create_order auth. Defaults to api_url if unset.
  private_key:       "" # injected from secret profile file
  wallet_address:    ""

seller: 
  api_url:           "" # injected from environment profile file
  base_url_override: "" # agent's BASE_URL_OVERRIDE; used as resource_id in create_order auth. Defaults to api_url if unset.
  private_key:       "" # injected from secret profile file
  wallet_address:    ""

tests:
  minimum_eth_balance: "0.01"
  gas_price_strategy: "medium"
  require_checksummed_addresses: true
  order_create_timeout: 30 #time in seconds
  order_match_timeout: 60
  order_close_timeout: 30
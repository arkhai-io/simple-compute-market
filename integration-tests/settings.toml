# settings.toml — base dynaconf configuration
# Values here serve as defaults and documentation of all supported keys.
# Override via: config.yml, config-<profile>.yml, env vars, or CLI args.

[default]

# ---------------------------------------------------------------------------
# RPC / chain connection
# ---------------------------------------------------------------------------
[default.rpc]
url = "http://localhost:8545"
chain_id = 31337          # Hardhat / Anvil default; override per environment
timeout_seconds = 30
retry_attempts = 3
retry_backoff_seconds = 2

# ---------------------------------------------------------------------------
# Registry contract addresses
# ---------------------------------------------------------------------------
[default.registry]
api_url            = ""
identity_address   = ""
reputation_address = ""
validation_address = ""
owner_address      = ""

# ---------------------------------------------------------------------------
# Buyer wallet
# ---------------------------------------------------------------------------
[default.buyer]
api_url           = ""
base_url_override = ""
private_key       = ""
wallet_address    = ""

# ---------------------------------------------------------------------------
# Seller wallet
# ---------------------------------------------------------------------------
[default.seller]
api_url           = ""
base_url_override = ""
private_key       = ""
wallet_address    = ""
agent_id          = ""        # ERC-8004 canonical ID; used as X-Agent-ID for provisioning auth
admin_api_key     = ""        # X-Admin-Key for /admin/* and admin-only resource endpoints

# ---------------------------------------------------------------------------
# Agent / registry endpoints (e2e tests)
# ---------------------------------------------------------------------------
[default.agents]
registry_url = ""
buyer_url = ""
seller_url = ""
buyer_db = ""
seller_db = ""
buyer_env = ""
seller_env = ""

# ---------------------------------------------------------------------------
# Test behaviour
# ---------------------------------------------------------------------------
[default.tests]
minimum_eth_balance = "0.01"          # ETH — wallets must hold at least this
gas_price_strategy  = "medium"        # low | medium | high
require_checksummed_addresses = true
order_create_timeout = 30             #time in seconds
order_match_timeout = 60
order_close_timeout = 30
e2e_poll_timeout_s = 120
e2e_poll_interval_s = 3

# ---------------------------------------------------------------------------
# Provisioning service
# ---------------------------------------------------------------------------
[default.provisioning]
api_url = ""
enable_auth = false

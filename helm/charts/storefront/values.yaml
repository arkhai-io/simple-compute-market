# Default values for the storefront subchart.
# Overridden by the parent chart's storefront: block in helm/values.yaml.
# Values sourced from global (rpc, registry addresses) are injected in
# the templates and do not appear here.

image:
  repository: ""
  name: arkhai
  tag: storefront
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Storefront agent(s). The list models per-process identity, not role —
# only sellers run a storefront, so the typical deploy has one entry.
# Operators running multiple seller identities on one cluster (sharded
# by region, by hardware fleet, etc.) add more entries. Buyers do not
# appear here at all: the buyer-side surface is the `market` CLI, run
# as a one-shot client process (or a Job for E2E tests).
#
# Each entry renders one Deployment + Service + Secret. The Secret holds
# the rendered storefront.toml mounted at /etc/arkhai/storefront.toml.
# ---------------------------------------------------------------------------
agents:
  - name: bob
    port: 8001
    component: seller
    # agentId: the numeric on-chain agent ID assigned at first registration.
    # Leave empty on first deploy — the service will register automatically
    # (requires autoRegister: true) and print the assigned ID in the logs.
    # Pin this value after first registration to skip re-registration on
    # subsequent deploys and to guard against accidental new registrations.
    agentId: ""
    # autoRegister: controls behaviour when agentId is not set.
    #   true  → register at startup (default; safe for first deploys).
    #   false → crash loudly if agentId is missing. Use this once an agent
    #           has been registered to prevent a misconfigured deploy from
    #           silently minting a new on-chain identity.
    autoRegister: true
    secret:
      createSecret: true
      secretName: ""   # auto-generated as {fullname}-{name} when empty
      privKey: "0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a"
      walletAddress: "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"
      # Compute resource inventory as raw CSV content. Injected at startup
      # when the resources table is empty (idempotent — skipped on restart
      # if resources are already present). Use make deploy with
      # RESOURCES_CSV_FILE=/path/to/resources.csv to set this via --set-file.
      # Leave empty to start with no inventory (seed via the import API later).
      resourcesCsvInline: ""
    # config.* lands in the rendered storefront.toml. Keys map 1:1 to the
    # storefront schema in market_storefront.utils.config (which reads top-level
    # keys + [provisioning] / [negotiation] / [pricing] sections — no [seller] prefix).
    config:
      seller:
        agentId: bob
        # base_url, provisioning.serviceUrl: composed by the chart from
        # the agent's Service DNS / global.provisioning.* — explicit
        # overrides go here only when the cluster topology demands
        # something different.
        # dbPath: location of the SQLite agent.db. Defaults to the
        # per-agent PVC mount at /var/lib/arkhai/agent.db (see persistence
        # block below). Override only when pointing the agent at an
        # external volume or for local-only setups.
        dbPath: "/var/lib/arkhai/agent.db"
        logFilePath: "./logs/bob.log"
        # Path to the bundled compute resource inventory CSV. The file is
        # included in the container image at this path. Set to "" to disable
        # auto-seeding (resources must be imported manually or via a ConfigMap).
        resourcesCsvPath: "/app/src/market_storefront/data/kvm1-machine.csv"
        sshPublicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDemoPublicKeyForComputeAccess bob@example.com"
        enableEventQueue: false
        provisioning:
          mode: "mock"
        negotiation:
          # Ordered list of policies. Terminal policy is "bisection" (no
          # ML deps) or "rl" (torch + checkpoint). The legacy `policyMode`
          # key still works (rendered as `policy_mode = "<value>"`) and the
          # storefront synthesizes the default chain from it.
          policies:
            - "has_matching_inventory_guard"
            - "escrow_shape_guard"
            - "bisection"
        # Runtime credentials the agent reads. Empty = absent in TOML.
        integrations:
          geminiApiKey: ""
      chain:
        name: "anvil"

# Number of replicas per agent.
replicaCount: 1

# Resource requests/limits – tune per environment.
resources: {}
#  requests:
#    cpu: 100m
#    memory: 128Mi
#  limits:
#    cpu: 500m
#    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Persistence — per-agent ReadWriteOnce PVC backing the SQLite agent.db.
#
# Without this, the SQLite file lives on the container's writable overlay
# and is lost on every pod restart (rolling updates, OOM kills, node
# drains). With persistence.enabled=true, each agent gets its own PVC
# mounted at /var/lib/arkhai and the chart pins the Deployment to a
# Recreate strategy so the RWO volume can detach cleanly across rollouts.
#
# enabled: false falls back to an emptyDir mount at the same path so
# kind/CI and local-iteration setups without a StorageClass keep working
# (state still ephemeral). dbPath in config above should match the mount
# point either way.
#
# storageClass: empty string uses the cluster's default StorageClass.
# Set explicitly when the cluster has multiple classes or you want a
# specific one (e.g. "standard-rwo" on GKE, "gp3" on EKS).
#
# accessMode: ReadWriteOnce only — multi-attach RWO would corrupt SQLite.
# A single-replica constraint is enforced via the Recreate strategy and
# replicaCount above.
#
# The PVC carries helm.sh/resource-policy: keep so `helm uninstall` does
# not reap the volume. Reinstalling the release rebinds the existing
# PVC and recovers prior state.
# ---------------------------------------------------------------------------
persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessMode: ReadWriteOnce
  # Where the PVC mounts inside the pod. dbPath above must point at a
  # file under this directory; the chart does not enforce this — it's
  # the operator's responsibility to keep the two aligned.
  mountPath: /var/lib/arkhai

# ---------------------------------------------------------------------------
# zerotierEnabled: controls whether ZeroTier networking infrastructure is
# included in the pod spec (NET_ADMIN/SYS_MODULE capabilities and the
# /dev/net/tun hostPath volume).
#
# true  (default) — full ZeroTier support; required for peer-to-peer overlay
#                   networking between seller and buyer agents.
# false           — ZeroTier daemon still starts via entrypoint.sh (fail-soft)
#                   but the pod requests no privileged capabilities and mounts
#                   no hostPath volumes. Use for GKE Autopilot or any
#                   environment where the agent is reachable via an API gateway
#                   rather than a ZeroTier overlay network.
#
# The application runtime is unaffected when zerotier_network is unset
# in storefront.toml — all ZeroTier code paths are conditional on that value.
# ---------------------------------------------------------------------------
zerotierEnabled: true

{{/*
Per-agent Secret. Holds the rendered config.toml (which itself contains
the wallet keys), so consumers mount one file at $XDG_CONFIG_HOME/arkhai/
config.toml. We use a Secret rather than a ConfigMap because the TOML
contains the wallet private key.

Also emits a `config-{component}-secret.yml` key that the integration-
test pod consumes via dynaconf profile loading. That side keeps the YAML
shape — the typed-config TOML migration is a storefront-runtime concern,
not an integration-test concern.
*/}}
{{- range $agent := .Values.agents }}
{{- if $agent.secret.createSecret }}
{{- $component := $agent.component | default $agent.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "storefront.agentSecretName" (dict "root" $ "agent" $agent) }}
  labels:
    {{- include "storefront.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component | quote }}
type: Opaque
stringData:
  config.toml: |
    {{- include "storefront.agentConfigToml" (dict "root" $ "agent" $agent) | nindent 4 }}
  config-{{ $component }}-secret.yml: |-
    {{ $component }}:
      private_key:           {{ $agent.secret.privKey | quote }}
      wallet_address:        {{ $agent.secret.walletAddress | quote }}
      admin_api_key:         {{ ($.Values.global).adminApiKey | default "" | quote }}
      resources_csv_inline:  {{ $agent.secret.resourcesCsvInline | default "" | quote }}
---
{{- end }}
{{- end }}

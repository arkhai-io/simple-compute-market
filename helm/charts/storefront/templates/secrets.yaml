{{/*
Per-agent Secret. Holds the sensitive overlay of the runtime config
(`storefront.secrets.toml`) plus the dynaconf-style
`config-{component}-secret.yml` profile that the integration-test pod
consumes (templates/tests/storefront-environment-test.yaml).

Non-sensitive runtime config (chain URLs, log paths, mode flags,
runtime knobs) lives in the per-agent ConfigMap (templates/configmap.yaml).
Dynaconf merges the two files at startup, so editing a non-secret toggle
doesn't rotate this Secret.
*/}}
{{- range $agent := .Values.agents }}
{{- if $agent.secret.createSecret }}
{{- $component := $agent.component | default $agent.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "storefront.agentSecretName" (dict "root" $ "agent" $agent) }}
  labels:
    {{- include "storefront.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $component | quote }}
type: Opaque
stringData:
  storefront.secrets.toml: |
    {{- include "storefront.agentSecretsToml" (dict "root" $ "agent" $agent) | nindent 4 }}
  config-{{ $component }}-secret.yml: |-
    {{ $component }}:
      private_key:           {{ $agent.secret.privKey | quote }}
      wallet_address:        {{ $agent.secret.walletAddress | quote }}
      admin_api_key:         {{ ($.Values.global).adminApiKey | default "" | quote }}
      resources_csv_inline:  {{ $agent.secret.resourcesCsvInline | default "" | quote }}
---
{{- end }}
{{- end }}

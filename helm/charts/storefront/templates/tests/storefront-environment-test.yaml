{{- $itValues := dict -}}
{{- if .Values.global -}}
  {{- $itValues = .Values.global.integrationTests | default dict -}}
{{- end -}}
{{- $rootIt := ((.Values).integrationTests) | default dict -}}
{{- $tests := .Values.tests | default dict -}}
{{- $itRepo := $rootIt.repository | default ($itValues.repository | default "") -}}
{{- if and (not $itRepo) .Values.global -}}
  {{- $itRepo = .Values.global.imageRepository | default "" -}}
{{- end -}}
{{- $itName := $rootIt.name | default ($itValues.name | default "arkhai") -}}
{{- $itTag  := $rootIt.tag  | default ($itValues.tag  | default "integration-tests") -}}
{{- $itPull := $rootIt.pullPolicy | default ($itValues.pullPolicy | default "IfNotPresent") -}}
{{- $itImage := "" -}}
{{- if $itRepo -}}
  {{- $itImage = printf "%s/%s:%s" $itRepo $itName $itTag -}}
{{- else -}}
  {{- $itImage = printf "%s:%s" $itName $itTag -}}
{{- end -}}
{{- if not .Values.agents -}}
  {{- fail "storefront smoke test requires at least one configured agent" -}}
{{- end -}}
{{- $targetName := $tests.targetAgentName | default "" -}}
{{- $targetAgent := first .Values.agents -}}
{{- if $targetName -}}
  {{- $found := false -}}
  {{- range $agent := .Values.agents -}}
    {{- if eq $agent.name $targetName -}}
      {{- $targetAgent = $agent -}}
      {{- $found = true -}}
    {{- end -}}
  {{- end -}}
  {{- if not $found -}}
    {{- fail (printf "storefront smoke test targetAgentName %q did not match any agent" $targetName) -}}
  {{- end -}}
{{- end -}}
{{- $component := $targetAgent.component | default $targetAgent.name -}}
{{- $globalSecretEnabled := false -}}
{{- if and .Values.global .Values.global.smokeTests .Values.global.smokeTests.secret -}}
  {{- $globalSecretEnabled = .Values.global.smokeTests.secret.enabled | default false -}}
{{- end -}}
{{- $profiles := $tests.activeProfiles | default "" -}}
{{- if not $profiles -}}
  {{- if $globalSecretEnabled -}}
    {{- $profiles = include "storefront.smokeTestActiveProfiles" . -}}
  {{- else -}}
    {{- $profileList := list -}}
    {{- $configProfiles := include "storefront.smokeTestConfigProfiles" . -}}
    {{- if $configProfiles -}}
      {{- range $profile := splitList "," $configProfiles -}}
        {{- $profileList = append $profileList $profile -}}
      {{- end -}}
    {{- end -}}
    {{- $profileList = append $profileList (printf "%s-secret" $component) -}}
    {{- $profiles = join "," $profileList -}}
  {{- end -}}
{{- end -}}
{{- $secretName := $tests.secretName | default (include "storefront.agentSecretName" (dict "root" $ "agent" $targetAgent)) -}}
{{- $secretKey := $tests.secretKey | default (printf "config-%s-secret.yml" $component) -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "storefront.fullname" . }}-smoke-test
  labels:
    {{- include "storefront.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: {{ include "storefront.fullname" . }}-smoke-test
      image: {{ $itImage }}
      imagePullPolicy: {{ $itPull }}
      command:
        - .venv/bin/pytest
        - -m
        - storefront
      env:
        - name: ACTIVE_PROFILES
          value: {{ $profiles | quote }}
      volumeMounts:
        {{- include "storefront.smokeTestConfigVolumeMounts" . | nindent 8 }}
        {{- if $globalSecretEnabled }}
        {{- include "storefront.smokeTestSecretVolumeMounts" . | nindent 8 }}
        {{- else }}
        - name: selected-storefront-secret-config
          mountPath: /app/config/{{ $secretKey }}
          subPath: {{ $secretKey }}
          readOnly: true
        {{- end }}
  volumes:
    - name: test-config
      configMap:
        name: {{ .Release.Name }}-test-config
    {{- if $globalSecretEnabled }}
    {{- include "storefront.smokeTestSecretVolume" . | nindent 4 }}
    {{- else }}
    - name: selected-storefront-secret-config
      secret:
        secretName: {{ $secretName }}
    {{- end }}

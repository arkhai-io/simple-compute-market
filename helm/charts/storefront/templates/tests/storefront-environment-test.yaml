{{- $itValues := dict -}}
{{- if .Values.global -}}
  {{- $itValues = .Values.global.integrationTests | default dict -}}
{{- end -}}
{{- $rootIt := ((.Values).integrationTests) | default dict -}}
{{- $itRepo := $rootIt.repository | default ($itValues.repository | default "") -}}
{{- if and (not $itRepo) .Values.global -}}
  {{- $itRepo = .Values.global.imageRepository | default "" -}}
{{- end -}}
{{- $itName := $rootIt.name | default ($itValues.name | default "arkhai") -}}
{{- $itTag  := $rootIt.tag  | default ($itValues.tag  | default "integration-tests") -}}
{{- $itPull := $rootIt.pullPolicy | default ($itValues.pullPolicy | default "IfNotPresent") -}}
{{- $itImage := "" -}}
{{- if $itRepo -}}
  {{- $itImage = printf "%s/%s:%s" $itRepo $itName $itTag -}}
{{- else -}}
  {{- $itImage = printf "%s:%s" $itName $itTag -}}
{{- end -}}
{{/*
Build the dynaconf profile list as "helm" + one "{component}-secret"
entry per agent, joined by commas.
*/}}
{{- $profiles := list "helm" -}}
{{- range $agent := .Values.agents -}}
  {{- $profiles = append $profiles (printf "%s-secret" ($agent.component | default $agent.name)) -}}
{{- end -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "storefront.fullname" . }}-smoke-test
  labels:
    {{- include "storefront.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: {{ include "storefront.fullname" . }}-smoke-test
      image: {{ $itImage }}
      imagePullPolicy: {{ $itPull }}
      command:
        - .venv/bin/pytest
        - -m
        - agents
      env:
        - name: ACTIVE_PROFILES
          value: {{ join "," $profiles | quote }}
      volumeMounts:
        - name: test-config
          mountPath: /app/config/config-helm.yml
          subPath: config-helm.yml
          readOnly: true
        {{- range $agent := .Values.agents }}
        {{- $component := $agent.component | default $agent.name }}
        - name: {{ $component }}-secret-config
          mountPath: /app/config/config-{{ $component }}-secret.yml
          subPath: config-{{ $component }}-secret.yml
          readOnly: true
        {{- end }}
  volumes:
    - name: test-config
      configMap:
        name: {{ .Release.Name }}-test-config
    {{- range $agent := .Values.agents }}
    {{- $component := $agent.component | default $agent.name }}
    - name: {{ $component }}-secret-config
      secret:
        secretName: {{ include "storefront.agentSecretName" (dict "root" $ "agent" $agent) }}
    {{- end }}

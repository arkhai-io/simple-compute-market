{{/*
One Deployment per agent in .Values.agents. Each pod mounts its
per-agent Secret as a single config.toml file at /etc/arkhai/config.toml
and points XDG_CONFIG_HOME at /etc — no env-var-based config.

zerotierEnabled (default: true) controls whether ZeroTier networking
infrastructure is included in the pod spec. Set to false for environments
where ZeroTier is unnecessary (e.g. GKE Autopilot, API-gateway-fronted
deployments) or where the required Linux capabilities (NET_ADMIN, SYS_MODULE)
and hostPath volumes are not permitted. The application runtime is unaffected
when zerotier_network is unset in config.toml — entrypoint.sh is already
fail-soft on daemon startup and the Python runtime skips all ZeroTier paths
when seller.zerotier_network is absent.
*/}}
{{- range $agent := .Values.agents }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "storefront.agentFullname" (dict "root" $ "agent" $agent) }}
  labels:
    {{- include "storefront.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $agent.component | default $agent.name | quote }}
spec:
  replicas: {{ $.Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "storefront.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $agent.component | default $agent.name | quote }}
  template:
    metadata:
      labels:
        {{- include "storefront.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $agent.component | default $agent.name | quote }}
    spec:
      initContainers:
        - name: wait-for-rpc
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RPC at {{ include "rpc.url" $ }}..."
              until wget -qO- --post-data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
                --header 'Content-Type: application/json' \
                {{ include "rpc.url" $ }} > /dev/null 2>&1; do
                echo "RPC not ready, retrying in 5s..."; sleep 5
              done
              echo "RPC ready."
        - name: wait-for-registry
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for registry at {{ include "registry.url" $ }}/health..."
              until wget -qO- {{ include "registry.url" $ }}/health > /dev/null 2>&1; do
                echo "Registry not ready, retrying in 5s..."; sleep 5
              done
              echo "Registry ready."
      containers:
        - name: market-storefront-{{ $agent.name }}
          image: {{ include "storefront.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          # entrypoint.sh starts the ZeroTier daemon then execs the
          # CLI verb. Registration and heartbeating are handled inside
          # `serve` at startup — no separate init container needed.
          command:
            - ./entrypoint.sh
            - market-storefront
            - serve
          ports:
            - name: http
              containerPort: {{ $agent.port }}
              protocol: TCP
          {{- if $.Values.zerotierEnabled }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          {{- end }}
          env:
            # Sole env var: tell the typed config loader where to find
            # the mounted TOML. service.config_loader.user_config_dir()
            # resolves to $XDG_CONFIG_HOME/arkhai, so this maps to
            # /etc/arkhai/config.toml. Everything else (including
            # secrets) lives inside that file.
            - name: XDG_CONFIG_HOME
              value: /etc
          volumeMounts:
            {{- if $.Values.zerotierEnabled }}
            - name: tun-device
              mountPath: /dev/net/tun
            {{- end }}
            - name: arkhai-config
              mountPath: /etc/arkhai
              readOnly: true
          # /health performs only a fast SQLite ping — safe as a Kubernetes
          # liveness/readiness probe with no outbound calls or blocking I/O.
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $agent.port }}
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $agent.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
      volumes:
        {{- if $.Values.zerotierEnabled }}
        - name: tun-device
          hostPath:
            path: /dev/net/tun
        {{- end }}
        - name: arkhai-config
          secret:
            secretName: {{ include "storefront.agentSecretName" (dict "root" $ "agent" $agent) }}
            items:
              - key: config.toml
                path: config.toml
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}

{{/*
Buyer agent deployment (Alice / market-agent-buy)
Mirrors: docker run --cap-add NET_ADMIN --cap-add SYS_MODULE --device /dev/net/tun
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "storefront.fullname" . }}-buyer
  labels:
    {{- include "storefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: buyer
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "storefront.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: buyer
  template:
    metadata:
      labels:
        {{- include "storefront.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: buyer
    spec:
      initContainers:
        # Wait for the Anvil RPC node to be accepting JSON-RPC requests.
        # Uses HTTP since that is sufficient to prove the node is ready;
        # the main container connects over WebSocket.
        - name: wait-for-rpc
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RPC at {{ include "rpc.url" . }}..."
              until wget -qO- --post-data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
                --header 'Content-Type: application/json' \
                {{ include "rpc.url" . }} > /dev/null 2>&1; do
                echo "RPC not ready, retrying in 5s..."; sleep 5
              done
              echo "RPC ready."
        # Wait for the registry /health endpoint to return 200.
        - name: wait-for-registry
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for registry at {{ include "registry.url" . }}/health..."
              until wget -qO- {{ include "registry.url" . }}/health > /dev/null 2>&1; do
                echo "Registry not ready, retrying in 5s..."; sleep 5
              done
              echo "Registry ready."
      containers:
        - name: market-agent-buy
          image: {{ include "storefront.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.buyer.port }}
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          # /dev/net/tun is required for VPN-based networking
          volumeMounts:
            - name: tun-device
              mountPath: /dev/net/tun
          env:
            # --- agent identity ---
            - name: PORT
              value: {{ .Values.buyer.port | quote }}
            - name: AGENT_ID
              value: {{ .Values.buyer.agentId | quote }}
            - name: BASE_URL_OVERRIDE
              value: {{ .Values.buyer.baseUrlOverride | quote }}
            - name: AGENT_DB_PATH
              value: {{ .Values.buyer.agentDbPath | quote }}
            - name: LOG_FILE_PATH
              value: {{ .Values.buyer.logFilePath | quote }}
            - name: AUTO_REGISTER
              value: {{ .Values.buyer.autoRegister | quote }}
            - name: ENABLE_EVENT_QUEUE
              value: {{ .Values.buyer.enableEventQueue | quote }}
            - name: GEMINI_API_KEY
              value: {{ .Values.buyer.geminiApiKey | quote }}
            # --- chain / networking ---
            - name: CHAIN_RPC_URL
              value: {{ include "rpc.wsUrl" . | quote }}
            - name: CHAIN_NAME
              value: {{ .Values.buyer.chainName | quote }}
            - name: ALKAHEST_ADDRESS_CONFIG_PATH
              value: {{ .Values.buyer.alkahestAddressConfigPath | quote }}
            - name: TOKEN_REGISTRY_PATH
              value: {{ .Values.buyer.tokenRegistryPath | quote }}
            - name: SSH_PUBLIC_KEY
              value: {{ .Values.buyer.sshPublicKey | quote }}
            # --- registry / indexer ---
            - name: INDEXER_URL
              value: {{ include "registry.url" . | quote }}
            - name: IDENTITY_REGISTRY_ADDRESS
              value: {{ .Values.global.registry.identity_address | quote }}
            - name: REPUTATION_REGISTRY_ADDRESS
              value: {{ .Values.global.registry.reputation_address | quote }}
            - name: VALIDATION_REGISTRY_ADDRESS
              value: {{ .Values.global.registry.validation_address | quote }}
            # --- provisioning / negotiation ---
            - name: PROVISIONING_MODE
              value: {{ .Values.buyer.provisioningMode | quote }}
            - name: NEGOTIATION_POLICY_MODE
              value: {{ .Values.buyer.negotiationPolicyMode | quote }}
            # --- wallet (from secret) ---
            - name: AGENT_PRIV_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "storefront.buyer.secretName" . }}
                  key: private_key
            - name: AGENT_WALLET_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: {{ include "storefront.buyer.secretName" . }}
                  key: wallet_address
          # TODO: add liveness/readiness probes once agent health endpoint is defined.
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tun-device
          hostPath:
            path: /dev/net/tun
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---

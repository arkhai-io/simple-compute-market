{{/*
One Deployment per agent in .Values.agents. Each pod mounts its
per-agent Secret as a single config.toml file at /etc/arkhai/config.toml
and points XDG_CONFIG_HOME at /etc — no env-var-based config.
*/}}
{{- range $agent := .Values.agents }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "storefront.agentFullname" (dict "root" $ "agent" $agent) }}
  labels:
    {{- include "storefront.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $agent.component | default $agent.name | quote }}
spec:
  replicas: {{ $.Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "storefront.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $agent.component | default $agent.name | quote }}
  template:
    metadata:
      labels:
        {{- include "storefront.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $agent.component | default $agent.name | quote }}
    spec:
      initContainers:
        - name: wait-for-rpc
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RPC at {{ include "rpc.url" $ }}..."
              until wget -qO- --post-data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
                --header 'Content-Type: application/json' \
                {{ include "rpc.url" $ }} > /dev/null 2>&1; do
                echo "RPC not ready, retrying in 5s..."; sleep 5
              done
              echo "RPC ready."
        - name: wait-for-registry
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for registry at {{ include "registry.url" $ }}/health..."
              until wget -qO- {{ include "registry.url" $ }}/health > /dev/null 2>&1; do
                echo "Registry not ready, retrying in 5s..."; sleep 5
              done
              echo "Registry ready."
        {{- if $agent.autoRegister }}
        - name: register-onchain
          image: {{ include "storefront.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command:
            - python
            - scripts/register_onchain.py
            - --no-update-env
            - --chain-id
            - {{ $.Values.global.rpc.chainId | quote }}
          env:
            - name: XDG_CONFIG_HOME
              value: /etc
          volumeMounts:
            - name: arkhai-config
              mountPath: /etc/arkhai
              readOnly: true
        {{- end }}
      containers:
        - name: market-storefront-{{ $agent.name }}
          image: {{ include "storefront.image" $ }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $agent.port }}
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          env:
            # Sole env var: tell the typed config loader where to find
            # the mounted TOML. service.config_loader.user_config_dir()
            # resolves to $XDG_CONFIG_HOME/arkhai, so this maps to
            # /etc/arkhai/config.toml. Everything else (including
            # secrets) lives inside that file.
            - name: XDG_CONFIG_HOME
              value: /etc
          volumeMounts:
            - name: tun-device
              mountPath: /dev/net/tun
            - name: arkhai-config
              mountPath: /etc/arkhai
              readOnly: true
          # TODO: add liveness/readiness probes once agent health endpoint is defined.
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
      volumes:
        - name: tun-device
          hostPath:
            path: /dev/net/tun
        - name: arkhai-config
          secret:
            secretName: {{ include "storefront.agentSecretName" (dict "root" $ "agent" $agent) }}
            items:
              - key: config.toml
                path: config.toml
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- end }}

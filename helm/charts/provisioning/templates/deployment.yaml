apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "provisioning.fullname" . }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "provisioning.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "provisioning.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod rollout when config or secrets change
        checksum/config:  {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      containers:
        - name: provisioning
          image: {{ include "provisioning.image" . }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: ACTIVE_PROFILES
              value: "production,provisioning-secrets"
            - name: CONFIG_DIRECTORY
              value: "/app/config"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: config
              mountPath: /app/config/config-production.yml
              subPath: config-production.yml
              readOnly: true
            - name: provisioning-secrets
              mountPath: /app/config/config-provisioning-secrets.yml
              subPath: config-provisioning-secrets.yml
              readOnly: true
            - name: ssh-key
              mountPath: /home/appuser/.ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "provisioning.configMapName" . }}
        - name: provisioning-secrets
          secret:
            secretName: {{ include "provisioning.sshDecryptionKeySecretName" . }}
        - name: ssh-key
          secret:
            secretName: {{ include "provisioning.sshKeySecretName" . }}
            defaultMode: 0400
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
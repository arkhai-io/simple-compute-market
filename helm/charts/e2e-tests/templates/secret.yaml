{{/*
E2e test credentials Secret.

Contains a single dynaconf profile file (config-e2e-secret.yml) with all
sensitive values the e2e_deal test suite needs:
  - seller private key, wallet address, admin API key
  - buyer private key, wallet address

Loaded by the test pod as the "e2e-secret" dynaconf profile.
Keys match the integration-test settings.toml schema exactly.

The admin API key prefers e2e-tests.seller.adminApiKey when set; falls back
to global.adminApiKey so operators only need to set it in one place.
*/}}
{{- $adminKey := .Values.seller.adminApiKey | default ((.Values.global).adminApiKey) | default "" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "e2e-tests.secretName" . }}
  labels:
    {{- include "e2e-tests.labels" . | nindent 4 }}
type: Opaque
stringData:
  config-e2e-secret.yml: |-
    seller:
      private_key:    {{ .Values.seller.privateKey | quote }}
      wallet_address: {{ .Values.seller.walletAddress | quote }}
      admin_api_key:  {{ $adminKey | quote }}
    buyer:
      private_key:    {{ .Values.buyer.privateKey | quote }}
      wallet_address: {{ .Values.buyer.walletAddress | quote }}

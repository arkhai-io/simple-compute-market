apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "registry.fullname" . }}
  labels:
    {{- include "registry.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate strategy: the indexer.db PVC is ReadWriteOnce; rolling
  # updates would deadlock waiting for the old pod to release it.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "registry.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "registry.selectorLabels" . | nindent 8 }}
    spec:
      # fsGroup matches the container's appuser (UID 1000); without it
      # the PVC's mount root is root-owned and SQLite can't write.
      securityContext:
        fsGroup: 1000
      containers:
        - name: registry
          image: {{ include "registry.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            # --- sourced from subchart values ---
            - name: DATABASE_URL
              value: {{ .Values.config.databaseUrl | quote }}
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: HOST
              value: {{ .Values.config.host | quote }}
            - name: ENABLE_HEALTH_CHECKS
              value: {{ .Values.config.enableHealthChecks | quote }}
            - name: HEALTH_CHECK_INTERVAL
              value: {{ .Values.config.healthCheckInterval | quote }}
            - name: ENDPOINT_CHECK_TIMEOUT
              value: {{ .Values.config.endpointCheckTimeout | quote }}
            - name: HEARTBEAT_TTL_SECS
              value: {{ .Values.config.heartbeatTtlSecs | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            # ROOT_PATH: gateway path prefix for this service. Used by the
            # custom OpenAPI function to inject a servers block so Swagger UI
            # generates correct curl examples behind the API gateway.
            # Set via ops repo values overlay; empty for local dev.
            - name: ROOT_PATH
              value: {{ .Values.config.rootPath | default "" | quote }}
            # --- sourced from global ---
            - name: CHAIN_ID
              value: {{ .Values.global.rpc.chainId | quote }}
          volumeMounts:
            - name: arkhai-data
              mountPath: {{ .Values.persistence.mountPath | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        # SQLite indexer.db storage. Three modes:
        #   existingClaim set → mount a Terraform-managed PVC by name
        #   persistence.enabled → chart creates and owns the PVC
        #   neither           → emptyDir (pod-lifetime, CI/local only)
        - name: arkhai-data
          {{- if .Values.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | quote }}
          {{- else if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "registry.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- $itValues := dict -}}
{{- if .Values.global -}}
  {{- $itValues = .Values.global.integrationTests | default dict -}}
{{- end -}}
{{- $rootIt := ((.Values).integrationTests) | default dict -}}
{{- $tests := .Values.tests | default dict -}}
{{- $itRepo := $rootIt.repository | default ($itValues.repository | default "") -}}
{{- if and (not $itRepo) .Values.global -}}
  {{- $itRepo = .Values.global.imageRepository | default "" -}}
{{- end -}}
{{- $itName := $rootIt.name | default ($itValues.name | default "arkhai") -}}
{{- $itTag  := $rootIt.tag  | default ($itValues.tag  | default "integration-tests") -}}
{{- $itPull := $rootIt.pullPolicy | default ($itValues.pullPolicy | default "IfNotPresent") -}}
{{- $itImage := "" -}}
{{- if $itRepo -}}
  {{- $itImage = printf "%s/%s:%s" $itRepo $itName $itTag -}}
{{- else -}}
  {{- $itImage = printf "%s:%s" $itName $itTag -}}
{{- end -}}
{{- $profiles := $tests.activeProfiles | default (include "registry.smokeTestActiveProfiles" .) -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "registry.fullname" . }}-smoke-test
  labels:
    {{- include "registry.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: {{ include "registry.fullname" . }}-smoke-test
      image: {{ $itImage }}
      imagePullPolicy: {{ $itPull }}
      command:
        - .venv/bin/pytest
        - -m
        - registry
      env:
        - name: ACTIVE_PROFILES
          value: {{ $profiles | quote }}
      volumeMounts:
        {{- include "registry.smokeTestConfigVolumeMounts" . | nindent 8 }}
        {{- include "registry.smokeTestSecretVolumeMounts" . | nindent 8 }}
  volumes:
    - name: test-config
      configMap:
        name: {{ .Release.Name }}-test-config
    {{- include "registry.smokeTestSecretVolume" . | nindent 4 }}

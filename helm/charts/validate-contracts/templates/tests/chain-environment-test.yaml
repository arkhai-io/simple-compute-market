{{- $it := .Values.integrationTests -}}
{{- $repo := $it.repository -}}
{{- if and (not $repo) .Values.global -}}
  {{- $repo = .Values.global.imageRepository | default "" -}}
{{- end -}}
{{- $itImage := "" -}}
{{- if $repo -}}
  {{- $itImage = printf "%s/%s:%s" $repo $it.name $it.tag -}}
{{- else -}}
  {{- $itImage = printf "%s:%s" $it.name $it.tag -}}
{{- end -}}
{{- $profiles := .Values.activeProfiles | default (include "validate-contracts.smokeTestActiveProfiles" .) -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "validate-contracts.fullname" . }}-chain-environment-test
  labels:
    {{- include "validate-contracts.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: {{ include "validate-contracts.fullname" . }}-environment-test
      image: {{ $itImage }}
      imagePullPolicy: {{ $it.pullPolicy }}
      command:
        - .venv/bin/pytest
        - -m
        - contracts
      env:
        - name: ACTIVE_PROFILES
          value: {{ $profiles | quote }}
      volumeMounts:
        {{- include "validate-contracts.smokeTestConfigVolumeMounts" . | nindent 8 }}
        {{- include "validate-contracts.smokeTestSecretVolumeMounts" . | nindent 8 }}
  volumes:
    - name: test-config
      configMap:
        name: {{ .Release.Name }}-test-config
    {{- include "validate-contracts.smokeTestSecretVolume" . | nindent 4 }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agents.fullname" . }}-agents-environment-test-config
  labels:
    {{- include "agents.labels" . | nindent 4 }}
data:
  config-helm.yml: |
    rpc:
      url: {{ include "rpc.url" . | quote }}
      chain_id: {{ .Values.global.rpc.chainId }}

    registry:
      identity_address:   {{ .Values.global.registry.identity_address | quote }}
      reputation_address: {{ .Values.global.registry.reputation_address | quote }}
      validation_address: {{ .Values.global.registry.validation_address | quote }}
      owner_address:      {{ .Values.global.registry.owner_address | quote }}
      api_url:            {{ include "registry.url" . | quote }}

    buyer:
      api_url:           {{ printf "http://%s-buyer:%d" (include "agents.fullname" .) (int .Values.buyer.port) | quote }}
      base_url_override: {{ .Values.buyer.baseUrlOverride | quote }}

    seller:
      api_url:           {{ printf "http://%s-seller:%d" (include "agents.fullname" .) (int .Values.seller.port) | quote }}
      base_url_override: {{ .Values.seller.baseUrlOverride | quote }}
---
{{/*
Buyer wallet secret profile — loaded as ACTIVE_PROFILES=...,buyer-secret
Stored as a Secret so private key material never lives in a ConfigMap.
The test pod mounts this at /app/config/config-buyer-secret.yml.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agents.fullname" . }}-agents-environment-test-buyer-secret
  labels:
    {{- include "agents.labels" . | nindent 4 }}
type: Opaque
stringData:
  config-buyer-secret.yml: |
    buyer:
      private_key:    {{ .Values.buyer.secret.privKey | quote }}
      wallet_address: {{ .Values.buyer.secret.walletAddress | quote }}
---
{{/*
Seller wallet secret profile — loaded as ACTIVE_PROFILES=...,seller-secret
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agents.fullname" . }}-agents-environment-test-seller-secret
  labels:
    {{- include "agents.labels" . | nindent 4 }}
type: Opaque
stringData:
  config-seller-secret.yml: |
    seller:
      private_key:    {{ .Values.seller.secret.privKey | quote }}
      wallet_address: {{ .Values.seller.secret.walletAddress | quote }}
{{/*
Buyer wallet secret profile — loaded as ACTIVE_PROFILES=...,buyer-secret
Stored as a Secret so private key material never lives in a ConfigMap.
The test pod mounts this at /app/config/config-buyer-secret.yml.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agents.fullname" . }}-agents-environment-test-buyer-secret
  labels:
    {{- include "agents.labels" . | nindent 4 }}
type: Opaque
stringData:
  config-buyer-secret.yml: |
    buyer:
      private_key:    {{ .Values.buyer.secret.privKey | quote }}
      wallet_address: {{ .Values.buyer.secret.walletAddress | quote }}
---
{{/*
Seller wallet secret profile — loaded as ACTIVE_PROFILES=...,seller-secret
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agents.fullname" . }}-agents-environment-test-seller-secret
  labels:
    {{- include "agents.labels" . | nindent 4 }}
type: Opaque
stringData:
  config-seller-secret.yml: |
    seller:
      private_key:    {{ .Values.seller.secret.privKey | quote }}
      wallet_address: {{ .Values.seller.secret.walletAddress | quote }}

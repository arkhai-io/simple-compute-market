# Default values for agents.
# These are overridden by the parent chart's agents: block in values.yaml.
# Values sourced from global (rpc, indexer, registry addresses) are injected
# in deployment templates and do not appear here.

image:
  repository: ""
  name: arkhai
  tag: core
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Buyer agent (Alice / market-agent-buy)
# ---------------------------------------------------------------------------
buyer:
  port: 8000
  agentId: "alice"
  baseUrlOverride: "http://market-agent-buy:8000/"
  agentDbPath: "./agent.db"
  logFilePath: "./logs/alice.log"
  autoRegister: true
  enableEventQueue: false
  chainName: "anvil"
  alkahestAddressConfigPath: "/app/src/market_storefront/data/alkahest_anvil_addresses.json"
  tokenRegistryPath: "/app/src/market_storefront/data/token_registry_docker_compose.json"
  provisioningMode: "mock"
  negotiationPolicyMode: "bisection"
  sshPublicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDemoPublicKeyForComputeAccess alice@example.com"
  geminiApiKey: ""

  # Secret configuration.
  # createSecret: true  — chart creates a Secret from privKey/walletAddress below.
  #                       Use only for dev/test; do not commit real keys.
  # createSecret: false — chart expects a pre-existing Secret named secretName.
  secret:
    createSecret: true
    secretName: ""   # auto-generated from fullname when empty
    privKey: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
    walletAddress: "0x70997970C51812dc3A010C7d01b50e0d17dc79C8"

# ---------------------------------------------------------------------------
# Seller agent (Bob / market-agent-sell)
# ---------------------------------------------------------------------------
seller:
  port: 8001
  agentId: "bob"
  baseUrlOverride: "http://market-agent-sell:8001/"
  agentDbPath: "./agent.db"
  logFilePath: "./logs/bob.log"
  autoRegister: true
  enableEventQueue: false
  chainName: "anvil"
  alkahestAddressConfigPath: "/app/src/market_storefront/data/alkahest_anvil_addresses.json"
  tokenRegistryPath: "/app/src/market_storefront/data/token_registry_docker_compose.json"
  provisioningMode: "mock"
  negotiationPolicyMode: "bisection"
  sshPublicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDemoPublicKeyForComputeAccess bob@example.com"
  geminiApiKey: ""

  secret:
    createSecret: true
    secretName: ""   # auto-generated from fullname when empty
    privKey: "0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a"
    walletAddress: "0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC"

# Number of replicas per agent.
replicaCount: 1

# Resource requests/limits – tune per environment.
resources: {}
#  requests:
#    cpu: 100m
#    memory: 128Mi
#  limits:
#    cpu: 500m
#    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}
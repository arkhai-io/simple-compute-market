{{/*
Shared helm-test configuration mounted by smoke-test pods.

Preferred smoke-test mode: global.smokeTests.config.profileFiles renders
complete Dynaconf profile files directly. The generated profile is still kept
when its name does not collide, so non-smoke hooks that mount config-helm.yml
continue to work.
*/}}
{{- $smoke := .Values.global.smokeTests | default dict -}}
{{- $config := $smoke.config | default dict -}}
{{- $rpcUrl := (index .Values "validate-contracts").rpcUrl -}}
{{- if not $rpcUrl -}}
  {{- $rpcUrl = printf "http://%s:%d" .Values.global.rpc.host (int .Values.global.rpc.port) -}}
{{- end -}}
{{- $agents := .Values.storefront.agents | default list -}}
{{- if not $agents -}}
  {{- fail "helm test config requires at least one storefront agent" -}}
{{- end -}}
{{- $storefrontTests := .Values.storefront.tests | default dict -}}
{{- $targetName := $storefrontTests.targetAgentName | default "" -}}
{{- $targetAgent := first $agents -}}
{{- if $targetName -}}
  {{- $found := false -}}
  {{- range $agent := $agents -}}
    {{- if eq $agent.name $targetName -}}
      {{- $targetAgent = $agent -}}
      {{- $found = true -}}
    {{- end -}}
  {{- end -}}
  {{- if not $found -}}
    {{- fail (printf "storefront test targetAgentName %q did not match any agent" $targetName) -}}
  {{- end -}}
{{- end -}}
{{- $targetConfig := $targetAgent.config | default dict -}}
{{- $sellerConfig := $targetConfig.seller | default dict -}}
{{- $component := $targetAgent.component | default $targetAgent.name -}}
{{- $generated := dict -}}
{{- $_ := set $generated "rpc" (dict "url" $rpcUrl "chain_id" .Values.global.rpc.chainId) -}}
{{- $_ := set $generated "registry" (dict
  "identity_address" .Values.global.registry.identity_address
  "reputation_address" .Values.global.registry.reputation_address
  "validation_address" .Values.global.registry.validation_address
  "owner_address" .Values.global.registry.owner_address
  "api_url" (printf "http://%s-registry:%d" .Release.Name (int .Values.registry.service.port))
) -}}
{{- $_ := set $generated $component (dict
  "api_url" (printf "http://%s-storefront-%s:%d" .Release.Name $targetAgent.name (int $targetAgent.port))
  "base_url_override" ($sellerConfig.baseUrl | default "")
  "agent_id" ($targetAgent.agentId | default "")
) -}}
{{- $_ := set $generated "buyer" (dict
  "chain_rpc_url" (printf "ws://%s:%d" $.Values.global.rpc.host (int $.Values.global.rpc.port))
) -}}
{{- $_ := set $generated "provisioning" (dict
  "api_url" (printf "http://%s-provisioning:%d" .Release.Name (int .Values.provisioning.server.port))
) -}}
{{- $rendered := mergeOverwrite (deepCopy $generated) (deepCopy ($config.values | default dict)) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-test-config
  labels:
    {{- include "arkhai-node-operator.labels" . | nindent 4 }}
data:
  {{- if $config.profileFiles }}
  {{- range $profile, $content := $config.profileFiles }}
  config-{{ $profile }}.yml: |
    {{- $content | nindent 4 }}
  {{- end }}
  {{- end }}
  {{- if and $config.profile (not (hasKey ($config.profileFiles | default dict) $config.profile)) }}
  config-{{ $config.profile }}.yml: |
    {{- toYaml $rendered | nindent 4 }}
  {{- end }}

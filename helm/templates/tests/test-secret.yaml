{{- $smoke := .Values.global.smokeTests | default dict -}}
{{- $secret := $smoke.secret | default dict -}}
{{- if and $secret.enabled (or (not (hasKey $secret "create")) $secret.create) -}}
{{- $type := $secret.type | default "internal" -}}
{{- if not (has $type (list "internal" "external")) -}}
{{- fail "global.smokeTests.secret.type must be either 'internal' or 'external'" -}}
{{- end -}}
{{- $internal := $secret.internal | default dict -}}
{{- $external := $secret.external | default dict -}}
{{- if eq $type "internal" -}}
{{- if and (not $internal.profileFiles) (not $secret.profile) -}}
{{- fail "global.smokeTests.secret.profile or secret.internal.profileFiles is required when internal smoke-test secrets are enabled" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "arkhai.smokeTestSecretName" . }}
  labels:
    {{- include "arkhai-node-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if $internal.profileFiles }}
  {{- range $profile, $content := $internal.profileFiles }}
  config-{{ $profile }}.yml: |
    {{- $content | nindent 4 }}
  {{- end }}
  {{- else }}
  config-{{ $secret.profile }}.yml: |
    {{- toYaml ($internal.values | default dict) | nindent 4 }}
  {{- end }}
{{- else if eq $type "external" -}}
{{- if not $external.profileRefs -}}
{{- fail "global.smokeTests.secret.external.profileRefs is required when external smoke-test secrets are enabled" -}}
{{- end }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "arkhai.smokeTestSecretName" . }}
  labels:
    {{- include "arkhai-node-operator.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $external.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $external.secretStoreRef.name | quote }}
    kind: {{ $external.secretStoreRef.kind | quote }}
  target:
    name: {{ include "arkhai.smokeTestSecretName" . }}
    creationPolicy: Owner
    template:
      metadata:
        labels:
          secret-origin: eso
  data:
    {{- range $profile, $remoteRef := $external.profileRefs }}
    - secretKey: config-{{ $profile }}.yml
      remoteRef:
        key: {{ $remoteRef.key | quote }}
    {{- end }}
{{- end -}}
{{- end -}}

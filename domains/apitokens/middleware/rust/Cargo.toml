[package]
name = "arkhai-apitokens-middleware"
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false
description = "Seller-side API-tokens gating middleware: verify + meter prepaid API credits against the tokens service, map exhaustion to a 402 with a purchase pointer. Behavioral parity with the Python and TypeScript middlewares (../conformance)."

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower = { version = "0.5", default-features = false }
axum = "0.8"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "net"] }
tower = { version = "0.5", default-features = false, features = ["util"] }

[project]
name = "arkhai-vms-common"
version = "0.1.0"
license = "MIT"
description = "Shared VM-domain models and helpers used by Arkhai VM buyer and storefront packages."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arkhai_vms_common"]

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"

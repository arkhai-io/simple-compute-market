# VM compute (vms.compute) market — domain stack.
#
# The seller side of the VM compute market: two registry/indexer instances
# (public + private), Bob's and Alice's storefronts, the Redis job queue, and
# the provisioning service. Chain-touching services gate on a service named
# `anvil` (the local dev chain) which this file does NOT define — the root
# `compose.dev.yml` supplies it. Bring this domain up with that overlay via
# the repo-root wrapper:
#   docker compose -f compose.vms.yml up
# (compose.vms.yml just `include:`s compose.dev.yml + this file.) The full
# multi-domain stack is the root `docker-compose.yml`.
#
# Paths below are relative to THIS file's directory (domains/vms/) — Compose
# `include:` resolves an included file's relative paths against its own
# location.

services:
  # 1. Registry/Indexer service (vms.compute filter-spec — the image default).
  registry:
    image: arkhai:registry
    depends_on:
      anvil:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - ../../core/registry/.env.docker-compose
    volumes:
      - ../../shared-env:/app/shared-env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      # CMD-SHELL form works reliably under both Docker and Podman; the
      # CMD+argv form can be mis-parsed on Podman for non-trivial Python code.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 1b. Second Registry/Indexer — a "private" registry alongside the
  # public one, exercising the multi-registry code paths permanently
  # in CI. Same image, same chain, independent SQLite. Both EventSync
  # the same chain so the seller's on-chain agent registration is
  # picked up by both; publish/discover fan-out and fan-in against
  # the union (domains/vms/storefront/.../utils/multi_registry_client.py).
  registry-b:
    image: arkhai:registry
    depends_on:
      anvil:
        condition: service_healthy
    ports:
      - "8082:8080"
    env_file:
      - ../../core/registry/.env.docker-compose
    environment:
      # Private-registry config: read and write gate independently, both
      # on here, so every non-admin request must carry
      # ``Authorization: Bearer <key>`` matching a non-revoked row in
      # api_keys. The BOOTSTRAP_API_KEY seeds a single write-scoped row at
      # startup (write implies read) so the storefront can publish to
      # registry-b on a fresh ``compose up`` without an out-of-band mint
      # step, and the buyer can discover from it with the same token.
      # Bob's storefront.bob.toml carries the matching token in
      # [registry.auth].
      - REGISTRY_REQUIRE_READ_API_KEY=true
      - REGISTRY_REQUIRE_WRITE_API_KEY=true
      - REGISTRY_ADMIN_API_KEY=test-admin-token
      - REGISTRY_BOOTSTRAP_API_KEY=test-buyer-token
    volumes:
      - ../../shared-env:/app/shared-env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 2. Bob's storefront — the primary test seller.
  # Buyers are pure HTTP clients (the `market` CLI / domains.vms.buyer
  # library). The buyer-side e2e runs as a one-shot container on this same
  # network (the e2e-tests image, which bundles the `market`
  # binary), so discovery resolves the seller's registry-advertised URL
  # (bob-storefront:8001) and reaches it the way a real remote buyer would.
  # See `make test-buyer-machine`.
  bob-storefront:
    image: arkhai:storefront
    platform: linux/amd64
    depends_on:
      registry:
        condition: service_healthy
      registry-b:
        condition: service_healthy
    ports:
      - "8001:8001"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # Sole config-bearing env var: tell the typed config loader where
      # to find the mounted TOML. The storefront config loader resolves
      # $XDG_CONFIG_HOME/arkhai/config.toml → /etc/arkhai/storefront.toml.
      - XDG_CONFIG_HOME=/etc
      # Provisioning-mode override stays a host-level env var because
      # tests flip it per-invocation (e.g. PROVISIONING_MODE=mock make
      # e2e-mock-happy). Wired into the storefront runtime via TOML override.
      - ARKHAI_PROVISIONING_MODE=${PROVISIONING_MODE:-http}
      - MOCK_PROVISIONING_SUCCESS=${MOCK_PROVISIONING_SUCCESS:-true}
      # The storefront's policy discovery needs `domains/` on PYTHONPATH
      # so it can find domains.vms.negotiation.rl callables.
      - PYTHONPATH=/app:/app/src
    volumes:
      # Chain-/seller-specific config is the one environment-supplied mount;
      # override $VMS_BOB_STOREFRONT_CONFIG to point at a different chain's
      # TOML (the default is the dev/anvil seller config).
      - ${VMS_BOB_STOREFRONT_CONFIG:-./storefront/storefront.bob.toml}:/etc/arkhai/storefront.toml:ro
      # Compute inventory seed CSV — storefront.bob.toml's
      # seller.resources_csv_path expects this at /app/resources.csv.
      - ./storefront/src/market_storefront/data/kvm1-machine.csv:/app/resources.csv:ro
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # 2b. Alice's storefront — exercises heterogeneous registry
  # topology in the multi-registry e2e scenario. Alice's config.toml
  # lists only the public registry, so her listings appear only
  # there, while Bob's fan out to both. This is the only thing that
  # makes the multi-registry scenario non-trivial: without an Alice,
  # every listing has the same registry footprint and the test can't
  # distinguish per-provider config from per-listing config.
  alice-storefront:
    image: arkhai:storefront
    platform: linux/amd64
    depends_on:
      registry:
        condition: service_healthy
    ports:
      - "8002:8002"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - XDG_CONFIG_HOME=/etc
      - ARKHAI_PROVISIONING_MODE=${PROVISIONING_MODE:-http}
      - MOCK_PROVISIONING_SUCCESS=${MOCK_PROVISIONING_SUCCESS:-true}
      - PYTHONPATH=/app:/app/src
    volumes:
      - ${VMS_ALICE_STOREFRONT_CONFIG:-./storefront/storefront.alice.toml}:/etc/arkhai/storefront.toml:ro
      # Reuses Bob's seed CSV — the multi-registry test seeds inventory
      # at runtime via admin_import_resources anyway, so the on-disk CSV
      # content is irrelevant. Bind-mounted to satisfy the config's
      # resources_csv_path requirement.
      - ./storefront/src/market_storefront/data/kvm1-machine.csv:/app/resources.csv:ro
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # 3. Redis (job queue for provisioning service)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # 4. Provisioning service.
  # Configuration is bundled in the image (domains/vms/provisioning/service/src/settings.toml,
  # plus dynaconf profile loading via ACTIVE_PROFILES). Compose-time
  # overrides go in `environment:` below.
  provisioning:
    image: arkhai:provisioning
    platform: linux/amd64
    depends_on:
      redis:
        condition: service_healthy
      registry:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=sqlite:////app/data/provisioning.db
      - REDIS_URL=redis://redis:6379
      # Mounts /test/* router used by integration tests' provisioning_test_client
      # (TestStage07 mock-rules). Should never be set in staging/prod.
      - ACTIVE_PROFILES=mock
      # Storefront callback target for the lease watchdog.
      # When the watchdog releases a lease, it PATCHes this URL to mark the
      # storefront resource available. Must match the bob-storefront service
      # name and port defined in this compose file.
      - PROVISIONING_STOREFRONT_URL=http://bob-storefront:8001
      - PROVISIONING_STOREFRONT_ADMIN_KEY=${STOREFRONT_ADMIN_KEY:-test-api-key}
    volumes:
      - ./provisioning/iac:/opt/domains/vms/provisioning/iac
      - ${HOME}/.ssh/id_ed25519:/home/appuser/.ssh/id_ed25519:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m

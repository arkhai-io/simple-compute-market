[base]
package = ocean
env_name = puffer_arkhai
policy_name = Policy
rnn_name = Recurrent

[vec]
# Serial backend required: Multiprocessing hangs with bilateral (2 AI agents per env).
# Compensate by using more envs per worker.
backend = Serial
num_envs = 1

[env]
num_envs = 1024
node_types = 5

# Bilateral training: both AI buyer and AI seller learn simultaneously.
# This produces co-adapted models but is harder to train (non-stationary opponents).
# Verified by upstream C tests in arkhai.c (bilateral agent negotiation test).
# Experimental -- prefer single-agent configs for initial production models.
ai_sellers = 1
ai_buyers = 1
scripted_sellers = 0
scripted_buyers = 0

episode_length = 100
request_timeout = 10

job_gpu_0_nodes = 10
job_gpu_0_nodes_dr = 0.2
job_gpu_1_nodes = 10
job_gpu_1_nodes_dr = 0.2
job_gpu_2_nodes = 10
job_gpu_2_nodes_dr = 0.2
job_gpu_3_nodes = 10
job_gpu_3_nodes_dr = 0.2
job_gpu_4_nodes = 10
job_gpu_4_nodes_dr = 0.2
job_duration = 10
job_duration_dr = 0.2
job_tb_usage = 0.2
job_tb_usage_dr = 0.2
job_efficiency = 0.8
job_efficiency_dr = 0.2

scripted_buy_price = 0.9
scripted_buy_price_dr = 0.2
scripted_sell_price = 0.9
scripted_sell_price_dr = 0.2

reward_scale = 0.0001
tb_price = 0.03
gpu_0_price = 5.31
gpu_0_kw = 6.5
gpu_1_price = 15.92
gpu_1_kw = 10.0
gpu_2_price = 0.37
gpu_2_kw = 1.0
# Real available hardware (added alongside placeholder H200/V100/5080 slots)
gpu_3_price = 1.80
gpu_3_kw = 0.23
gpu_4_price = 2.50
gpu_4_kw = 0.45

energy_demand_base = 1500.0
kwh_price_base = 0.02
kwh_price_sensitivity = 0.0000001
kwh_demand_threshold = 1400
a1 = -374
b1 = -387
a2 = -4.6
b2 = -17.1
a3 = 3.2
b3 = 18.9

randomize_offset = 1
preset = 0

cluster_gpu_0_capacity = 100
cluster_gpu_0_capacity_dr = 0.2
cluster_gpu_1_capacity = 100
cluster_gpu_1_capacity_dr = 0.2
cluster_gpu_2_capacity = 100
cluster_gpu_2_capacity_dr = 0.2
cluster_gpu_3_capacity = 100
cluster_gpu_3_capacity_dr = 0.2
cluster_gpu_4_capacity = 100
cluster_gpu_4_capacity_dr = 0.2
cluster_tb_capacity = 100
cluster_tb_capacity_dr = 0.2
cluster_kwh_capacity = 100
cluster_kwh_capacity_dr = 0.2
cluster_kw_generation = 10
cluster_kw_generation_dr = 0.2

[train]
# Sweep-tuned PPO hyperparameters from upstream ArkhaiPufferEnv.
total_timesteps = 10_000_000
checkpoint_interval = 1_000_000
# Checkpoints saved to: domains/vms/agent/app/policy/models/
learning_rate = 0.019070502993686896
gamma = 0.9947092311365654
gae_lambda = 0.9817211156052661
clip_coef = 0.3330004439971794
ent_coef = 0.0028005893553093466
vf_coef = 3.292769981187723
vf_clip_coef = 0.1
max_grad_norm = 1.9130472971582053
adam_beta1 = 0.9223446120784968
adam_beta2 = 0.9418904801775516
adam_eps = 4.1808405477736747e-11
minibatch_size = 1024
prio_alpha = 0.99
prio_beta0 = 0.7552965379192393
vtrace_c_clip = 2.6939928387562437
vtrace_rho_clip = 0.6513603468577192

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "arkhai-vms-provisioning"
version = "0.5.0"
license = "MIT"
description = "Async VM provisioning service"
requires-python = ">=3.12"
dependencies = [
    "arkhai-core-site>=0.1.0",
    "arkhai-core-storefront-client>=0.11.0",
    "arkhai-vms-provisioning-client>=0.1.1",
    "dynaconf>=3.0.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "python-multipart>=0.0.20",
    "dependency-injector>=4.41.0",
    "fastapi-utils>=0.8.0",
    "typing-inspect>=0.9.0",
    "pydantic>=2.7",
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "httpx>=0.28.1",
    "aiohttp>=3.9",
    "cachetools>=5.3",
    "pyyaml>=6.0",
    "cryptography>=42.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
testpaths = ["src/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
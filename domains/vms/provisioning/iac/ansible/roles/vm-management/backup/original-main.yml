- name: Reset tenant user password via root SSH access
  block:
    - name: Get VM IP address for password reset
      shell: |
        # Try multiple methods to get VM IP
        VM_IP=""
        
        # Method 1: Try domifaddr (works if VM is running)
        VM_IP=$(virsh domifaddr {{ vm_name }} 2>/dev/null | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
        
        # Method 2: If domifaddr fails, try to get IP from DHCP leases
        if [ -z "$VM_IP" ]; then
          VM_IP=$(virsh net-dhcp-leases default 2>/dev/null | grep "{{ vm_name }}" | awk '{print $5}' | cut -d'/' -f1 | head -1)
        fi
        
        # Method 3: If still no IP, check if we can get it from inventory or arp table
        if [ -z "$VM_IP" ]; then
          # Try to get MAC address first, then look up in ARP table
          MAC_ADDR=$(virsh domiflist {{ vm_name }} 2>/dev/null | awk 'NR>2 && NF>1 {print $5}' | head -1)
          if [ -n "$MAC_ADDR" ]; then
            VM_IP=$(arp -a | grep -i "$MAC_ADDR" | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
          fi
        fi
        
        if [ -z "$VM_IP" ]; then
          echo "ERROR: Could not determine VM IP address"
          echo "VM may not be running or may not have obtained an IP address"
          exit 1
        fi
        
        echo "$VM_IP"
      register: vm_ip_discovery
      delegate_to: "{{ target_host }}"
    
    - name: Set VM IP for password reset
      set_fact:
        vm_ip: "{{ vm_ip_discovery.stdout.strip() }}"
      when: vm_ip_discovery.rc == 0
    
    - name: Generate new tenant password
      set_fact:
        new_tenant_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
    
    - name: Reset tenant password on VM
      shell: |
        # Connect to VM using root SSH key and reset tenant password
        ssh -i ~/.ssh/{{ vm_root_ssh_filename }} \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=10 \
            root@{{ vm_ip }} \
            "echo '{{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}:{{ new_tenant_password }}' | chpasswd && echo 'Password reset completed for user {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}'"
      register: password_reset_result
      delegate_to: "{{ target_host }}"
    
    - name: Get current timestamp for password reset
      shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
      register: password_reset_timestamp
      delegate_to: localhost
    
    - name: Create JSON data structure for password reset
      set_fact:
        vm_password_reset_data:
          action: "reset_password"
          vm_name: "{{ vm_name }}"
          timestamp: "{{ password_reset_timestamp.stdout }}"
          host: "{{ target_host }}"
          status: "{{ 'success' if (password_reset_result is defined and password_reset_result.rc == 0) else 'failed' }}"
          tenant_user: "{{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}"
          new_password: "{{ new_tenant_password }}"
          vm_ip: "{{ vm_ip | default('unknown') }}"
          ssh_access:
            command: "ssh {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@{{ vm_ip | default('<vm_ip>') }}"
            note: "Both root and tenant users support SSH key and password authentication"
          error: "{{ password_reset_result.stderr | default('') if password_reset_result is defined and password_reset_result.rc != 0 else '' }}"
    
    
    - name: Display password reset result
      debug:
        msg:
          - "Tenant password reset completed successfully"
          - "VM: {{ vm_name }}"
          - "Tenant User: {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}"
          - "New Password: {{ new_tenant_password }}"
          - "VM IP: {{ vm_ip | default('Use inventory or domifaddr to find IP') }}"
          - "SSH Access: ssh {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@{{ vm_ip | default('<vm_ip>') }}"
          - "Note: Both root and tenant users support SSH key and password authentication"
  when: vm_action == "reset_password"
  delegate_to: "{{ target_host }}"

# Schedule VM shutdown at specific date/time using 'at' command
- name: Validate lease_end datetime format
  fail:
    msg: "lease_end must be in format 'YYYY-MM-DD HH:MM' (e.g., '2025-12-31 23:59') - will be interpreted as UTC"
  when: 
    - vm_action == "lease_end"
    - (vm_lease_end is not defined or not vm_lease_end | regex_search('^\d{4}-\d{2}-\d{2} \d{2}:\d{2}$'))

- name: Check if 'at' package is installed
  shell: |
    if ! command -v at >/dev/null 2>&1; then
      echo "ERROR: 'at' command not found. Please install the 'at' package first."
      echo "On Ubuntu/Debian: sudo apt install at"
      echo "On RHEL/CentOS: sudo yum install at" 
      echo "On Fedora: sudo dnf install at"
      exit 1
    fi
    echo "'at' command is available"
  when: vm_action == "lease_end"
  register: at_check_result
  delegate_to: "{{ target_host }}"

- name: Schedule VM shutdown using at command with UTC timezone
  shell: |
    # Check if at service is running
    if ! systemctl is-active --quiet atd; then
      systemctl start atd
      if ! systemctl is-active --quiet atd; then
        echo "ERROR: Failed to start atd service"
        exit 1
      fi
    fi
    
    # Convert input datetime and validate
    LEASE_TIME="{{ vm_lease_end }}"
    echo "Scheduling VM {{ vm_name }} shutdown at $LEASE_TIME UTC"
    
    if ! TZ=UTC date -d "$LEASE_TIME" >/dev/null 2>&1; then
      echo "ERROR: Invalid datetime format '$LEASE_TIME'. Use 'YYYY-MM-DD HH:MM' format."
      exit 1
    fi
    
    # Check if time is in future
    CURRENT_UTC_EPOCH=$(TZ=UTC date +%s)
    LEASE_UTC_EPOCH=$(TZ=UTC date -d "$LEASE_TIME" +%s)
    
    if [ $LEASE_UTC_EPOCH -le $CURRENT_UTC_EPOCH ]; then
      echo "ERROR: Time '$LEASE_TIME UTC' is in the past. Current UTC: $(TZ=UTC date)"
      exit 1
    fi
    
    # Convert to format 'at' accepts and schedule
    AT_DATE=$(TZ=UTC date -d "$LEASE_TIME" "+%H:%M %m/%d/%Y")
    AT_OUTPUT=$(TZ=UTC echo "virsh shutdown {{ vm_name }} #LEASE:{{ vm_name }}" | TZ=UTC at "$AT_DATE" 2>&1)
    AT_EXIT_CODE=$?
    
    # Try alternative format if first fails
    if [ $AT_EXIT_CODE -ne 0 ]; then
      AT_DATE=$(TZ=UTC date -d "$LEASE_TIME" "+%m/%d/%Y %H:%M")
      AT_OUTPUT=$(TZ=UTC echo "virsh shutdown {{ vm_name }} #LEASE:{{ vm_name }}" | TZ=UTC at "$AT_DATE" 2>&1)
      AT_EXIT_CODE=$?
    fi
    
    if [ $AT_EXIT_CODE -ne 0 ]; then
      echo "ERROR: Failed to schedule job - $AT_OUTPUT"
      exit 1
    fi
    
    # Verify job was scheduled
    sleep 1
    JOB_NUM=$(atq | tail -1 | awk '{print $1}')
    if [ -z "$JOB_NUM" ]; then
      echo "ERROR: No job scheduled"
      exit 1
    fi
    
    echo "SUCCESS: Job $JOB_NUM scheduled - shutdown at $LEASE_TIME UTC"
    echo "Active jobs: $(atq | wc -l)"
  when: vm_action == "lease_end"
  register: lease_end_result
  delegate_to: "{{ target_host }}"

- name: Get current timestamp for lease_end
  shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
  register: lease_end_timestamp
  when: 
    - vm_action == "lease_end"
    - lease_end_result is defined
  delegate_to: localhost

- name: Create JSON data structure for lease_end action
  set_fact:
    vm_lease_end_data:
      action: "lease_end"
      vm_name: "{{ vm_name }}"
      timestamp: "{{ lease_end_timestamp.stdout }}"
      host: "{{ target_host }}"
      status: "{{ 'success' if (lease_end_result is defined and lease_end_result.rc == 0) else 'failed' }}"
      scheduled_shutdown_utc: "{{ vm_lease_end }} UTC"
      timezone_info: "Input time treated as UTC, scheduled accordingly"
      at_command: "virsh shutdown {{ vm_name }}"
      scheduled_jobs: "{{ lease_end_result.stdout_lines | select('match', '.*[0-9]+.*') | list if lease_end_result is defined else [] }}"
      error: "{{ lease_end_result.stderr | default('') if lease_end_result.rc != 0 else '' }}"
  when: 
    - vm_action == "lease_end"
    - lease_end_result is defined

- name: Display lease_end scheduling result
  debug:
    msg:
      - "VM {{ vm_name }} shutdown scheduled for {{ vm_lease_end }} UTC"
      - "Host: {{ target_host }}"
      - "Status: {{ 'Success' if lease_end_result.rc == 0 else 'Failed' }}"
  when: 
    - vm_action == "lease_end"
    - lease_end_result is defined
    - lease_end_result.rc == 0

# Remove scheduled VM lease end jobs
- name: Check if 'at' package is installed for lease_remove
  shell: |
    if ! command -v at >/dev/null 2>&1; then
      echo "ERROR: 'at' command not found. Please install the 'at' package first."
      echo "On Ubuntu/Debian: sudo apt install at"
      echo "On RHEL/CentOS: sudo yum install at" 
      echo "On Fedora: sudo dnf install at"
      exit 1
    fi
    echo "'at' command is available for lease removal"
  when: vm_action == "lease_remove"
  register: at_remove_check_result
  delegate_to: "{{ target_host }}"

- name: Remove scheduled lease end jobs for VM
  shell: |
    echo "Searching for lease jobs for VM {{ vm_name }}"
    
    # Find all lease jobs using the improved command
    echo "=== Current lease jobs ==="
    for id in $(atq | awk '{print $1}'); do
      at -c "$id" | grep -H "LEASE:" && echo "→ Job ID: $id"
    done
    
    echo "=== Removing jobs for VM {{ vm_name }} ==="
    REMOVED_JOBS=""
    JOBS_FOUND=0
    
    for id in $(atq | awk '{print $1}'); do
      if at -c "$id" 2>/dev/null | grep -q "LEASE:{{ vm_name }}"; then
        echo "Found lease job $id for VM {{ vm_name }}"
        JOBS_FOUND=$((JOBS_FOUND + 1))
        if atrm "$id" 2>/dev/null; then
          echo "Removed job $id"
          if [ -z "$REMOVED_JOBS" ]; then
            REMOVED_JOBS="$id"
          else
            REMOVED_JOBS="$REMOVED_JOBS,$id"
          fi
        else
          echo "Failed to remove job $id"
        fi
      fi
    done
    
    if [ $JOBS_FOUND -eq 0 ]; then
      echo "ERROR: No lease jobs found for VM {{ vm_name }}"
      echo "REMOVED_JOBS=none"
      echo "OPERATION_STATUS=no_jobs_found"
      exit 1
    elif [ -z "$REMOVED_JOBS" ]; then
      echo "ERROR: Failed to remove jobs"
      echo "REMOVED_JOBS=none"
      echo "OPERATION_STATUS=removal_failed"
      exit 1
    else
      echo "SUCCESS: Removed jobs $REMOVED_JOBS for VM {{ vm_name }}"
      echo "REMOVED_JOBS=$REMOVED_JOBS"
      echo "OPERATION_STATUS=success"
    fi
  when: vm_action == "lease_remove"
  register: lease_remove_result
  delegate_to: "{{ target_host }}"
  failed_when: lease_remove_result.rc != 0

- name: Get current timestamp for lease_remove
  shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
  register: lease_remove_timestamp
  when: 
    - vm_action == "lease_remove"
    - lease_remove_result is defined
  delegate_to: localhost

- name: Extract removed job IDs from lease_remove result
  set_fact:
    removed_job_ids: "{{ lease_remove_result.stdout_lines | select('match', '^REMOVED_JOBS=.*') | first | regex_replace('^REMOVED_JOBS=', '') | default('none') }}"
  when:
    - vm_action == "lease_remove"
    - lease_remove_result is defined

- name: Extract operation status from lease_remove result
  set_fact:
    operation_status: "{{ lease_remove_result.stdout_lines | select('match', '^OPERATION_STATUS=.*') | first | regex_replace('^OPERATION_STATUS=', '') | default('unknown') }}"
  when:
    - vm_action == "lease_remove"
    - lease_remove_result is defined

- name: Create JSON data structure for lease_remove action
  set_fact:
    vm_lease_remove_data:
      action: "lease_remove"
      vm_name: "{{ vm_name }}"
      timestamp: "{{ lease_remove_timestamp.stdout }}"
      host: "{{ target_host }}"
      status: "{{ 'success' if (lease_remove_result is defined and lease_remove_result.rc == 0) else 'failed' }}"
      operation_result: "{{ operation_status | default('unknown') }}"
      removed_jobs: "{{ removed_job_ids.split(',') if removed_job_ids != 'none' else [] }}"
      jobs_found: "{{ 'yes' if removed_job_ids != 'none' else 'no' }}"
      remaining_jobs: "{{ lease_remove_result.stdout_lines | select('match', '.*[0-9]+.*') | list if lease_remove_result is defined else [] }}"
      error: "{{ lease_remove_result.stderr | default('') if lease_remove_result is defined and lease_remove_result.rc != 0 else '' }}"
      error_message: "{{ 'No lease jobs found for this VM' if operation_status == 'no_jobs_found' else ('Job removal failed' if operation_status == 'removal_failed' else '') }}"
  when: 
    - vm_action == "lease_remove"
    - lease_remove_result is defined

- name: Display lease_remove result
  debug:
    msg:
      - "VM {{ vm_name }} lease jobs removed: {{ removed_job_ids }}"
      - "Host: {{ target_host }}"
      - "Status: {{ 'Success' if lease_remove_result.rc == 0 else 'Failed' }}"
  when: 
    - vm_action == "lease_remove"
    - lease_remove_result is defined
    - lease_remove_result.rc == 0

- name: Get VM IP before undefining (for cleanup)
  shell: |
    # Try multiple methods to get VM IP
    VM_IP=""
    
    # Method 1: Try domifaddr (works if VM is running)
    VM_IP=$(virsh domifaddr {{ vm_name }} 2>/dev/null | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
    
    # Method 2: If domifaddr fails, try to get IP from DNAT rules
    if [ -z "$VM_IP" ]; then
      VM_IP=$(iptables -t nat -L PREROUTING -n | grep ":22$" | grep -oE 'to:[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:22' | cut -d: -f2 | head -1)
    fi
    
    # Method 3: If still no IP, try from FORWARD rules
    if [ -z "$VM_IP" ]; then
      VM_IP=$(iptables -L FORWARD -n | grep "dpt:22" | grep -oE '192\.168\.122\.[0-9]+' | head -1)
    fi
    
    echo "$VM_IP"
  register: vm_ip_for_cleanup
  ignore_errors: yes
  when: vm_action == "undefine"
  delegate_to: "{{ target_host }}"

- name: Clean up iptables port forwarding rules
  shell: |
    echo "=== Cleaning up port forwarding rules for VM {{ vm_name }} ==="
    
    VM_IP="{{ vm_ip_for_cleanup.stdout | default('') | trim }}"
    
    if [ -n "$VM_IP" ]; then
      echo "VM IP found: $VM_IP - removing specific rules"
      
      # Remove DNAT rules (PREROUTING chain) - targeting specific VM IP
      echo "Removing DNAT rules for VM IP $VM_IP..."
      iptables -t nat -L PREROUTING -n --line-numbers | grep "to:$VM_IP:22" | awk '{print $1}' | sort -nr | while read line; do
        if [ -n "$line" ]; then
          echo "Removing DNAT rule line $line"
          iptables -t nat -D PREROUTING $line
        fi
      done
      
      # Remove POSTROUTING MASQUERADE rules for specific VM
      echo "Removing POSTROUTING MASQUERADE rules for VM IP $VM_IP..."
      iptables -t nat -L POSTROUTING -n --line-numbers | grep "MASQUERADE.*$VM_IP" | awk '{print $1}' | sort -nr | while read line; do
        if [ -n "$line" ]; then
          echo "Removing MASQUERADE rule line $line"
          iptables -t nat -D POSTROUTING $line
        fi
      done
      
      # Remove FORWARD rules for specific VM (both directions)
      echo "Removing FORWARD rules for VM IP $VM_IP..."
      
      # Remove FORWARD rules where VM IP is destination (incoming SSH)
      iptables -L FORWARD -n --line-numbers | grep "ACCEPT.*$VM_IP.*dpt:22" | awk '{print $1}' | sort -nr | while read line; do
        if [ -n "$line" ]; then
          echo "Removing FORWARD rule (incoming SSH) line $line"
          iptables -D FORWARD $line
        fi
      done
      
      # Remove FORWARD rules where VM IP is source (outgoing SSH)
      iptables -L FORWARD -n --line-numbers | grep "ACCEPT.*$VM_IP.*spt:22" | awk '{print $1}' | sort -nr | while read line; do
        if [ -n "$line" ]; then
          echo "Removing FORWARD rule (outgoing SSH) line $line"
          iptables -D FORWARD $line
        fi
      done
      
    else
      echo "VM IP not found - attempting cleanup by removing SSH-related rules in 192.168.122.x range"
      
      # Cleanup orphaned rules that might belong to the VM
      echo "Removing orphaned DNAT rules..."
      iptables -t nat -L PREROUTING -n --line-numbers | grep "192\.168\.122\." | grep ":22$" | awk '{print $1}' | sort -nr | while read line; do
        if [ -n "$line" ]; then
          echo "Removing orphaned DNAT rule line $line"
          iptables -t nat -D PREROUTING $line
        fi
      done
      
      echo "Removing orphaned FORWARD rules..."
      iptables -L FORWARD -n --line-numbers | grep "192\.168\.122\." | grep "dpt:22\|spt:22" | awk '{print $1}' | sort -nr | while read line; do
        if [ -n "$line" ]; then
          echo "Removing orphaned FORWARD rule line $line"
          iptables -D FORWARD $line
        fi
      done
    fi
    
    echo "=== Port forwarding cleanup completed ==="
  when: vm_action == "undefine"
  delegate_to: "{{ target_host }}"

- name: Check if VM has attached GPU before undefine
  shell: |
    # Check if VM has any GPU (hostdev) attached
    GPU_ATTACHED=$(virsh dumpxml {{ vm_name }} 2>/dev/null | grep -A 5 "hostdev.*pci" | grep "address.*domain" | sed "s/.*domain='\([^']*\)'.*bus='\([^']*\)'.*slot='\([^']*\)'.*function='\([^']*\)'.*/\1:\2:\3.\4/" || echo "")
    if [ ! -z "$GPU_ATTACHED" ]; then
      echo "GPU_ATTACHED=true"
      echo "GPU_PCI=$GPU_ATTACHED"
      GPU_MODEL=$(lspci -s ${GPU_ATTACHED#0000:} 2>/dev/null | grep -i "vga\|3d\|display" | cut -d: -f3- || echo "Unknown GPU")
      echo "GPU_MODEL=$GPU_MODEL"
    else
      echo "GPU_ATTACHED=false"
    fi
  register: vm_gpu_status
  when: vm_action == "undefine"
  delegate_to: "{{ target_host }}"
  ignore_errors: yes

- name: Display GPU detachment information
  debug:
    msg:
      - "=== GPU Status for VM {{ vm_name }} ==="
      - "{{ vm_gpu_status.stdout_lines }}"
      - ""
      - "{% if 'GPU_ATTACHED=true' in vm_gpu_status.stdout %}GPU will be returned to the available pool after VM is undefined.{% else %}No GPU attached to this VM.{% endif %}"
  when: 
    - vm_action == "undefine"
    - vm_gpu_status is defined

- name: Check if VM is running before undefine
  shell: virsh domstate {{ vm_name }}
  register: vm_state_check
  when: vm_action == "undefine"
  delegate_to: "{{ target_host }}"

- name: Fail if VM is running
  fail:
    msg: |
      Cannot undefine VM '{{ vm_name }}' - VM is currently running (state: {{ vm_state_check.stdout }}).
      
      Please stop the VM first using one of these methods:
      1. Graceful shutdown: ansible-playbook ... -e vm_action=shutdown
      2. Force stop: ansible-playbook ... -e vm_action=destroy
      
      Then retry the undefine operation.
  when:
    - vm_action == "undefine"
    - vm_state_check is defined
    - vm_state_check.stdout == "running"

- name: Detach GPU from VM before undefine (if attached)
  shell: |
    # Extract PCI address components
    GPU_PCI=$(echo "{{ vm_gpu_status.stdout }}" | grep "GPU_PCI=" | cut -d= -f2)
    if [ ! -z "$GPU_PCI" ]; then
      # Parse PCI address: domain:bus:slot.function
      DOMAIN=$(echo $GPU_PCI | cut -d: -f1)
      BUS=$(echo $GPU_PCI | cut -d: -f2)
      SLOT=$(echo $GPU_PCI | cut -d: -f3 | cut -d. -f1)
      FUNC=$(echo $GPU_PCI | cut -d. -f2)
      
      # Create hostdev XML for detachment
      cat > /tmp/{{ vm_name }}_gpu_detach.xml <<EOF
    <hostdev mode='subsystem' type='pci'>
      <source>
        <address domain='$DOMAIN' bus='$BUS' slot='$SLOT' function='$FUNC'/>
      </source>
    </hostdev>
    EOF
      
      # Try to detach if VM is running
      if virsh list --state-running --name | grep -q "^{{ vm_name }}$"; then
        echo "VM is running, attempting live GPU detachment..."
        virsh detach-device {{ vm_name }} /tmp/{{ vm_name }}_gpu_detach.xml --live --config || echo "Live detach failed, will remove with undefine"
      else
        echo "VM is not running, GPU will be released when VM is undefined"
      fi
      
      rm -f /tmp/{{ vm_name }}_gpu_detach.xml
      
      echo "GPU $GPU_PCI will be returned to available pool"
    fi
  register: gpu_detach_result
  when: 
    - vm_action == "undefine"
    - vm_gpu_status is defined
    - "'GPU_ATTACHED=true' in vm_gpu_status.stdout"
  delegate_to: "{{ target_host }}"

- name: Clean up firewall rules for external ports
  shell: |
    echo "=== Cleaning up firewall rules ==="
    
    # Try to find SSH keys to determine the external port used
    SSH_KEY_FILES="/tmp/{{ vm_name }}_*_ed25519"
    
    # Check if we can determine the port from existing firewall rules or other sources
    VM_IP="{{ vm_ip_for_cleanup.stdout | default('') }}"
    
    if [ -n "$VM_IP" ]; then
      # Find the external port by looking at DNAT rules
      EXTERNAL_PORT=$(iptables -t nat -L PREROUTING -n | grep "to:$VM_IP:22" | awk '{print $4}' | cut -d: -f2 | head -1)
      
      if [ -n "$EXTERNAL_PORT" ] && [ "$EXTERNAL_PORT" != "22" ]; then
        echo "Found external port $EXTERNAL_PORT for VM IP $VM_IP"
        
        # Remove UFW rules if UFW is active
        if command -v ufw >/dev/null 2>&1 && ufw status | grep -q "Status: active"; then
          echo "Removing UFW rule for port $EXTERNAL_PORT"
          ufw delete allow $EXTERNAL_PORT/tcp || echo "UFW rule removal failed or rule not found"
        fi
        
        # Remove firewalld rules if firewalld is active
        if command -v firewall-cmd >/dev/null 2>&1 && systemctl is-active --quiet firewalld; then
          echo "Removing firewalld rule for port $EXTERNAL_PORT"
          firewall-cmd --permanent --remove-port=$EXTERNAL_PORT/tcp || echo "Firewalld rule removal failed or rule not found"
          firewall-cmd --reload || echo "Firewalld reload failed"
        fi
        
        # Remove direct iptables INPUT rules for the external port
        echo "Removing INPUT rules for port $EXTERNAL_PORT"
        iptables -L INPUT -n --line-numbers | grep "dpt:$EXTERNAL_PORT" | awk '{print $1}' | sort -nr | while read line; do
          if [ -n "$line" ]; then
            echo "Removing INPUT rule line $line"
            iptables -D INPUT $line
          fi
        done
      else
        echo "Could not determine external port for cleanup"
      fi
    else
      echo "VM IP not available for port cleanup"
    fi
    
    echo "=== Firewall cleanup completed ==="
  when: vm_action == "undefine"
  delegate_to: "{{ target_host }}"

- name: Save iptables rules after cleanup
  shell: |
    if command -v iptables-save >/dev/null 2>&1; then
      if [ -f /etc/iptables/rules.v4 ]; then
        iptables-save > /etc/iptables/rules.v4
      elif [ -d /etc/sysconfig ]; then
        iptables-save > /etc/sysconfig/iptables
      elif [ -f /etc/iptables.rules ]; then
        iptables-save > /etc/iptables.rules
      else
        iptables-save > /etc/iptables.rules
      fi
      echo "Iptables rules saved after cleanup"
    fi
  when: vm_action == "undefine"
  delegate_to: "{{ target_host }}"

- name: Clean up VM-related files
  shell: |
    echo "=== Cleaning up VM-related files for {{ vm_name }} ==="
    
    vm_image_type={{ vm_image_type }}

    # Remove SSH keys from ~/.ssh
    echo "Removing SSH keys from ~/.ssh..."
    if [ "$vm_image_type" == "scratch" ]; then
      rm -f ~/.ssh/{{ vm_root_ssh_filename }} ~/.ssh/{{ vm_root_ssh_filename }}.pub
    fi
    rm -f ~/.ssh/{{ vm_name }}_tenant_ed25519 ~/.ssh/{{ vm_name }}_tenant_ed25519.pub
    
    # Remove any remaining SSH keys from /tmp (pattern matching for any random string)
    echo "Removing any remaining SSH keys from /tmp..."
    rm -f /tmp/{{ vm_name }}_*_ed25519 /tmp/{{ vm_name }}_*_ed25519.pub
    
    # Remove cloud-init directories (pattern matching)
    echo "Removing cloud-init directories..."
    rm -rf /tmp/cloudinit_{{ vm_name }}_*
    
    # Remove cloud-init ISO
    echo "Removing cloud-init ISO..."
    rm -f /var/lib/libvirt/images/{{ vm_name }}-init.iso
    
    # List what files remain (for verification)
    echo "Remaining files with VM name:"
    find /tmp ~/.ssh /var/lib/libvirt/images -name "*{{ vm_name }}*" 2>/dev/null || echo "No remaining files found"
    
    echo "=== File cleanup completed ==="
  when: vm_action == "undefine"
  delegate_to: "{{ target_host }}"

- name: Get VM MAC address for DHCP lease removal
  shell: virsh domiflist {{ vm_name }} 2>/dev/null | grep -oE '([0-9a-f]{2}:){5}[0-9a-f]{2}' | head -1
  register: vm_mac_for_cleanup
  ignore_errors: yes
  when: vm_action == "undefine"
  delegate_to: "{{ target_host }}"

- name: Remove static DHCP lease for VM
  shell: |
    VM_MAC="{{ vm_mac_for_cleanup.stdout }}"
    
    if [ -z "$VM_MAC" ]; then
      echo "No MAC address found for VM {{ vm_name }}, skipping DHCP lease removal"
    else
      # Check if lease exists
      if virsh net-dumpxml default | grep -q "$VM_MAC"; then
        # Remove static DHCP host entry from the default network
        virsh net-update default delete ip-dhcp-host \
          "<host mac='$VM_MAC'/>" \
          --live --config || echo "DHCP lease removal failed or already removed"
        echo "Static DHCP lease removed for MAC $VM_MAC"
      else
        echo "No static DHCP lease found for MAC $VM_MAC"
      fi
    fi
  when:
    - vm_action == "undefine"
    - vm_mac_for_cleanup is defined
  delegate_to: "{{ target_host }}"

- name: Remove VM definition and storage
  shell: virsh undefine {{ vm_name }} --remove-all-storage --nvram
  register: undefine_result
  when: vm_action == "undefine"
  delegate_to: "{{ target_host }}"

- name: Get current timestamp for undefine action
  shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
  register: undefine_timestamp
  when: vm_action == "undefine"
  delegate_to: localhost

- name: Create JSON data structure for VM undefine
  set_fact:
    vm_undefine_data:
      action: "undefine"
      vm_name: "{{ vm_name }}"
      timestamp: "{{ undefine_timestamp.stdout }}"
      host: "{{ target_host }}"
      status: "{{ 'success' if (undefine_result is defined and undefine_result.rc == 0) else 'failed' }}"
      operation_initiated: "{{ 'yes' if undefine_result is defined else 'no' }}"
      vm_ip_cleaned: "{{ vm_ip_for_cleanup.stdout | default('unknown') }}"
      cleanup_operations:
        port_forwarding_rules: "cleaned"
        ssh_keys: "removed"
        cloud_init_files: "removed"
        vm_storage: "{{ 'removed' if undefine_result is defined and undefine_result.rc == 0 else 'may still exist' }}"
        downloaded_keys: "removed from local directory"
        inventory: "{{ 'updated' if (tenant_id is not defined or tenant_id == '') else 'not applicable' }}"
      result_message: "{{ undefine_result.stdout if undefine_result is defined else 'No output' }}"
      error: "{{ undefine_result.stderr | default('') if undefine_result is defined and undefine_result.rc != 0 else '' }}"
      note: "VM definition and all associated files have been permanently removed"
  when: vm_action == "undefine"

- name: Display undefine result
  debug:
    msg: 
      - "VM {{ vm_name }} undefine result: {{ undefine_result.stdout }}"
      - "Port forwarding rules cleaned up for VM"
  when: vm_action == "undefine" and undefine_result is defined

- name: Clean up local downloaded SSH keys
  block:
    - name: Remove downloaded tenant SSH keys from local keys directory
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ playbook_dir }}/../../keys/{{ vm_name }}_tenant_private_key"
        - "{{ playbook_dir }}/../../keys/{{ vm_name }}_tenant_public_key.pub"
      delegate_to: localhost
      ignore_errors: yes
  when: 
    - vm_action == "undefine"
    - undefine_result is defined

- name: Remove single-tenant VM from inventory
  block:
    - name: Remove VM from [kvms] group in hosts file
      lineinfile:
        path: "{{ playbook_dir }}/../../inventory/hosts"
        regexp: "^{{ vm_name }}\\s+.*ansible_host="
        state: absent
        backup: yes
      delegate_to: localhost
  when: 
    - vm_action == "undefine"
    - undefine_result is defined
    - tenant_id is not defined or tenant_id == ""

- name: Check if VM exists for monitoring
  shell: virsh list --all --name | grep -q "^{{ vm_name }}$"
  register: vm_exists_monitoring
  ignore_errors: yes
  when: vm_action == "monitor"
  delegate_to: "{{ target_host }}"

- name: Get VM performance statistics with usage percentages
  shell: |
    echo "=== VM Performance Statistics for {{ vm_name }} ==="
    
    # Check if VM exists
    if ! virsh list --all --name | grep -q "^{{ vm_name }}$"; then
      echo "ERROR: VM '{{ vm_name }}' not found"
      exit 1
    fi
    
    # Check VM state
    VM_STATE=$(virsh domstate {{ vm_name }})
    echo "VM State: $VM_STATE"
    
    if [ "$VM_STATE" != "running" ]; then
      echo "ERROR: VM is not running (state: $VM_STATE)"
      exit 2
    fi
    
    echo ""
    echo "=== Domain Statistics ==="
    virsh domstats {{ vm_name }} 2>/dev/null || echo "domstats failed"
    
    echo ""
    echo "=== CPU Statistics ==="
    # Extract CPU info from domstats (more reliable than cpu-stats)
    CPU_INFO=$(virsh domstats {{ vm_name }} | grep -E 'cpu\.|vcpu\.')
    if [ -n "$CPU_INFO" ]; then
      echo "$CPU_INFO"
    else
      echo "cpu-stats: Unable to get CPU statistics"
    fi
    
    echo ""
    echo "=== CPU Usage Calculation ==="
    # Get CPU times with 1 second interval for percentage calculation
    CPU_TIME_1=$(virsh domstats {{ vm_name }} | grep 'cpu.time=' | cut -d'=' -f2)
    sleep 1
    CPU_TIME_2=$(virsh domstats {{ vm_name }} | grep 'cpu.time=' | cut -d'=' -f2)
    VCPU_COUNT=$(virsh domstats {{ vm_name }} | grep 'vcpu.current=' | cut -d'=' -f2)
    
    if [ -n "$CPU_TIME_1" ] && [ -n "$CPU_TIME_2" ] && [ -n "$VCPU_COUNT" ]; then
      # Calculate CPU usage percentage
      CPU_DIFF=$((CPU_TIME_2 - CPU_TIME_1))
      # Convert nanoseconds to percentage (1 second = 1,000,000,000 nanoseconds)
      CPU_USAGE_PERCENT=$(echo "scale=2; ($CPU_DIFF / 1000000000) * 100 / $VCPU_COUNT" | bc -l 2>/dev/null || echo "0.00")
      echo "CPU Usage: ${CPU_USAGE_PERCENT}% (${VCPU_COUNT} vCPUs provisioned)"
    else
      echo "CPU Usage: Unable to calculate"
    fi
    
    echo ""
    echo "=== Memory Statistics with Usage ==="
    virsh dommemstat {{ vm_name }} 2>/dev/null || echo "dommemstat failed"
    
    # Get memory usage details
    MEMORY_STATS=$(virsh dommemstat {{ vm_name }} 2>/dev/null)
    if [ $? -eq 0 ]; then
      # Extract memory values (in KB)
      ACTUAL_MEM=$(echo "$MEMORY_STATS" | grep "^actual " | awk '{print $2}' || echo "0")
      AVAILABLE_MEM=$(echo "$MEMORY_STATS" | grep "^available " | awk '{print $2}' || echo "0")
      UNUSED_MEM=$(echo "$MEMORY_STATS" | grep "^unused " | awk '{print $2}' || echo "0")
      
      if [ "$AVAILABLE_MEM" -gt 0 ]; then
        USED_MEM=$((ACTUAL_MEM - UNUSED_MEM))
        MEMORY_USAGE_PERCENT=$(echo "scale=2; ($USED_MEM * 100) / $AVAILABLE_MEM" | bc -l 2>/dev/null || echo "0.00")
        echo "Memory Usage: ${MEMORY_USAGE_PERCENT}% (${USED_MEM}KB used / ${AVAILABLE_MEM}KB provisioned)"
        echo "Memory Available: $(echo "scale=2; $AVAILABLE_MEM / 1024" | bc -l)MB"
        echo "Memory Used: $(echo "scale=2; $USED_MEM / 1024" | bc -l)MB"
      else
        echo "Memory Usage: Unable to calculate percentage"
      fi
    fi
    
    echo ""
    echo "=== Block I/O Statistics ==="
    virsh domblkstat {{ vm_name }} 2>/dev/null || echo "domblkstat failed"
    
    echo ""
    echo "=== Storage Usage ==="
    
    # Method A: Get disk targets and host-side storage info
    echo "Getting disk targets:"
    DISK_TARGETS=$(virsh domblklist {{ vm_name }} 2>/dev/null | awk 'NR>2 && NF>1 {print $1}' | grep -v "^$")
    echo "Found disk targets: $DISK_TARGETS"
    
    if [ -n "$DISK_TARGETS" ]; then
      for TARGET in $DISK_TARGETS; do
        echo "=== Disk Target: $TARGET ==="
        
        # Get host-side storage info using domblkinfo
        BLKINFO=$(virsh domblkinfo {{ vm_name }} $TARGET 2>/dev/null)
        if [ $? -eq 0 ]; then
          CAPACITY=$(echo "$BLKINFO" | grep "Capacity:" | awk '{print $2}')
          ALLOCATION=$(echo "$BLKINFO" | grep "Allocation:" | awk '{print $2}')
          PHYSICAL=$(echo "$BLKINFO" | grep "Physical:" | awk '{print $2}')
          
          # Convert bytes to human readable
          if [ -n "$CAPACITY" ] && [ "$CAPACITY" != "0" ]; then
            CAPACITY_GB=$(echo "scale=2; $CAPACITY / 1024 / 1024 / 1024" | bc -l 2>/dev/null || echo "0")
            ALLOCATION_GB=$(echo "scale=2; $ALLOCATION / 1024 / 1024 / 1024" | bc -l 2>/dev/null || echo "0")
            HOST_USAGE_PERCENT=$(echo "scale=2; ($ALLOCATION * 100) / $CAPACITY" | bc -l 2>/dev/null || echo "0")
            
            echo "Host Storage Capacity: ${CAPACITY_GB}GB"
            echo "Host Storage Allocation: ${ALLOCATION_GB}GB"
            echo "Host Storage Usage: ${HOST_USAGE_PERCENT}%"
          else
            echo "Host Storage: Unable to get capacity info"
          fi
        else
          echo "domblkinfo failed for target $TARGET"
        fi
        
        echo ""
      done
    fi
    
    # Method B: Get guest filesystem info using domfsinfo (requires qemu-guest-agent)
    echo "=== Guest Filesystem Info ==="
    FSINFO=$(virsh domfsinfo {{ vm_name }} 2>/dev/null)
    if [ $? -eq 0 ] && [ -n "$FSINFO" ]; then
      echo "Guest filesystem details:"
      echo "$FSINFO"
      
      # Parse the main filesystem (usually /)
      ROOT_FS=$(echo "$FSINFO" | grep -E "^\s*/" | head -1)
      if [ -n "$ROOT_FS" ]; then
        # Extract filesystem info (columns: Mountpoint, Name, Fstype, Total, Used, Available)
        FS_TOTAL=$(echo "$ROOT_FS" | awk '{print $4}')
        FS_USED=$(echo "$ROOT_FS" | awk '{print $5}')  
        FS_AVAILABLE=$(echo "$ROOT_FS" | awk '{print $6}')
        
        if [ -n "$FS_TOTAL" ] && [ -n "$FS_USED" ] && [ "$FS_TOTAL" != "0" ]; then
          # Calculate percentage (values are already in human format from domfsinfo)
          echo "Guest Root Filesystem Total: $FS_TOTAL"
          echo "Guest Root Filesystem Used: $FS_USED"
          echo "Guest Root Filesystem Available: $FS_AVAILABLE"
          echo "Guest Storage Usage: Available from domfsinfo"
        fi
      fi
    else
      echo "Guest filesystem info not available (qemu-guest-agent may not be installed/running)"
      echo "Guest Storage Usage: N/A (requires qemu-guest-agent)"
    fi
    
    echo ""
    echo "=== Network Interface Statistics ==="
    # Get network interfaces for the VM
    INTERFACES=$(virsh domiflist {{ vm_name }} 2>/dev/null | awk 'NR>2 && NF>0 {print $1}' | grep -v "^$")
    if [ -n "$INTERFACES" ]; then
      for INTERFACE in $INTERFACES; do
        echo "Interface: $INTERFACE"
        virsh domifstat {{ vm_name }} $INTERFACE 2>/dev/null || echo "domifstat failed for interface $INTERFACE"
        echo ""
      done
    else
      echo "domifstat: No network interfaces found"
    fi
  register: vm_monitoring_raw
  when: vm_action == "monitor" and vm_exists_monitoring.rc == 0
  delegate_to: "{{ target_host }}"

- name: Fail if VM does not exist for monitoring
  fail:
    msg: |
      Cannot monitor VM '{{ vm_name }}' - VM does not exist or is not running.
      
      Available actions:
      - Check existing VMs: virsh list --all
      - Create VM: Use vm_action=create
      - List all VMs: Use vm_action=list
  when: vm_action == "monitor" and (vm_exists_monitoring is not defined or vm_exists_monitoring.rc != 0)

- name: Get current timestamp
  shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
  register: current_timestamp
  when: vm_action == "monitor"
  delegate_to: localhost

- name: Parse VM monitoring data into structured format
  set_fact:
    vm_monitoring_data:
      vm_name: "{{ vm_name }}"
      timestamp: "{{ current_timestamp.stdout }}"
      host: "{{ target_host }}"
      status: "{{ 'success' if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'failed' }}"
      vm_state: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^VM State:.*') | list | first | default('VM State: unknown') | regex_replace('^VM State: ', '')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'unknown' }}"
      cpu_usage_percent: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^CPU Usage:.*%.*') | list | first | default('CPU Usage: N/A%') | regex_replace('^CPU Usage: ([0-9.]+|N/A)%.*$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      cpu_vcpus_provisioned: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^CPU Usage:.*vCPUs provisioned.*') | list | first | default('(N/A vCPUs provisioned)') | regex_replace('.*\\(([0-9]+|N/A) vCPUs provisioned\\).*', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      memory_usage_percent: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Memory Usage:.*%.*') | list | first | default('Memory Usage: N/A%') | regex_replace('^Memory Usage: ([0-9.]+|N/A)%.*$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      memory_used_mb: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Memory Used:.*MB$') | list | first | default('Memory Used: N/AMB') | regex_replace('^Memory Used: ([0-9.]+|N/A)MB$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      memory_available_mb: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Memory Available:.*MB$') | list | first | default('Memory Available: N/AMB') | regex_replace('^Memory Available: ([0-9.]+|N/A)MB$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      host_storage_capacity_gb: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Host Storage Capacity:.*GB$') | list | first | default('Host Storage Capacity: N/AGB') | regex_replace('^Host Storage Capacity: ([0-9.]+|N/A)GB$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      host_storage_allocation_gb: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Host Storage Allocation:.*GB$') | list | first | default('Host Storage Allocation: N/AGB') | regex_replace('^Host Storage Allocation: ([0-9.]+|N/A)GB$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      host_storage_usage_percent: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Host Storage Usage:.*%$') | list | first | default('Host Storage Usage: N/A%') | regex_replace('^Host Storage Usage: ([0-9.]+|N/A)%$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      guest_storage_total: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Guest Root Filesystem Total:.*') | list | first | default('Guest Root Filesystem Total: N/A') | regex_replace('^Guest Root Filesystem Total: (.*)$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      guest_storage_used: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Guest Root Filesystem Used:.*') | list | first | default('Guest Root Filesystem Used: N/A') | regex_replace('^Guest Root Filesystem Used: (.*)$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      guest_storage_available: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Guest Root Filesystem Available:.*') | list | first | default('Guest Root Filesystem Available: N/A') | regex_replace('^Guest Root Filesystem Available: (.*)$', '\\1')) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else 'N/A' }}"
      network_interfaces: "{{ (vm_monitoring_raw.stdout_lines | default([]) | select('match', '^Interface:.*') | list | map('regex_replace', '^Interface: (.*)$', '\\1') | list) if (vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0) else [] }}"
      error: "{{ vm_monitoring_raw.stderr | default('VM monitoring failed') if vm_monitoring_raw is defined and vm_monitoring_raw.rc != 0 else 'VM not found or not running' if vm_monitoring_raw is not defined else '' }}"
  when: vm_action == "monitor" and current_timestamp is defined

- name: Generate VM monitoring summary
  set_fact:
    monitoring_summary: |
      VM MONITORING SUMMARY for {{ vm_name }}
      {% if vm_monitoring_raw is defined and vm_monitoring_raw.rc == 0 %}
      Status: VM is running and accessible
      Timestamp: {{ current_timestamp.stdout }}
      Host: {{ target_host }}
      
      KEY METRICS:
      {% set stats_found = false %}
      {% for line in vm_monitoring_raw.stdout_lines %}
        {% if 'CPU Usage:' in line and '%' in line %}
          {% set stats_found = true %}
      - {{ line }}
        {% elif 'Memory Usage:' in line and '%' in line %}
      - {{ line }}
        {% elif 'Host Storage Usage:' in line and '%' in line %}
      - {{ line }}
        {% elif 'Memory Available:' in line %}
      - {{ line }}
        {% elif 'Memory Used:' in line %}
      - {{ line }}
        {% elif 'Host Storage Capacity:' in line %}
      - {{ line }}
        {% elif 'Host Storage Allocation:' in line %}
      - {{ line }}
        {% elif 'Guest Root Filesystem Total:' in line %}
      - {{ line }}
        {% elif 'Guest Root Filesystem Used:' in line %}
      - {{ line }}
        {% elif 'Guest Root Filesystem Available:' in line %}
      - {{ line }}
        {% elif 'vcpu.current=' in line %}
      - Current vCPUs: {{ line.split('=')[1] }}
        {% elif 'vcpu.maximum=' in line %}
      - Maximum vCPUs: {{ line.split('=')[1] }}
        {% elif 'balloon.current=' in line %}
      - Allocated Memory: {{ (line.split('=')[1] | int / 1024) | round(2) }} MB
        {% elif 'balloon.maximum=' in line %}
      - Maximum Memory: {{ (line.split('=')[1] | int / 1024) | round(2) }} MB
        {% elif 'rd_bytes' in line %}
      - Disk Read: {{ line.split()[1] }} bytes
        {% elif 'wr_bytes' in line %}
      - Disk Write: {{ line.split()[1] }} bytes
        {% elif 'rx_bytes' in line %}
      - Network RX: {{ line.split()[1] }} bytes
        {% elif 'tx_bytes' in line %}
      - Network TX: {{ line.split()[1] }} bytes
        {% endif %}
      {% endfor %}
      {% if not stats_found %}
      - Statistics collection in progress...
      {% endif %}
      
      COMMANDS EXECUTED:
      - virsh domstats {{ vm_name }}
      - virsh domblkstat {{ vm_name }}
      - virsh domblklist {{ vm_name }}
      - virsh domblkinfo {{ vm_name }} <target>
      - virsh domfsinfo {{ vm_name }}
      - virsh domifstat {{ vm_name }} <interface>
      - virsh dommemstat {{ vm_name }}
      {% else %}
      Status: {{ 'VM not found' if vm_exists_monitoring.rc != 0 else 'Monitoring failed' }}
      {% if vm_monitoring_raw is defined and vm_monitoring_raw.rc == 2 %}
      Reason: VM is not in running state
      {% elif vm_monitoring_raw is defined and vm_monitoring_raw.rc == 1 %}
      Reason: VM does not exist
      {% else %}
      Reason: Unknown error during monitoring
      {% endif %}
      
      TROUBLESHOOTING:
      - Check if VM exists: virsh list --all
      - Check VM state: virsh domstate {{ vm_name }}
      - Start VM if needed: virsh start {{ vm_name }}
      {% endif %}
  when: vm_action == "monitor" and current_timestamp is defined

- name: Display VM monitoring summary
  debug:
    msg: "{{ monitoring_summary.split('\n') }}"
  when: vm_action == "monitor" and monitoring_summary is defined


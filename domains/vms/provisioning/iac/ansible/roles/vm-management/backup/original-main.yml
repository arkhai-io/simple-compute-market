- name: Wait for VM to boot and be SSH-ready
  shell: |
    echo "Waiting for VM {{ vm_name }} to be SSH-ready..."
    
    # Wait for VM to be in running state
    echo "Checking VM state..."
    i=1
    while [ $i -le 60 ]; do
      VM_STATE=$(virsh domstate {{ vm_name }})
      echo "Attempt $i/60: VM state is $VM_STATE"
      if [ "$VM_STATE" = "running" ]; then
        echo "VM is running, waiting for cloud-init to complete..."
        break
      fi
      sleep 5
      i=$((i + 1))
    done
    
    if [ "$VM_STATE" != "running" ]; then
      echo "VM failed to reach running state"
      exit 1
    fi
    
    # Wait for VM to get IP address
    echo "Waiting for IP address..."
    i=1
    while [ $i -le 120 ]; do
      echo "Attempt $i/120: Checking for IP address..."
      
      # Get IP using domifaddr
      VM_IP=$(virsh domifaddr {{ vm_name }} 2>/dev/null | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
      
      if [ ! -z "$VM_IP" ]; then
        echo "Found VM IP: $VM_IP"
        
        # Test SSH connectivity
        echo "Testing SSH connectivity to $VM_IP..."
        if timeout 10 ssh -i ~/.ssh/{{ vm_root_ssh_filename }} -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@$VM_IP 'echo "SSH_READY"' 2>/dev/null | grep -q "SSH_READY"; then
          echo "VM is SSH-ready at $VM_IP"
          echo $VM_IP
          exit 0
        else
          echo "SSH not ready yet, cloud-init may still be running..."
        fi
      else                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     
        echo "No IP address found yet..."
      fi
      
      sleep 5
      i=$((i + 1))
    done
    
    echo "VM failed to become SSH-ready within timeout"
    echo "Final diagnostics:"
    echo "VM State: $(virsh domstate {{ vm_name }})"
    echo "domifaddr output:"
    virsh domifaddr {{ vm_name }} 2>/dev/null || echo "domifaddr failed"
    exit 1
  register: vm_ready_result
  when: vm_action == "create" and vm_create_result is defined
  delegate_to: "{{ target_host }}"

- name: Set VM IP from readiness check
  set_fact:
    vm_ip: "{{ vm_ready_result.stdout_lines[-1] }}"
  when: vm_action == "create" and vm_ready_result is defined and vm_ready_result.rc == 0

- name: Install GPU drivers in golden VM with GPU passthrough
  shell: |
    ssh -i ~/.ssh/{{ vm_root_ssh_filename }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@{{ vm_ip }} << 'EOF'
    if lspci | grep -qi nvidia; then
      echo "========================================"
      echo "NVIDIA GPU detected - Installing driver for passthrough"
      echo "========================================"
      export DEBIAN_FRONTEND=noninteractive
      
      # Install prerequisites
      echo "Installing kernel headers and build tools..."
      apt-get update
      apt-get install -y --no-install-recommends --quiet \
        build-essential \
        dkms \
        linux-headers-$(uname -r) \
        ubuntu-drivers-common \
        pciutils \
        wget \
        software-properties-common
      
      # Use ubuntu-drivers to auto-install latest recommended driver
      echo "Installing NVIDIA driver (this may take several minutes)..."
      ubuntu-drivers install --gpgpu nvidia 2>&1 | tee /var/log/nvidia-driver-install.log
      
      # Install CUDA Toolkit
      echo "Installing CUDA Toolkit..."
      wget -O- https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb | dpkg -i -
      add-apt-repository -y contrib
      apt-get update
      apt-get install -y --no-install-recommends --quiet cuda-toolkit 2>&1 | tee -a /var/log/cuda-install.log
      
      # Verify installation
      if nvidia-detector 2>/dev/null | head -1 | grep -q "nvidia-driver"; then
        echo "✓ NVIDIA driver detected by nvidia-detector"
        NVIDIA_DETECTED=$(nvidia-detector 2>/dev/null | head -1)
        echo "Detected driver package: $NVIDIA_DETECTED"
      else
        echo "⚠ WARNING: NVIDIA driver not detected by nvidia-detector. Installation may need completion after reboot."
      fi
      
      if command -v nvcc &> /dev/null; then
        echo "✓ CUDA Toolkit installed successfully"
        echo "CUDA version: $(nvcc --version | grep "release" | sed -n -e 's/^.*release \([0-9]\+\.[0-9]\+\).*$/\1/p')"
      else
        echo "⚠ WARNING: CUDA Toolkit not found."
      fi
      
      # Create marker file for post-reboot validation
      echo "$(date): NVIDIA driver and CUDA installed via SSH" > /var/log/nvidia-driver-ready
      echo "========================================"
      echo "NVIDIA driver and CUDA installation complete"
      echo "GPU will be fully operational after VM reboot"
      echo "========================================"
      # Reboot to activate drivers
      echo "Rebooting to activate GPU drivers"
      reboot
      
    elif lspci | grep -qi amd; then
      echo "========================================"
      echo "AMD GPU detected - Installing driver"
      echo "========================================"
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y \
        firmware-amd-graphics \
        xserver-xorg-video-amdgpu \
        mesa-vulkan-drivers \
        vulkan-tools \
        pciutils
      echo "✓ AMD driver installation complete"
      echo "========================================"
      # Reboot to activate drivers
      echo "Rebooting to activate GPU drivers"
      sudo reboot
    else
      echo "No NVIDIA or AMD GPU detected, skipping driver installation."
    fi
    EOF
  when: vm_action == "create" and vm_image_type == "golden" and vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
  delegate_to: "{{ target_host }}"

- name: Wait for VM to boot after GPU driver installation reboot
  shell: |
    echo "Waiting for VM {{ vm_name }} to be SSH-ready after GPU driver reboot..."
    bash -c 'until ssh -i ~/.ssh/{{ vm_root_ssh_filename }} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 root@{{ vm_ip }} "echo SSH ready after reboot" 2>/dev/null; do sleep 5; done'
  when: vm_action == "create" and vm_image_type == "golden" and vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
  delegate_to: "{{ target_host }}"

- name: Get VM MAC address for static DHCP lease
  shell: virsh domiflist {{ vm_name }} | grep -oE '([0-9a-f]{2}:){5}[0-9a-f]{2}' | head -1
  register: vm_mac_address
  when:
    - vm_action == "create"
    - vm_ip is defined
  delegate_to: "{{ target_host }}"

- name: Configure static DHCP lease for VM to preserve IP address
  shell: |
    VM_IP="{{ vm_ip }}"
    VM_MAC="{{ vm_mac_address.stdout }}"
    VM_NAME="{{ vm_name }}"
    
    # Check if lease already exists
    if virsh net-dumpxml default | grep -q "$VM_MAC"; then
      echo "Static DHCP lease already exists for MAC $VM_MAC"
    else
      # Add static DHCP host entry to the default network
      virsh net-update default add ip-dhcp-host \
        "<host mac='$VM_MAC' name='$VM_NAME' ip='$VM_IP'/>" \
        --live --config
      echo "Static DHCP lease configured: IP $VM_IP will always be assigned to MAC $VM_MAC"
    fi
  when:
    - vm_action == "create"
    - vm_ip is defined
    - vm_mac_address is defined
    - vm_mac_address.stdout != ""
  delegate_to: "{{ target_host }}"

- name: Set VM to autostart on host boot
  shell: virsh autostart {{ vm_name }}
  when:
    - vm_action == "create"
    - vm_ip is defined
  delegate_to: "{{ target_host }}"

- name: Set up iptables port forwarding for SSH
  shell: |
    # Enable IP forwarding
    echo 1 > /proc/sys/net/ipv4/ip_forward
    
    # Make IP forwarding persistent
    if ! grep -q "net.ipv4.ip_forward=1" /etc/sysctl.conf; then
      echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
    fi
    
    # Get the external network interface
    EXT_INTERFACE=$(ip route | grep default | awk '{print $5}' | head -1)
    echo "Using external interface: $EXT_INTERFACE"
    
    # Add DNAT rule for incoming connections
    iptables -t nat -A PREROUTING -p tcp --dport {{ external_ssh_port }} -j DNAT --to-destination {{ vm_ip }}:22
    
    # Add SNAT rule for outgoing connections from specific VM
    iptables -t nat -A POSTROUTING -p tcp -d {{ vm_ip }} --dport 22 -j MASQUERADE
    
    # Add general MASQUERADE rule for the libvirt subnet
    iptables -t nat -A POSTROUTING -s 192.168.122.0/24 -o $EXT_INTERFACE -j MASQUERADE
    
    # Allow forwarding for this specific connection
    iptables -A FORWARD -p tcp -d {{ vm_ip }} --dport 22 -j ACCEPT
    iptables -A FORWARD -p tcp -s {{ vm_ip }} --sport 22 -j ACCEPT
    
    echo "Port forwarding configured: External port {{ external_ssh_port }} -> VM {{ vm_ip }}:22"
  when: vm_action == "create" and vm_ip is defined
  delegate_to: "{{ target_host }}"

- name: Configure firewall to allow external SSH port
  shell: |
    # Prioritize UFW (common on Ubuntu/Debian/Linode)
    if command -v ufw >/dev/null 2>&1; then
      echo "Using UFW firewall method (recommended for Linode)"
      echo "Command: ufw allow {{ external_ssh_port }}/tcp"
      ufw allow {{ external_ssh_port }}/tcp
      # Also ensure UFW allows forwarding
      if ! grep -q "DEFAULT_FORWARD_POLICY=\"ACCEPT\"" /etc/default/ufw; then
        sed -i 's/DEFAULT_FORWARD_POLICY="DROP"/DEFAULT_FORWARD_POLICY="ACCEPT"/' /etc/default/ufw
        echo "Updated UFW forward policy to ACCEPT"
      fi
      echo "UFW rule added for port {{ external_ssh_port }}"
      echo "FIREWALL_METHOD=UFW"
    # Check if firewalld is installed and active
    elif command -v firewall-cmd >/dev/null 2>&1 && systemctl is-active --quiet firewalld; then
      echo "Using firewalld method"
      echo "Commands: firewall-cmd --permanent --add-port={{ external_ssh_port }}/tcp && firewall-cmd --reload"
      firewall-cmd --permanent --add-port={{ external_ssh_port }}/tcp
      firewall-cmd --reload
      echo "Firewalld rule added for port {{ external_ssh_port }}"
      echo "FIREWALL_METHOD=FIREWALLD"
    # Fallback to iptables INPUT rule
    else
      echo "Using direct iptables method"
      echo "Command: iptables -A INPUT -p tcp --dport {{ external_ssh_port }} -j ACCEPT"
      iptables -A INPUT -p tcp --dport {{ external_ssh_port }} -j ACCEPT
      echo "Direct iptables rule added for port {{ external_ssh_port }}"
      echo "FIREWALL_METHOD=IPTABLES"
    fi
  register: firewall_config_result
  when: vm_action == "create" and external_ssh_port is defined
  delegate_to: "{{ target_host }}"

- name: Debug firewall configuration
  debug:
    msg: 
      - "=== Firewall Configuration for Port {{ external_ssh_port }} ==="
      - "{{ firewall_config_result.stdout_lines | join('\n') }}"
  when: vm_action == "create" and external_ssh_port is defined and firewall_config_result is defined

- name: Extract and display firewall method used
  debug:
    msg: "Firewall method: {{ firewall_config_result.stdout_lines | select('match', '^FIREWALL_METHOD=.*') | first | default('UNKNOWN') | regex_replace('^FIREWALL_METHOD=', '') }}"
  when: vm_action == "create" and external_ssh_port is defined and firewall_config_result is defined

- name: Verify port is open using netstat/ss
  shell: |
    echo "Checking if port {{ external_ssh_port }} is accessible..."
    
    # Check if port is listening (should show iptables DNAT rule working)
    echo "Active listening ports:"
    if command -v ss >/dev/null 2>&1; then
      ss -tuln | grep ":{{ external_ssh_port }} " || echo "Port {{ external_ssh_port }} not found in listening ports (this is expected for DNAT)"
    else
      netstat -tuln | grep ":{{ external_ssh_port }} " || echo "Port {{ external_ssh_port }} not found in listening ports (this is expected for DNAT)"
    fi
    
    echo ""
    echo "Checking iptables NAT rules for port {{ external_ssh_port }}:"
    iptables -t nat -L PREROUTING -n | grep "{{ external_ssh_port }}" || echo "No NAT rule found for port {{ external_ssh_port }}"
    
    echo ""
    echo "Checking iptables INPUT rules for port {{ external_ssh_port }}:"
    iptables -L INPUT -n | grep "{{ external_ssh_port }}" || echo "No INPUT rule found for port {{ external_ssh_port }}"
  register: port_verification_result
  when: vm_action == "create" and external_ssh_port is defined
  delegate_to: "{{ target_host }}"

- name: Display port verification results
  debug:
    msg: 
      - "=== Port {{ external_ssh_port }} verification results ==="
      - "{{ port_verification_result.stdout_lines | join('\n') }}"
  when: vm_action == "create" and external_ssh_port is defined and port_verification_result is defined

- name: Save iptables rules
  shell: |
    # Try different methods to save iptables rules based on the system
    if command -v iptables-save >/dev/null 2>&1; then
      if [ -f /etc/iptables/rules.v4 ]; then
        iptables-save > /etc/iptables/rules.v4
      elif [ -d /etc/sysconfig ]; then
        iptables-save > /etc/sysconfig/iptables
      else
        # Create a simple service file to restore rules on boot
        mkdir -p /etc/systemd/system
        cat > /etc/systemd/system/iptables-restore.service << 'EOF'
    [Unit]
    Description=Restore iptables rules
    After=network.target
    
    [Service]
    Type=oneshot
    ExecStart=/sbin/iptables-restore < /etc/iptables.rules
    RemainAfterExit=yes
    
    [Install]
    WantedBy=multi-user.target
    EOF
        iptables-save > /etc/iptables.rules
        systemctl enable iptables-restore.service
      fi
      echo "Iptables rules saved"
    else
      echo "Warning: Could not save iptables rules - they may not persist after reboot"
    fi
  when: vm_action == "create" and vm_ip is defined
  delegate_to: "{{ target_host }}"

# Post-installation instance-id update
- name: Set instance-id and host-name via SSH connection
  shell: |
    ssh -i ~/.ssh/{{ vm_root_ssh_filename }} \
        -o ConnectTimeout=10 \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        root@{{ vm_ip }} << 'REMOTE_COMMANDS'
    
    echo "Setting hostname and instance-id to {{ vm_name }}"
    hostnamectl set-hostname {{ vm_name }}
    echo "instance-id: {{ vm_name }}" > /etc/cloud/instance-id
    REMOTE_COMMANDS
  delegate_to: "{{ target_host }}"
  when:
    - vm_action == "create" and vm_image_type == "golden" and vm_ip is defined

# Post-SSH user creation and SSH key setup
- name: Create tenant user via SSH connection
  shell: |
    ssh -i ~/.ssh/{{ vm_root_ssh_filename }} \
        -o ConnectTimeout=10 \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        root@{{ vm_ip }} << 'REMOTE_COMMANDS'
    
    # Create tenant user
    TENANT_USER="{{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}"
    echo "Creating user: $TENANT_USER"
    
    # Add user with home directory
    useradd -m -s /bin/bash "$TENANT_USER"
    
    # Set user password
    echo "$TENANT_USER:{{ tenant_password }}" | chpasswd
    
    # Add user to sudo group
    usermod -aG sudo "$TENANT_USER"
    
    # Create .ssh directory
    mkdir -p /home/$TENANT_USER/.ssh
    chmod 700 /home/$TENANT_USER/.ssh
    chown $TENANT_USER:$TENANT_USER /home/$TENANT_USER/.ssh
    
    echo "User $TENANT_USER created successfully"
    REMOTE_COMMANDS
  when: vm_action == "create" and vm_ip is defined
  delegate_to: "{{ target_host }}"

- name: Set up SSH key for tenant user (with provided public key)
  shell: |
    ssh -i ~/.ssh/{{ vm_root_ssh_filename }} \
        -o ConnectTimeout=10 \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        root@{{ vm_ip }} << 'REMOTE_COMMANDS'
    
    TENANT_USER="{{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}"
    echo "Setting up SSH key for user: $TENANT_USER"
    
    # Add the provided public key to authorized_keys
    echo "{{ vm_tenant_pubkey }}" > /home/$TENANT_USER/.ssh/authorized_keys
    chmod 600 /home/$TENANT_USER/.ssh/authorized_keys
    chown $TENANT_USER:$TENANT_USER /home/$TENANT_USER/.ssh/authorized_keys
    
    echo "SSH key configured for $TENANT_USER"
    REMOTE_COMMANDS
  when: 
    - vm_action == "create" 
    - vm_ip is defined
    - vm_tenant_pubkey is defined 
    - vm_tenant_pubkey != ""
  delegate_to: "{{ target_host }}"

- name: Set up SSH key for tenant user (with generated key pair)
  shell: |
    ssh -i ~/.ssh/{{ vm_root_ssh_filename }} \
        -o ConnectTimeout=10 \
        -o StrictHostKeyChecking=no \
        -o UserKnownHostsFile=/dev/null \
        root@{{ vm_ip }} << 'REMOTE_COMMANDS'
    
    TENANT_USER="{{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}"
    echo "Setting up SSH key for user: $TENANT_USER"
    
    # Add the generated public key to authorized_keys
    echo "{{ ssh_keypair_tenant.public_key }}" > /home/$TENANT_USER/.ssh/authorized_keys
    chmod 600 /home/$TENANT_USER/.ssh/authorized_keys
    chown $TENANT_USER:$TENANT_USER /home/$TENANT_USER/.ssh/authorized_keys
    
    echo "SSH key configured for $TENANT_USER"
    REMOTE_COMMANDS
  when: 
    - vm_action == "create" 
    - vm_ip is defined
    - (vm_tenant_pubkey is not defined or vm_tenant_pubkey == "")
  delegate_to: "{{ target_host }}"

- name: Verify tenant user SSH access (with generated key)
  shell: timeout 10 ssh -i ~/.ssh/{{ vm_name }}_tenant_ed25519 -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@{{ vm_ip }} "echo TENANT_SSH_SUCCESS" 2>/dev/null
  register: tenant_ssh_verification
  ignore_errors: yes
  when: 
    - vm_action == "create" 
    - vm_ip is defined
    - (vm_tenant_pubkey is not defined or vm_tenant_pubkey == "")
  delegate_to: "{{ target_host }}"

- name: Set verification message for generated key
  set_fact:
    tenant_ssh_message: "{{ 'Tenant SSH access verified successfully' if (tenant_ssh_verification is defined and tenant_ssh_verification.rc == 0) else 'Warning: Could not verify tenant SSH access' }}"
  when: 
    - vm_action == "create" 
    - vm_ip is defined
    - (vm_tenant_pubkey is not defined or vm_tenant_pubkey == "")

- name: Set verification message for provided key
  set_fact:
    tenant_ssh_message: "SSH key configured - test with your private key"
  when: 
    - vm_action == "create" 
    - vm_ip is defined
    - vm_tenant_pubkey is defined 
    - vm_tenant_pubkey != ""

- name: Create verification output for JSON
  set_fact:
    tenant_ssh_verification:
      stdout: "{{ tenant_ssh_message | default('Not tested') }}"
  when: vm_action == "create" and vm_ip is defined

- name: Get current timestamp for creation
  shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
  register: creation_timestamp
  when: 
    - vm_action == "create"
    - vm_create_result is defined 
    - vm_ip is defined
  delegate_to: localhost

- name: Create JSON data structure for VM creation (generated tenant key)
  set_fact:
    vm_creation_data:
      action: "create"
      vm_name: "{{ vm_name }}"
      timestamp: "{{ creation_timestamp.stdout }}"
      host: "{{ target_host }}"
      status: "success"
      vm_state: "running"
      vm_ip_internal: "{{ vm_ip }}"
      external_ssh_port: "{{ external_ssh_port }}"
      tenant_user: "{{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}"
      tenant_user_creation_method: "post-boot-ssh"
      authentication:
        root:
          password: "{{ root_password }}"
          ssh_key_path_host: "~/.ssh/{{ vm_root_ssh_filename }}"
          ssh_commands:
            internal: "ssh -i ~/.ssh/{{ vm_root_ssh_filename }} root@{{ vm_ip }}"
            external: "ssh -i ~/.ssh/{{ vm_root_ssh_filename }} -p {{ external_ssh_port }} root@{{ target_host }}"
        tenant:
          password: "{{ tenant_password }}"
          key_type: "generated"
          ssh_key_path_host: "~/.ssh/{{ vm_name }}_tenant_ed25519"
          ssh_key_path_downloaded: "keys/{{ vm_name }}_tenant_private_key"
          ssh_commands:
            internal: "ssh -i keys/{{ vm_name }}_tenant_private_key {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@{{ vm_ip }}"
            external: "ssh -i keys/{{ vm_name }}_tenant_private_key -p {{ external_ssh_port }} {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@{{ target_host }}"
      network:
        port_forwarding: "{{ target_host }}:{{ external_ssh_port }} -> {{ vm_ip }}:22"
      verification:
        tenant_ssh_status: "{{ tenant_ssh_verification.stdout | default('Not tested') }}"
      gpu:
        provisioned: "{{ vm_gpu_provisioned | default(false) | bool }}"
        pci_address: "{{ gpu_pci_id | default('N/A') }}"
        model: "{{ gpu_model | default('N/A') }}"
        mode: "{{ gpu_provision_mode | default('N/A') }}"
        partition_type: "{{ gpu_partition_type | default('N/A') if (vm_gpu_provisioned | default(false) | bool and gpu_provision_mode == 'partitioned') else 'N/A' }}"
        partition_size: "{{ vm_gpu_partition_size | default('N/A') if (vm_gpu_provisioned | default(false) | bool and gpu_provision_mode == 'partitioned') else 'N/A' }}"
      system:
        random_string: "{{ random_string }}"
        cloud_init_method: "basic-networking-only"
  when: 
    - vm_action == "create" 
    - vm_create_result is defined 
    - vm_ip is defined
    - (vm_tenant_pubkey is not defined or vm_tenant_pubkey == "")

- name: Display VM creation result (SSH-ready, generated tenant key)
  debug:
    msg: 
      - "VM {{ vm_name }} created successfully - IP: {{ vm_ip }}:{{ external_ssh_port }}"
      - "Root: ssh -i ~/.ssh/{{ vm_root_ssh_filename }} root@{{ vm_ip }} (pwd: {{ root_password }})"
      - "Tenant: ssh -i keys/{{ vm_name }}_tenant_private_key {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@{{ vm_ip }} (pwd: {{ tenant_password }})"
  when: 
    - vm_action == "create" 
    - vm_create_result is defined 
    - vm_ip is defined
    - (vm_tenant_pubkey is not defined or vm_tenant_pubkey == "")

- name: Create JSON data structure for VM creation (provided tenant key)
  set_fact:
    vm_creation_data:
      action: "create"
      vm_name: "{{ vm_name }}"
      timestamp: "{{ creation_timestamp.stdout }}"
      host: "{{ target_host }}"
      status: "success"
      vm_state: "running"
      vm_ip_internal: "{{ vm_ip }}"
      external_ssh_port: "{{ external_ssh_port }}"
      tenant_user: "{{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}"
      tenant_user_creation_method: "post-boot-ssh"
      authentication:
        root:
          password: "{{ root_password }}"
          ssh_key_path_host: "~/.ssh/{{ vm_root_ssh_filename }}"
          ssh_commands:
            internal: "ssh -i ~/.ssh/{{ vm_root_ssh_filename }} root@{{ vm_ip }}"
            external: "ssh -i ~/.ssh/{{ vm_root_ssh_filename }} -p {{ external_ssh_port }} root@{{ target_host }}"
        tenant:
          password: "{{ tenant_password }}"
          key_type: "provided"
          public_key: "{{ vm_tenant_pubkey }}"
          ssh_commands:
            internal: "ssh -i <your_private_key> {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@{{ vm_ip }}"
            external: "ssh -i <your_private_key> -p {{ external_ssh_port }} {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@{{ target_host }}"
      network:
        port_forwarding: "{{ target_host }}:{{ external_ssh_port }} -> {{ vm_ip }}:22"
      gpu:
        provisioned: "{{ vm_gpu_provisioned | default(false) | bool }}"
        pci_address: "{{ gpu_pci_id | default('N/A') }}"
        model: "{{ gpu_model | default('N/A') }}"
        mode: "{{ gpu_provision_mode | default('N/A') }}"
        partition_type: "{{ gpu_partition_type | default('N/A') if (vm_gpu_provisioned | default(false) | bool and gpu_provision_mode == 'partitioned') else 'N/A' }}"
        partition_size: "{{ vm_gpu_partition_size | default('N/A') if (vm_gpu_provisioned | default(false) | bool and gpu_provision_mode == 'partitioned') else 'N/A' }}"
        audio_device:
          pci_address: "{{ gpu_audio_device.stdout | default('N/A') if (gpu_audio_device is defined and gpu_audio_device.stdout is defined and gpu_audio_device.stdout != 'NO_AUDIO_DEVICE') else 'N/A' }}"
          attached: "{{ true if (gpu_audio_device is defined and gpu_audio_device.stdout is defined and gpu_audio_device.stdout != 'NO_AUDIO_DEVICE') else false }}"
      system:
        random_string: "{{ random_string }}"
        cloud_init_method: "basic-networking-only"
  when: 
    - vm_action == "create" 
    - vm_create_result is defined 
    - vm_ip is defined
    - vm_tenant_pubkey is defined 
    - vm_tenant_pubkey != ""

- name: Display VM creation result (SSH-ready, with provided tenant key)
  debug:
    msg: 
      - "VM {{ vm_name }} created successfully - IP: {{ vm_ip }}:{{ external_ssh_port }}"
      - "Root access: ssh -i ~/.ssh/{{ vm_root_ssh_filename }} root@{{ vm_ip }} (password: {{ root_password }})"
      - "Tenant access: ssh -i <your_private_key> {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@{{ vm_ip }} (password: {{ tenant_password }})"
  when: 
    - vm_action == "create" 
    - vm_create_result is defined 
    - vm_ip is defined
    - vm_tenant_pubkey is defined 
    - vm_tenant_pubkey != ""

- name: Download tenant SSH key pair when no tenant public key provided
  block:
    - name: Download tenant SSH private key
      fetch:
        src: "~/.ssh/{{ vm_name }}_tenant_ed25519"
        dest: "{{ playbook_dir }}/../../keys/{{ vm_name }}_tenant_private_key"
        flat: yes
      delegate_to: "{{ target_host }}"
    
    - name: Download tenant SSH public key
      fetch:
        src: "~/.ssh/{{ vm_name }}_tenant_ed25519.pub"
        dest: "{{ playbook_dir }}/../../keys/{{ vm_name }}_tenant_public_key.pub"
        flat: yes
      delegate_to: "{{ target_host }}"
    
    - name: Set tenant private key permissions
      file:
        path: "{{ playbook_dir }}/../../keys/{{ vm_name }}_tenant_private_key"
        mode: '0600'
      delegate_to: localhost
  when: 
    - vm_action == "create" 
    - vm_create_result is defined
    - (vm_tenant_pubkey is not defined or vm_tenant_pubkey == "")

- name: Clean up temporary files after VM creation
  shell: |
    echo "=== Cleaning up temporary files after VM creation ==="
    
    # Remove cloud-init directory
    echo "Removing cloud-init directory..."
    rm -rf /tmp /cloudinit_{{ vm_name }}_{{ random_string }}

    # Remove any leftover files from /tmp
    echo "Removing any leftover VM creation files from /tmp..."
    find /tmp -name "*{{ vm_name }}*" -type f 2>/dev/null | while read file; do
      echo "Removing: $file"
      rm -f "$file"
    done
    
    echo "=== Temporary file cleanup completed ==="
  when: 
    - vm_action == "create" 
    - vm_create_result is defined
  delegate_to: "{{ target_host }}"

- name: Add single-tenant VM to inventory
  block:
    - name: Add VM to [kvms] group in hosts file
      lineinfile:
        path: "{{ playbook_dir }}/../../inventory/hosts"
        insertafter: "^\\[kvms\\]"
        line: "{{ vm_name }} ansible_host={{ target_host }} ansible_port={{ external_ssh_port }} ansible_user=root ansible_ssh_private_key_file=~/.ssh/{{ vm_root_ssh_filename }}"
        backup: yes
        create: yes
      delegate_to: localhost
    
    - name: Ensure [kvms] group exists in single-tenant hosts file
      lineinfile:
        path: "{{ playbook_dir }}/../../inventory/hosts"
        line: "[kvms]"
        insertbefore: BOF
        backup: yes
        create: yes
      delegate_to: localhost
  when: 
    - vm_action == "create" 
    - vm_create_result is defined 
    - vm_ip is defined
    - tenant_id is not defined or tenant_id == ""

- name: Create JSON data structure for VM creation failure (not SSH-ready)
  set_fact:
    vm_creation_data:
      action: "create"
      vm_name: "{{ vm_name }}"
      timestamp: "{{ creation_timestamp.stdout | default('unknown') }}"
      host: "{{ target_host }}"
      status: "partial_success"
      vm_state: "created_but_not_ssh_ready"
      error: "VM created but SSH readiness check failed"
      external_ssh_port: "{{ external_ssh_port | default('Not configured') }}"
      troubleshooting:
        - "Check VM status: virsh domstate {{ vm_name }}"
        - "Get VM IP: virsh net-dhcp-leases default"
        - "Try connecting as root: ssh -i ~/.ssh/{{ vm_root_ssh_filename }} root@<vm_ip>"
        - "Try connecting as tenant: ssh -i keys/{{ vm_name }}_tenant_private_key {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@<vm_ip>"
      authentication:
        root:
          password: "{{ root_password }}"
          ssh_key_path_host: "~/.ssh/{{ vm_root_ssh_filename }}"
          ssh_command_external: "ssh -i ~/.ssh/{{ vm_root_ssh_filename }} -p {{ external_ssh_port | default('XXXX') }} root@{{ target_host }}"
        tenant:
          password: "{{ tenant_password }}"
          ssh_key_path_downloaded: "keys/{{ vm_name }}_tenant_private_key"
      gpu:
        provisioned: "{{ vm_gpu_provisioned | default(false) | bool }}"
        pci_address: "{{ gpu_pci_id | default('N/A') }}"
        model: "{{ gpu_model | default('N/A') }}"
        mode: "{{ gpu_provision_mode | default('N/A') }}"
        partition_type: "{{ gpu_partition_type | default('N/A') if (vm_gpu_provisioned | default(false) | bool and gpu_provision_mode == 'partitioned') else 'N/A' }}"
        partition_size: "{{ vm_gpu_partition_size | default('N/A') if (vm_gpu_provisioned | default(false) | bool and gpu_provision_mode == 'partitioned') else 'N/A' }}"
        audio_device:
          pci_address: "{{ gpu_audio_device.stdout | default('N/A') if (gpu_audio_device is defined and gpu_audio_device.stdout is defined and gpu_audio_device.stdout != 'NO_AUDIO_DEVICE') else 'N/A' }}"
          attached: "{{ true if (gpu_audio_device is defined and gpu_audio_device.stdout is defined and gpu_audio_device.stdout != 'NO_AUDIO_DEVICE') else false }}"
      system:
        cloud_init_method: "basic-networking-only"
        note: "Both SSH key and password authentication are supported"
  when: vm_action == "create" and vm_create_result is defined and (vm_ip is not defined or vm_ready_result.rc != 0)

- name: Create JSON formatted output for VM creation failure
  set_fact:
    vm_creation_json: "{{ vm_creation_data | to_nice_json }}"
  when: vm_action == "create" and vm_create_result is defined and (vm_ip is not defined or vm_ready_result.rc != 0)

- name: Output VM creation failure data as parsable JSON
  debug:
    var: vm_creation_data
  when: vm_action == "create" and vm_create_result is defined and (vm_ip is not defined or vm_ready_result.rc != 0)

- name: Output VM creation failure JSON string for external parsing
  debug:
    msg: "{{ vm_creation_json }}"
  when: vm_action == "create" and vm_create_result is defined and (vm_ip is not defined or vm_ready_result.rc != 0)

- name: Display VM creation result (not SSH-ready)
  debug:
    msg: 
      - "VM {{ vm_name }} created but SSH readiness check failed"
      - "VM may still be booting or cloud-init may be taking longer than expected"
      - "External SSH Port: {{ external_ssh_port | default('Not configured') }}"
      - "Root SSH Private Key (host only): ~/.ssh/{{ vm_root_ssh_filename }}"
      - "Root SSH Public Key (host only): ~/.ssh/{{ vm_root_ssh_filename }}.pub"
      - "Tenant SSH Private Key (downloaded): keys/{{ vm_name }}_tenant_private_key"
      - "Tenant SSH Public Key (downloaded): keys/{{ vm_name }}_tenant_public_key.pub"
      - "Root Password: {{ root_password }}"
      - "Tenant Password: {{ tenant_password }}"
      - "Note: Both SSH key and password authentication are supported"
      - "Try connecting as root: ssh -i ~/.ssh/{{ vm_root_ssh_filename }} root@<vm_ip>"
      - "Try connecting as tenant: ssh -i keys/{{ vm_name }}_tenant_private_key {{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}@<vm_ip>"
      - "External access (when ready): ssh -i ~/.ssh/{{ vm_root_ssh_filename }} -p {{ external_ssh_port | default('XXXX') }} root@{{ target_host }}"
      - "Check VM status: virsh domstate {{ vm_name }}"
      - "Get VM IP: virsh net-dhcp-leases default"
  when: vm_action == "create" and vm_create_result is defined and (vm_ip is not defined or vm_ready_result.rc != 0)

- name: List all VMs
  shell: virsh list --all
  register: vm_list_result
  when: vm_action == "list"
  delegate_to: "{{ target_host }}"

- name: Display VM list
  debug:
    var: vm_list_result.stdout_lines
  when: vm_action == "list" and vm_list_result is defined

- name: Show current port forwarding rules
  shell: |
    echo "=== Current NAT PREROUTING Rules (Port Forwarding) ==="
    iptables -t nat -L PREROUTING -n --line-numbers | grep -E "(DNAT|target|Chain)" || echo "No DNAT rules found"
    echo ""
    echo "=== Current FORWARD Rules ==="
    iptables -L FORWARD -n --line-numbers | grep -E "(ACCEPT.*:22|target|Chain)" || echo "No SSH forwarding rules found"
  register: port_forwarding_rules
  when: vm_action == "list"
  delegate_to: "{{ target_host }}"

- name: Get current timestamp for list action
  shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
  register: list_timestamp
  when: vm_action == "list"
  delegate_to: localhost

- name: Parse VM list into structured format
  shell: |
    echo '{{ vm_list_result.stdout }}' | awk '
    BEGIN { print "[" }
    NR > 2 && NF >= 3 { 
      gsub(/"/, "\\\"", $0)
      id = $1
      name = $2
      # Handle state which might have spaces
      state = ""
      for(i=3; i<=NF; i++) {
        if(i > 3) state = state " "
        state = state $i
      }
      if (NR > 3) print ","
      printf "{\"id\": \"%s\", \"name\": \"%s\", \"state\": \"%s\"}", id, name, state
    }
    END { print "\n]" }
    '
  register: vm_list_json_raw
  when: vm_action == "list" and vm_list_result is defined
  delegate_to: localhost

- name: Set parsed VM list
  set_fact:
    vm_list_parsed: "{{ vm_list_json_raw.stdout | from_json }}"
  when: vm_action == "list" and vm_list_json_raw is defined

- name: Create JSON data structure for VM list

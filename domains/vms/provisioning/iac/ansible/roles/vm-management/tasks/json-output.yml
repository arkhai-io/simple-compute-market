---
# VM Management - JSON Output Formatting

# VM Create JSON Output
- name: Create JSON formatted output for VM creation
  set_fact:
    vm_creation_json: "{{ vm_creation_data | to_nice_json }}"
  when: vm_action == "create" and vm_creation_data is defined

- name: Output VM creation data as parsable JSON
  debug:
    var: vm_creation_data
  when: vm_action == "create" and vm_creation_data is defined

- name: Output VM creation JSON string for external parsing
  debug:
    msg: "{{ vm_creation_json }}"
  when: vm_action == "create" and vm_creation_json is defined


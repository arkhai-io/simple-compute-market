- name: Apply default GCS and folder structuring variables
  set_fact:
    gcs_bucket_url: "{{ gcs_bucket_url | default(gcp_variables.gcs_bucket_url | default('')) }}"
    gcs_project_id: "{{ gcs_project_id | default(gcp_variables.gcs_project_id | default('')) }}"
    gcs_service_account_content: "{{ gcs_service_account_content | default(gcp_variables.gcs_service_account_content | default('')) }}"
  when: vm_image_type == "golden"
  tags:
    - gcloud_vars
    - build_configure

- name: Create service account key file
  copy:
    dest: "/tmp/gcs_service_account_key.json"
    content: "{{ gcs_service_account_content }}"
    mode: '0644'
  when: vm_image_type == "golden"
  tags:
    - gcloud_init
    - build_configure

- name: Authenticate gcloud with service account
  shell: gcloud auth activate-service-account --key-file=/tmp/gcs_service_account_key.json
  register: gcloud_auth_result
  changed_when: false
  failed_when: gcloud_auth_result.rc != 0
  when: vm_image_type == "golden"
  tags:
    - gcloud_init
    - build_configure

- name: Set GCP project
  shell: gcloud config set project {{ gcs_project_id }}
  register: gcloud_set_project_result
  changed_when: false
  failed_when: gcloud_set_project_result.rc != 0
  when: vm_image_type == "golden"
  tags:
    - gcloud_init
    - build_configure

- name: Turn off automatic parallel uploads configuration for gcloud
  shell: gcloud config set storage/parallel_composite_upload_enabled False
  register: gcloud_parallel_upload_result
  changed_when: false
  failed_when: gcloud_parallel_upload_result.rc != 0
  when: vm_image_type == "golden"
  tags:
    - gcloud_init
    - build_configure

- name: Verify GCS Bucket exists
  shell: gcloud storage ls {{ gcs_bucket_url }}
  register: gcs_bucket_check
  failed_when: gcs_bucket_check.rc != 0
  changed_when: false
  when: vm_image_type == "golden"
  tags:
    - gcloud_init
    - build_configure

- name: Read group_vars/all.yaml for default VM and Packer settings
  include_vars:
    file: "{{ lookup('env', 'PWD') }}/group_vars/all.yml"
  when: vm_image_type == "golden"
  tags:
    - packer_vars
    - build_configure

- name: Apply default Packer variables for Golden Image Creation
  set_fact:
    # Set VM parameters
    vm_memory: "{{ ram | default(default_vm_settings.ram | default(2048)) }}"
    vm_cpu: "{{ vcpus | default(default_vm_settings.vcpus | default(2)) }}"
    disk_size: "{{ disk_size | default(default_vm_settings.disk_size | default('20G')) }}"
    # Set Packer build parameters
    iso_url: "{{ iso_url | default(packer_variables.iso_url | default('https://cloud-images.ubuntu.com/noble/20251126/noble-server-cloudimg-amd64.img')) }}"
    iso_checksum: "{{ iso_checksum | default(packer_variables.iso_checksum | default('sha256:8bf11afd901fdec5aad647a8a284243a2a0b80a81ac732ae618ab36afa09f2b4')) }}"
    accelerator: "{{ accelerator | default(packer_variables.accelerator | default('kvm'))   }}"
    build_format: "{{ build_format | default(packer_variables.build_format | default('qcow2')) }}"
    build_name: "{{ build_name | default(packer_variables.build_name | default('ubuntu_noble_golden')) }}"
    build_version: "{{ build_version | default(packer_variables.build_version | default('v1.0.0')) }}"
    packer_work_dir: "{{ packer_work_dir | default(packer_variables.packer_work_dir | default('/tmp/packer_workspace')) }}"
    output_dir: "{{ output_dir | default(packer_variables.output_dir | default('artifacts')) }}"
    generate_new_templates: "{{ generate_new_templates | default(packer_variables.generate_new_templates | default('true')) }}"
  when: vm_image_type == "golden"
  tags:
    - packer_vars
    - build_configure

- name: Set up random suffix for instance_name
  set_fact:
    base_instance_name_suffix: "{{ ansible_date_time.epoch | hash('md5') | truncate(4, True, '') }}"
  when: vm_image_type == "golden" and base_instance_name is undefined
  tags:
    - packer_vars
    - build_configure

# Store final base_instance_name in output JSON
- name: Generate instance name if base_instance_name is not provided
  set_fact:
    base_instance_name: "{{ base_instance_name if base_instance_name is defined else 'hostenv_' + base_instance_name_suffix }}"
  when: vm_image_type == "golden"
  tags:
    - packer_vars
    - build_configure

- name: Debug root pasword, private key, and public key parameters
  debug:
    msg:
      - "=== Golden Image Root Credentials Debug ==="
      - "Root Password is defined: {{ root_password is defined }}"
      - "Root Filename is defined: {{ root_filename is defined }}"
  when: vm_image_type == "golden"
  tags:
    - packer_root_ssh
    - build_configure
# Add when root_password or root_filename is not defined
- name: Generate suffix for SSH
  set_fact:
    ssh_suffix: "{{ ansible_date_time.epoch | hash('md5') | truncate(6, True, '') }}"
  tags:
    - packer_root_ssh
    - build_configure
  when: vm_image_type == "golden" and root_filename is not defined

- name: Define root variables
  set_fact:
    ssh_fname: "{{ root_filename if root_filename is defined else 'root_ssh_' + ssh_suffix + '_ed25519' }}"
    ssh_pword: "{{ root_password if root_password is defined else lookup('password', '/dev/null chars=ascii_letters,digits length=40') }}"
  when: vm_image_type == "golden"
  tags:
    - packer_root_ssh
    - build_configure

- name: Set up host environment root SSH folder
  file:
    path: "{{ ansible_env.HOME }}/.ssh"
    state: directory
    mode: '0700'
  when: vm_image_type == "golden" and root_filename is not defined
  tags:
    - packer_root_ssh
    - build_configure

# Store generated SSH key and pubkey in output JSON
- name: Generate root Ed25519 SSH key
  openssh_keypair:
    path: "{{ ansible_env.HOME }}/.ssh/{{ ssh_fname }}"
    type: ed25519
    size: 256
    state: present
    force: yes
  when: vm_image_type == "golden" and root_filename is not defined
  tags:
    - packer_root_ssh
    - build_configure

- name: Read SSH private key
  slurp:
    src: "{{ ansible_env.HOME }}/.ssh/{{ ssh_fname }}"
  register: ssh_privkey_content
  when: vm_image_type == "golden"
  tags:
    - packer_root_ssh
    - build_configure

- name: Read SSH public key
  slurp:
    src: "{{ ansible_env.HOME }}/.ssh/{{ ssh_fname }}.pub"
  register: ssh_pubkey_content
  when: vm_image_type == "golden"
  tags:
    - packer_root_ssh
    - build_configure

- name: Set SSH key variables
  set_fact:
    ssh_privkey_path: "{{ ansible_env.HOME }}/.ssh/{{ ssh_fname }}"
    ssh_privkey: "{{ ssh_privkey_content.content | b64decode | trim }}"
    ssh_pubkey: "{{ ssh_pubkey_content.content | b64decode | trim }}"
  when: vm_image_type == "golden"
  tags:
    - packer_root_ssh
    - build_configure

- name: Generate password hash for root user
  shell: mkpasswd --method=SHA-512 --rounds=4096 "{{ ssh_pword }}"
  register: password_hash_result
  when: vm_image_type == "golden"
  tags:
    - packer_root_ssh
    - build_configure

- name: Set hashed password variable
  set_fact:
    hashed_rpword: "{{ password_hash_result.stdout }}"
  when: vm_image_type == "golden"
  tags:
    - packer_root_ssh
    - build_configure

- name: Check if packer directory exists
  stat:
    path: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}"
  register: packer_work_dir_stat
  when: vm_image_type == "golden"
  tags:
    - packer_workspace_setup
    - build_configure

- name: Set up packer directory
  file:
    path: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}"
    state: directory
    mode: '0755'
  when: vm_image_type == "golden" and not packer_work_dir_stat.stat.exists
  tags:
    - packer_workspace_setup
    - build_configure

- name: Check if packer workspace is created
  debug:
    msg: "Packer role path is {{ role_path }}"
  when: vm_image_type == "golden" and not packer_work_dir_stat.stat.exists
  tags:
    - packer_workspace_setup
    - build_configure

- name: Copy packer files (excluding artifacts, user-data, meta-data)
  synchronize:
    src: "{{ role_path }}/files/{{ build_name }}/"
    dest: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}"
    delete: yes
    rsync_opts:
      - "--exclude=config/user-data"
      - "--exclude=config/meta-data"
  when: vm_image_type == "golden" and not packer_work_dir_stat.stat.exists
  tags:
    - packer_workspace_setup
    - build_configure

- name: Allow permission to run for prepare-image.sh
  file:
    path: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/scripts/prepare-image.sh"
    mode: a+x
  when: vm_image_type == "golden" and not packer_work_dir_stat.stat.exists
  tags:
    - packer_workspace_setup
    - build_configure

- name: Generate user-data from template
  template:
    src: "{{ role_path}}/templates/user-data.j2"
    dest: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/config/user-data"
    mode: '0644'
  when: vm_image_type == "golden" and generate_new_templates is true
  tags:
    - packer_workspace_setup
    - build_configure
    
- name: Generate meta-data from template
  template:
    src: "{{ role_path}}/templates/meta-data.j2"
    dest: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/config/meta-data"
    mode: '0644'
  when: vm_image_type == "golden" and generate_new_templates is true
  tags:
    - packer_workspace_setup
    - build_configure
    
- name: Create values.pkrvars.hcl file
  template:
    src: "{{ role_path}}/templates/values.pkrvars.hcl.j2"
    dest: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/values.pkrvars.hcl"
    mode: '0644'
  when: vm_image_type == "golden" and generate_new_templates is true
  tags:
    - packer_workspace_setup
    - build_configure

- name: Remove artifacts folder, if exists, to ensure clean build
  block:
    - name: Check if artifacts folder exists
      stat:
        path: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/artifacts"
      register: packer_artifacts_dir_stat
      when: vm_image_type == "golden"
      tags:
        - packer_workspace_setup
        - build_configure
    - name: Remove artifacts folder if exists
      file:
        path: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/artifacts"
        state: absent
      when: vm_image_type == "golden" and packer_artifacts_dir_stat.stat.exists
      tags:
        - packer_workspace_setup
        - build_configure

- name: Initialize Packer
  command: packer init .
  args:
    chdir: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}"
  register: packer_init_result
  when: vm_image_type == "golden"
  tags:
    - packer_init
    - build_configure
  
- name: Display Packer init output
  debug:
    var: packer_init_result.stdout_lines
  when: vm_image_type == "golden"
  tags:
    - packer_init
    - build_configure
    
- name: Validate Packer configuration
  command: packer validate -var-file=values.pkrvars.hcl .
  args:
    chdir: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}"
  register: packer_validate_result
  when: vm_image_type == "golden"
  tags:
    - packer_validate
    - build_configure
  
- name: Display Packer validation output
  debug:
    var: packer_validate_result.stdout_lines
  when: vm_image_type == "golden"
  tags:
    - packer_validate
    - build_configure

- name: Remove existing cidata.iso if generating new templates
  file:
    path: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/cidata.iso"
    state: absent
  when: vm_image_type == "golden" and generate_new_templates is true
  tags:
    - packer_build
    - build

- name: Check if cidata.iso exists
  stat:
    path: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/cidata.iso"
  register: file_stat_cidata
  when: vm_image_type == "golden"
  tags:
    - packer_build
    - build

- name: Create genisoimage cidata.iso for cloud-init if not exist
  command: >
    genisoimage -output {{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/cidata.iso
    -input-charset utf-8 -V cidata -J -r
    {{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/config/user-data
    {{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/config/meta-data
  args:
    chdir: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}"
  when:
    - vm_image_type == "golden"
    - (generate_new_templates is true) or (not file_stat_cidata.stat.exists)
  register: genisoimage_result
  tags:
    - packer_build
    - build
    
- name: Build VM image with Packer
  command: packer build -var-file=values.pkrvars.hcl .
  args:
    chdir: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}"
  register: packer_build_result
  when: vm_image_type == "golden"
  async: 3600  # 1 hour timeout
  poll: 30     # Check every 30 seconds
  tags:
    - packer_build
    - build
  
- name: Display Packer build output
  debug:
    var: packer_build_result.stdout_lines
  when: vm_image_type == "golden"
  tags:
    - verify_packer_build
    - build
    
- name: Find generated qcow2 files
  find:
    paths: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/artifacts"
    patterns:
      - "*.qcow2"
      - "*.sha256sum"
  register: artifact_files
  when: vm_image_type == "golden"
  tags:
    - artifacts_init
    - build_upload

- name: Get current date for image versioning
  set_fact:
    current_date: "{{ ansible_date_time.date | replace('-', '') }}"
  when: vm_image_type == "golden"
  tags:
    - artifacts_init
    - build_upload

- name: Set GCS Folder Paths
  set_fact:
    gcs_date_path: "{{ build_name }}/{{ current_date }}"
    gcs_current_path: "{{ build_name }}/current"
  when: vm_image_type == "golden"
  tags:
    - artifacts_init
    - build_upload

- name: Clear first existing artifacts in GCS current folder, if exists
  block:
    - name: List files in current folder
      shell: gcloud storage ls {{ gcs_bucket_url }}/{{ gcs_current_path }}/
      register: gcs_current_files
      failed_when: false
      when: vm_image_type == "golden"
      tags:
        - artifacts_current_prep
        - build_upload
    - name: Clear current_folder if any files exist
      when: vm_image_type == "golden" and gcs_current_files.rc == 0
      shell: gcloud storage rm {{ gcs_bucket_url }}/{{ gcs_current_path }}/**
      register: gcs_clear_current
      tags:
        - artifacts_current_prep
        - build_upload
    - name: Display clear result
      debug:
        msg: "{{ 'Current folder cleared: ' + (gcs_clear_current.stdout | default('No output')) if gcs_current_files.rc == 0 else 'Current folder did not exist' }}"
      when: vm_image_type == "golden"
      tags:
        - artifacts_current_prep
        - build_upload

- name: Clear also existing artifacts in GCS date folder, if exists
  block:
    - name: List files in date folder
      shell: gcloud storage ls {{ gcs_bucket_url }}/{{ gcs_date_path }}/
      register: gcs_date_files
      failed_when: false
      when: vm_image_type == "golden"
      tags:
        - artifacts_date_prep
        - build_upload
    - name: Clear current_folder if any files exist
      when: vm_image_type == "golden" and gcs_date_files.rc == 0
      shell: gcloud storage rm {{ gcs_bucket_url }}/{{ gcs_date_path }}/**
      register: gcs_clear_date
      tags:
        - artifacts_date_prep
        - build_upload
    - name: Display clear result
      debug:
        msg: "{{ 'Date folder cleared: ' + (gcs_clear_date.stdout | default('No output')) if gcs_date_files.rc == 0 else 'Date folder did not exist' }}"
      when: vm_image_type == "golden"
      tags:
        - artifacts_date_prep
        - build_upload

- name: Upload artifacts to GCS date bucket
  shell: gcloud storage cp {{ item.path }} {{ gcs_bucket_url }}/{{ gcs_date_path }}/{{ item.path | basename | trim }}
  loop: "{{ artifact_files.files }}"
  register: gcs_upload_date_results
  failed_when: gcs_upload_date_results.rc != 0
  when: vm_image_type == "golden"
  tags:
    - artifacts_upload
    - build_upload
  
- name: Upload artifacts to GCS current bucket
  shell: gcloud storage cp {{ item.path }} {{ gcs_bucket_url }}/{{ gcs_current_path }}/{{ item.path | basename | trim}}
  loop: "{{ artifact_files.files }}"
  register: gcs_upload_current_results
  failed_when: gcs_upload_current_results.rc != 0
  when: vm_image_type == "golden"
  tags:
    - artifacts_upload
    - build_upload

- name: Copy qcow2 artifact to qemu image folder using shell
  shell: cp "{{ item.path }}" "/var/lib/libvirt/images/{{ item.path | basename | trim }}"
  loop: "{{ artifact_files.files }}"
  when: vm_image_type == "golden" and item.path is search('\.qcow2$')
  tags:
    - artifacts_deploy
    - build_upload

- name: Set ownership and permissions for qcow2 file
  file:
    path: "/var/lib/libvirt/images/{{ item.path | basename | trim }}"
    owner: libvirt-qemu
    group: kvm
    mode: '0644'
  loop: "{{ artifact_files.files }}"
  when: vm_image_type == "golden" and item.path is search('\.qcow2$')
  tags:
    - artifacts_deploy
    - build_upload

- name: Verify uploads completed successfully
  shell:
    gcloud storage ls {{ gcs_bucket_url }}/{{ gcs_current_path }} && gcloud storage ls {{ gcs_bucket_url }}/{{ gcs_date_path }}
  when:
    - vm_image_type == "golden"
    - gcs_upload_date_results is defined
    - gcs_upload_date_results.results is defined
    - gcs_upload_current_results is defined
    - gcs_upload_current_results.results is defined
  register: verify_artifacts
  tags:
    - artifacts_cleanup
    - build_upload

- name: Remove local artifacts after successful upload
  file:
    path: "{{ packer_work_dir }}/{{ build_name }}-{{ build_version }}/artifacts"
    state: absent
  when:
    - vm_image_type == "golden"
    - verify_artifacts is defined
    - verify_artifacts is succeeded
  tags:
    - artifacts_cleanup
    - build_upload

- name: Display GCP Artifacts uploaded
  debug:
    var: verify_artifacts.stdout_lines
  when:
    - vm_image_type == "golden"
    - verify_artifacts is defined
    - verify_artifacts is succeeded
  tags:
    - artifacts_cleanup
    - build_upload

# Create YAML data output for Host Environment details
- name: Create golden image root credentials YAML file
  copy:
    content: |
      # Golden Image Root Credentials
      # Generated: {{ ansible_date_time.iso8601 }}
      # Image: {{ build_name }}-{{ build_version }}
      
      golden_image_name: "{{ build_name }}-{{ build_version }}"
      gcs_bucket_url: "{{ gcs_bucket_url }}"
      gcs_image_path: "{{ gcs_current_path }}"
      root_ssh_filename: "{{ ssh_fname }}"
      root_ssh_password: "{{ ssh_pword }}"
      root_ssh_private_key: |
        {{ ssh_privkey | indent(8) }}
      root_ssh_public_key: |
        {{ ssh_pubkey | indent(8) }}
    dest: "{{ inventory_dir }}/management-vars.yaml"
    mode: '0600'
  delegate_to: localhost
  become: no
  register: credentials_file_result
  when: vm_image_type == "golden" and packer_build_result.rc == 0
  tags:
    - artifacts_cleanup
    - build_completion

- name: Create GPU detection script
  copy:
    dest: /usr/local/bin/gpu-detect
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      
      LOCKFILE="/etc/libvirt/gpu-capabilities/gpu-lockfile.json"
      CONFIG_FILE="/etc/libvirt/gpu-capabilities/gpu-config.json"
      TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      HOSTNAME=$(hostname)
      
      echo "[$(date)] GPU Detection Service starting..."
      
      mkdir -p /etc/libvirt/gpu-capabilities
      echo "[$(date)] Created capabilities directory"
      
      # Detect GPU presence
      echo "[$(date)] Starting GPU detection..."
      NVIDIA_COUNT=$(lspci | grep -i "VGA" | grep -i "NVIDIA" | wc -l | xargs || echo "0")
      AMD_COUNT=$(lspci | grep -i "VGA" | grep -i "AMD" | wc -l | xargs || echo "0")
      echo "[$(date)] Found $NVIDIA_COUNT NVIDIA GPU(s), $AMD_COUNT AMD GPU(s)"
      
      NVIDIA_DETECTED=false
      AMD_DETECTED=false
      VFIO_DRIVER_IN_USE=false
      
      if [[ ${NVIDIA_COUNT} -gt 0 ]] 2>/dev/null; then
        NVIDIA_DETECTED=true
        echo "[$(date)] NVIDIA GPU detected"
      fi
      
      if [[ ${AMD_COUNT} -gt 0 ]] 2>/dev/null; then
        AMD_DETECTED=true
        echo "[$(date)] AMD GPU detected"
      fi
      
      # Check kernel driver in use for all GPUs
      echo "[$(date)] Checking kernel drivers..."
      if [ "$NVIDIA_DETECTED" = true ] || [ "$AMD_DETECTED" = true ]; then
        GPU_ADDRESSES=$(lspci | grep -i "VGA" | grep -iE "NVIDIA|AMD" | awk '{print $1}' || true)
        for addr in $GPU_ADDRESSES; do
          if [ -z "$addr" ]; then
            echo "[$(date)] WARNING: Empty GPU address found, skipping"
            continue
          fi
          DRIVER=$(lspci -k -s "$addr" 2>/dev/null | grep "Kernel driver in use" | awk '{print $5}' || echo "")
          echo "[$(date)] GPU $addr using driver: ${DRIVER:-none}"
          if [ "$DRIVER" = "vfio-pci" ]; then
            VFIO_DRIVER_IN_USE=true
            echo "[$(date)] vfio-pci driver detected on $addr"
          fi
        done
      fi
      echo "[$(date)] Kernel driver check complete. VFIO in use: $VFIO_DRIVER_IN_USE"
      
      # Check NVIDIA MIG capability (only if nvidia driver is in use)
      echo "[$(date)] Checking NVIDIA MIG capability..."
      MIG_SUPPORTED=false
      MIG_ENABLED=false
      if [ "$NVIDIA_DETECTED" = true ] && [ "$VFIO_DRIVER_IN_USE" = false ]; then
        if command -v nvidia-smi >/dev/null 2>&1; then
          echo "[$(date)] nvidia-smi found, querying MIG status..."
          MIG_MODES=$(nvidia-smi --query-gpu=mig.mode.current --format=csv,noheader 2>/dev/null | tr -d '[:space:]' || echo "N/A")
          echo "[$(date)] MIG modes: $MIG_MODES"
          if [[ "$MIG_MODES" != "N/A" && "$MIG_MODES" != "NotSupported" && -n "$MIG_MODES" ]]; then
            MIG_SUPPORTED=true
            if echo "$MIG_MODES" | grep -qi "Enabled"; then
              MIG_ENABLED=true
              echo "[$(date)] MIG is ENABLED"
            else
              echo "[$(date)] MIG is supported but DISABLED"
            fi
          else
            echo "[$(date)] MIG not supported (response: $MIG_MODES)"
          fi
        else
          echo "[$(date)] nvidia-smi not found, skipping MIG check"
        fi
      else
        echo "[$(date)] Skipping MIG check (NVIDIA: $NVIDIA_DETECTED, VFIO: $VFIO_DRIVER_IN_USE)"
      fi
      
      # Check SR-IOV capability (only if nvidia/amdgpu driver is in use)
      echo "[$(date)] Checking SR-IOV capability..."
      SRIOV_SUPPORTED=false
      if [ "$VFIO_DRIVER_IN_USE" = false ] && { [ "$NVIDIA_DETECTED" = true ] || [ "$AMD_DETECTED" = true ]; }; then
        GPU_ADDRESSES=$(lspci | grep -i "VGA" | grep -iE "NVIDIA|AMD" | awk '{print $1}' || true)
        for addr in $GPU_ADDRESSES; do
          if [ -z "$addr" ]; then
            echo "[$(date)] WARNING: Empty GPU address in SR-IOV check, skipping"
            continue
          fi
          echo "[$(date)] Checking SR-IOV for GPU $addr..."
          TOTAL_VFS=$(lspci -s "$addr" -vvv 2>/dev/null | grep "Total VFs:" | awk '{print $NF}' || echo "")
          if [[ -n "$TOTAL_VFS" ]] && [[ "$TOTAL_VFS" -gt 0 ]] 2>/dev/null; then
            SRIOV_SUPPORTED=true
            echo "[$(date)] SR-IOV supported on GPU $addr (Total VFs: $TOTAL_VFS)"
            break
          else
            echo "[$(date)] SR-IOV not supported on GPU $addr"
          fi
        done
      else
        echo "[$(date)] Skipping SR-IOV check (VFIO: $VFIO_DRIVER_IN_USE)"
      fi
      
      # Get GPU PCI addresses (only those bound to vfio-pci)
      echo "[$(date)] Collecting GPU PCI addresses (vfio-pci only)..."
      AVAILABLE_GPU_ADDRESSES=""
      if [ "$NVIDIA_DETECTED" = true ] || [ "$AMD_DETECTED" = true ]; then
        ALL_GPU_ADDRS=$(lspci -D | grep -i "VGA" | grep -iE "NVIDIA|AMD" | awk '{print $1}')
        for addr in $ALL_GPU_ADDRS; do
          if [ -z "$addr" ]; then
            continue
          fi
          GPU_DRIVER=$(lspci -k -s "$addr" 2>/dev/null | grep "Kernel driver in use" | awk '{print $5}' || echo "")
          if [ "$GPU_DRIVER" = "vfio-pci" ]; then
            echo "[$(date)] Found vfio-pci GPU: $addr"
            if [ -z "$AVAILABLE_GPU_ADDRESSES" ]; then
              AVAILABLE_GPU_ADDRESSES="$addr"
            else
              AVAILABLE_GPU_ADDRESSES="$AVAILABLE_GPU_ADDRESSES"$'\n'"$addr"
            fi
          else
            echo "[$(date)] Skipping GPU $addr (driver: ${GPU_DRIVER:-none}, not vfio-pci)"
          fi
        done
      fi
      GPU_PCI_ADDRESSES=$(echo "$AVAILABLE_GPU_ADDRESSES" | jq -R -s -c 'split("\n") | map(select(length > 0))' || echo '[]')
      echo "[$(date)] Available GPU PCI addresses (vfio-pci bound): $GPU_PCI_ADDRESSES"
      
      # Determine supported modes
      echo "[$(date)] Determining supported GPU modes..."
      NO_GPU_SUPPORTED=true
      PASSTHROUGH_SUPPORTED=false
      PARTITIONED_SUPPORTED=false
      
      # Passthrough is supported if GPU exists (regardless of driver)
      if [ "$NVIDIA_DETECTED" = true ] || [ "$AMD_DETECTED" = true ]; then
        PASSTHROUGH_SUPPORTED=true
        echo "[$(date)] GPU passthrough: SUPPORTED"
      fi
      
      # Partitioning only supported if not using vfio-pci and MIG/SR-IOV available
      if [ "$VFIO_DRIVER_IN_USE" = false ]; then
        if [ "$MIG_SUPPORTED" = true ] || [ "$SRIOV_SUPPORTED" = true ]; then
          PARTITIONED_SUPPORTED=true
          echo "[$(date)] GPU partitioning: SUPPORTED"
        else
          echo "[$(date)] GPU partitioning: NOT SUPPORTED (no MIG/SR-IOV)"
        fi
      else
        echo "[$(date)] GPU partitioning: NOT AVAILABLE (vfio-pci driver in use for passthrough)"
      fi
      
      # Generate config JSON
      echo "[$(date)] Writing config file: $CONFIG_FILE"
      cat > "$CONFIG_FILE" << EOF
      {
        "nvidia_detected": $NVIDIA_DETECTED,
        "amd_detected": $AMD_DETECTED,
        "nvidia_mig_supported": $MIG_SUPPORTED,
        "nvidia_mig_enabled": $MIG_ENABLED,
        "sriov_supported": $SRIOV_SUPPORTED,
        "vm_gpu_modes": {
          "no_gpu": $NO_GPU_SUPPORTED,
          "passthrough_only": $PASSTHROUGH_SUPPORTED,
          "partitioned_gpu": $PARTITIONED_SUPPORTED
        },
        "detection_timestamp": "$TIMESTAMP",
        "hostname": "$HOSTNAME"
      }
      EOF
      echo "[$(date)] Config file written successfully"
      
      # Generate lockfile JSON
      echo "[$(date)] Writing lockfile: $LOCKFILE"
      cat > "$LOCKFILE" << EOF
      {
        "lockfile_version": "1.0",
        "generated_timestamp": "$TIMESTAMP",
        "hostname": "$HOSTNAME",
        "gpu_modes": {
          "no_gpu": {
            "supported": $NO_GPU_SUPPORTED,
            "virt_install_flags": [],
            "description": "Standard VM without attached GPU"
          },
          "passthrough": {
            "supported": $PASSTHROUGH_SUPPORTED,
            "virt_install_flags": [
              "--hostdev",
              "<PCI_ADDRESS>"
            ],
            "available_devices": $GPU_PCI_ADDRESSES,
            "description": "Full GPU passthrough to single VM",
            "requirements": [
              "GPU must not be in use by host",
              "IOMMU must be enabled",
              "vfio-pci driver must be loaded"
            ]
          },
          "partitioned": {
            "supported": $PARTITIONED_SUPPORTED,
            "nvidia_mig": {
              "supported": $MIG_SUPPORTED,
              "enabled": $MIG_ENABLED,
              "virt_install_flags": [
                "--hostdev",
                "<MIG_INSTANCE_PCI_ADDRESS>"
              ],
              "setup_required": [
                "Enable MIG mode: nvidia-smi -i <GPU_ID> -mig 1",
                "Create MIG instances: nvidia-smi mig -cgi <profile_id>",
                "Get instance PCI address: nvidia-smi mig -lgi"
              ]
            },
            "sriov": {
              "supported": $SRIOV_SUPPORTED,
              "virt_install_flags": [
                "--hostdev",
                "<VF_PCI_ADDRESS>"
              ],
              "setup_required": [
                "Enable SR-IOV: echo <NUM_VFS> > /sys/bus/pci/devices/<PCI_ADDRESS>/sriov_numvfs",
                "Bind VF to vfio-pci driver",
                "List VFs: lspci | grep 'Virtual Function'"
              ]
            },
            "description": "GPU partitioning allows multiple VMs to share GPU resources"
          }
        },
        "detection_details": {
          "nvidia_detected": $NVIDIA_DETECTED,
          "amd_detected": $AMD_DETECTED,
          "nvidia_mig_supported": $MIG_SUPPORTED,
          "nvidia_mig_enabled": $MIG_ENABLED,
          "sriov_supported": $SRIOV_SUPPORTED
        },
        "usage_instructions": {
          "check_support": "jq '.gpu_modes.<mode>.supported' /etc/libvirt/gpu-capabilities/gpu-lockfile.json",
          "get_flags": "jq -r '.gpu_modes.<mode>.virt_install_flags[]' /etc/libvirt/gpu-capabilities/gpu-lockfile.json",
          "list_devices": "jq -r '.gpu_modes.passthrough.available_devices[]' /etc/libvirt/gpu-capabilities/gpu-lockfile.json"
        }
      }
      EOF
      echo "[$(date)] Lockfile written successfully"
      
      echo "[$(date)] GPU detection complete. Files updated:"
      echo "  - $CONFIG_FILE"
      echo "  - $LOCKFILE"
      echo "[$(date)] GPU Detection Service finished successfully"
  tags:
    - gpu_detection
    - build_completion
    - enable_gpu_detection_on_boot

- name: Create GPU detection systemd service
  copy:
    dest: /etc/systemd/system/gpu-detect.service
    mode: '0644'
    content: |
      [Unit]
      Description=GPU Detection Service
      After=multi-user.target
      Before=libvirtd.service
      
      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/gpu-detect
      RemainAfterExit=yes
      StandardOutput=journal
      StandardError=journal
      
      [Install]
      WantedBy=multi-user.target
  tags:
    - gpu_detection
    - build_completion
    - enable_gpu_detection_on_boot

- name: Enable and start GPU detection service
  systemd:
    name: gpu-detect
    enabled: yes
    state: started
    daemon_reload: yes
  tags:
    - gpu_detection
    - build_completion
    - enable_gpu_detection_on_boot

- name: Display GPU detection summary
  debug:
    msg:
      - "=== GPU Detection Summary ==="
      - "NVIDIA GPU Detected: {{ 'YES' if gpu_capabilities.nvidia_detected else 'NO' }}"
      - "AMD GPU Detected: {{ 'YES' if gpu_capabilities.amd_detected else 'NO' }}"
      - "NVIDIA MIG Supported: {{ 'YES' if gpu_capabilities.nvidia_mig_supported else 'NO' }}"
      - "NVIDIA MIG Enabled: {{ 'YES' if gpu_capabilities.nvidia_mig_enabled else 'NO' }}"
      - "SR-IOV Supported: {{ 'YES' if gpu_capabilities.sriov_supported else 'NO' }}"
      - ""
      - "VM GPU Modes Available:"
      - "  (1) No GPU VM: {{ 'SUPPORTED' if gpu_capabilities.vm_gpu_modes.no_gpu else 'NOT SUPPORTED' }}"
      - "  (2) Passthrough-only GPU VM: {{ 'SUPPORTED' if gpu_capabilities.vm_gpu_modes.passthrough_only else 'NOT SUPPORTED' }}"
      - "  (3) Partitioned GPU VM: {{ 'SUPPORTED' if gpu_capabilities.vm_gpu_modes.partitioned_gpu else 'NOT SUPPORTED' }}"
      - ""
      - "Configuration saved to:"
      - "  - /etc/libvirt/gpu-capabilities/gpu-config.json (detailed info)"
      - "  - /etc/libvirt/gpu-capabilities/gpu-lockfile.json (VM provisioning lockfile)"
      - ""
      - "Use lockfile in Ansible: include_vars /etc/libvirt/gpu-capabilities/gpu-lockfile.json"
  when: gpu_capabilities is defined
  tags:
    - gpu_detection
    - build_completion

- name: Display final notes
  debug:
    msg: |-
      {% 
        if vm_image_type == "golden" 
          and credentials_file_result is defined and credentials_file_result.changed 
          and packer_build_result is defined and packer_build_result.rc == 0
          and verify_artifacts is defined and verify_artifacts is succeeded
      %}
      === Golden Image Creation Complete ===
      1. Packer build completed with return code: {{ packer_build_result.rc }}
      2. Artifacts have been uploaded to GCS bucket: {{ gcs_bucket_url }}
         - Date-stamped folder: {{ gcs_date_path }}
         - Current folder: {{ gcs_current_path }}
      3. Artifacts have been copied to /var/lib/libvirt/images/ under the name: {{ build_name }}-{{ build_version }}.qcow2
      4. Local artifacts have been cleaned up
      5. management-vars.yaml file created at: {{ credentials_file_result.dest }}
         - Contains root SSH credentials for the golden image      
      6. GPU capabilities detected and saved to /etc/libvirt/gpu-capabilities/
      GPU Lockfile: /etc/libvirt/gpu-capabilities/gpu-lockfile.json
      7. IOMMU Status: {{ 'ON' if iommu_active_check.rc == 0 else 'OFF' }}

      GPU Lockfile location: /etc/libvirt/gpu-capabilities/gpu-lockfile.json
      
      To use in VM creation Ansible scripts:
        1. Load lockfile with include_vars
        2. Check gpu_lockfile.gpu_modes.<mode>.supported boolean
        3. Use gpu_lockfile.gpu_modes.<mode>.virt_install_flags for parameters
        4. Get available devices from gpu_lockfile.gpu_modes.passthrough.available_devices

      You can now use the created golden image in your VM deployments.
      {% else %}
      === Setup Complete ===
      GPU capabilities detected and saved to /etc/libvirt/gpu-capabilities/
      GPU Lockfile: /etc/libvirt/gpu-capabilities/gpu-lockfile.json
      IOMMU Status: {{ 'ON' if iommu_active_check.rc == 0 else 'OFF' }}

      GPU Lockfile location: /etc/libvirt/gpu-capabilities/gpu-lockfile.json
      
      To use in VM creation Ansible scripts:
        1. Load lockfile with include_vars
        2. Check gpu_lockfile.gpu_modes.<mode>.supported boolean
        3. Use gpu_lockfile.gpu_modes.<mode>.virt_install_flags for parameters
        4. Get available devices from gpu_lockfile.gpu_modes.passthrough.available_devices
      {% endif %}
  tags:
    - artifacts_cleanup
    - build_completion
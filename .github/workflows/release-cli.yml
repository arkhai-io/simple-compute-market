name: Release Market CLI

on:
  push:
    tags:
      - 'cli-v*.*.*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT_SUBMODULES }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

      - name: Verify wheel was built
        run: ls -lh dist/*.whl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            pip install market_cli-*.whl
            ```

      - name: Generate build summary
        run: |
          WHEEL_FILE=$(ls dist/*.whl)
          WHEEL_SIZE=$(wc -c < "$WHEEL_FILE" | tr -d ' ')
          WHEEL_SIZE_KB=$(( WHEEL_SIZE / 1024 ))
          echo "### Market CLI Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Wheel size:** ${WHEEL_SIZE_KB} KB" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install (pip):**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "pip install market_cli-*.whl" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

name: Release Market CLI

on:
  push:
    tags:
      - 'market-cli-v*.*.*'
  workflow_dispatch:

env:
  TARBALL_NAME: market-cli.tar.gz

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT_SUBMODULES }}

      - name: Determine CLI version
        run: |
          if [[ "$GITHUB_REF_NAME" == market-cli-v* ]]; then
            echo "CLI_VERSION=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
          else
            echo "CLI_VERSION=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          fi

      - name: Build tarball
        run: |
          tar czf "/tmp/$TARBALL_NAME" \
            --transform 's,^\./,market-cli/,' \
            --transform 's,^\.$$,market-cli,' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='mcp' \
            --exclude='./scripts' \
            --exclude='tmp' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='.venv' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.tmp' \
            --exclude='*.egg-info' \
            --exclude='.claude' \
            --exclude='Dockerfile' \
            --exclude='docker-compose*.yml' \
            --exclude='market-installer.sh' \
            --exclude='.DS_Store' \
            --exclude='*.pt' \
            --exclude='experiments' \
            .
          mv "/tmp/$TARBALL_NAME" .
          ls -lh "$TARBALL_NAME"

      - name: Generate checksum
        run: |
          sha256sum "$TARBALL_NAME" > "${TARBALL_NAME}.sha256"

      - name: Prepare installer script (curl entry point)
        run: cp scripts/install-remote.sh install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            ${{ env.TARBALL_NAME }}
            ${{ env.TARBALL_NAME }}.sha256
          generate_release_notes: true
          body: |
            ## Install

            ```bash
            curl -fsSL https://github.com/arkhai-io/simple-compute-market/releases/latest/download/install.sh | bash
            ```

            Pin a specific version:

            ```bash
            curl -fsSL https://github.com/arkhai-io/simple-compute-market/releases/latest/download/install.sh | \
              bash -s -- --version ${{ env.CLI_VERSION }}
            ```

      - name: Build summary
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TARBALL_SIZE=$(wc -c < "$TARBALL_NAME" | tr -d ' ')
          TARBALL_SIZE_KB=$(( TARBALL_SIZE / 1024 ))
          echo "### Market CLI Release" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tag:** \`${REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tarball size:** ${TARBALL_SIZE_KB} KB" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Install (cURL):**" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "curl -fsSL https://github.com/arkhai-io/simple-compute-market/releases/latest/download/install.sh | bash" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

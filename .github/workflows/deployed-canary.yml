name: Deployed Canary

on:
  workflow_dispatch:
    inputs:
      isolated_environment:
        description: "Target isolated environment identifier. This workflow must never target shared production."
        required: true
        type: string
      isolation_ack:
        description: 'Type "isolated" to confirm this run targets an isolated environment.'
        required: true
        type: string
      local_secrets_dir:
        description: "Local secret source-of-truth on the self-hosted runner."
        required: true
        default: "~/.config/simple-market-service"
        type: string
      render_output_dir:
        description: "Host-local rendered env directory."
        required: true
        default: "/etc/simple-market-service"
        type: string
      apply_funding:
        description: "Broadcast funding top-ups before the canary instead of only planning them."
        required: true
        default: true
        type: boolean
      mainnet_ack:
        description: 'Type "base-mainnet" to permit a Base mainnet funding/run path.'
        required: false
        default: ""
        type: string
      run_release_gates:
        description: "Run repo-side deployment gates before the live canary."
        required: true
        default: true
        type: boolean

jobs:
  deployed-canary:
    name: Deployed canary (isolated environment)
    runs-on:
      - self-hosted
      - linux
      - x64
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.8.13"
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: erc-8004-contracts/package-lock.json

      - name: Enforce isolated environment
        shell: bash
        run: |
          if [[ "${{ inputs.isolation_ack }}" != "isolated" ]]; then
            echo 'Refusing to run: set isolation_ack to "isolated".' >&2
            exit 1
          fi

          case "${{ inputs.isolated_environment }}" in
            production|prod|shared-production|shared-prod)
              echo "Refusing to run against shared production. Use an isolated environment identifier." >&2
              exit 1
              ;;
          esac

      - name: Validate host-local env contract
        shell: bash
        run: |
          for path in \
            "${{ inputs.local_secrets_dir }}/alchemy.env" \
            "${{ inputs.local_secrets_dir }}/wallets.env" \
            "${{ inputs.local_secrets_dir }}/shared.env" \
            "${{ inputs.local_secrets_dir }}/contracts.env" \
            "${{ inputs.local_secrets_dir }}/registry.env" \
            "${{ inputs.local_secrets_dir }}/provisioning.env" \
            "${{ inputs.local_secrets_dir }}/seller-agent.env" \
            "${{ inputs.local_secrets_dir }}/buyer-agent.env" \
            "${{ inputs.local_secrets_dir }}/prod-canary.env" \
            "${{ inputs.local_secrets_dir }}/management-vars.yaml"; do
            if [[ ! -f "$path" ]]; then
              echo "Required local secret file not found: $path" >&2
              exit 1
            fi
          done

      - name: Run repeatable canary
        id: repeatable-canary
        continue-on-error: true
        shell: bash
        run: |
          # scripts/run_repeatable_canary.py orchestrates scripts/materialize_host_envs.py,
          # scripts/pre_canary_fund.py, scripts/prod_canary_smoke.py, and
          # scripts/prod_canary_rollback.py while rendering
          # /etc/simple-market-service/prod-canary.env and siblings.
          mkdir -p artifacts

          args=(
            --environment "${{ inputs.isolated_environment }}"
            --local-secrets-dir "${{ inputs.local_secrets_dir }}"
            --output-dir "${{ inputs.render_output_dir }}"
            --artifacts-dir artifacts
            --inventory-path compute-provisioning-iac/ansible/inventory/hosts
          )

          if [[ "${{ inputs.apply_funding }}" == "true" ]]; then
            args+=(--apply-funding)
          fi

          if [[ "${{ inputs.run_release_gates }}" != "true" ]]; then
            args+=(--skip-deployment-gates)
          fi

          if [[ "${{ inputs.mainnet_ack }}" == "base-mainnet" ]]; then
            args+=(--allow-mainnet)
          fi

          python scripts/run_repeatable_canary.py "${args[@]}"

      - name: Validate release signoff proof after the canary succeeds
        if: ${{ steps.repeatable-canary.outcome == 'success' }}
        shell: bash
        run: |
          python scripts/run_release_gate_checks.py \
            --deployed-canary-log artifacts/prod-canary.log \
            --environment "${{ inputs.isolated_environment }}" \
            --seller-agent-env "${{ inputs.render_output_dir }}/seller-agent.env" \
            --buyer-agent-env "${{ inputs.render_output_dir }}/buyer-agent.env" \
            --provisioning-env "${{ inputs.render_output_dir }}/provisioning.env" \
            --registry-env "${{ inputs.render_output_dir }}/registry.env" \
            --inventory-path compute-provisioning-iac/ansible/inventory/hosts \
            --skip-smoke-help

      - name: Upload deployed canary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployed-canary-${{ inputs.isolated_environment }}
          path: artifacts/

      - name: Fail if deployed canary did not pass
        if: ${{ steps.repeatable-canary.outcome != 'success' }}
        shell: bash
        run: |
          echo "Live canary failed. Rollback was attempted; inspect uploaded artifacts." >&2
          exit 1

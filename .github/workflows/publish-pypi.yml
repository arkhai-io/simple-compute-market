name: Publish Python packages

on:
  push:
    branches: [main]
    paths:
      - 'kit/policy/**'
      - 'domains/vms/provisioning/service/**'
      - 'core/storefront-client/**'
      - 'core/registry-client/**'
      - '.github/workflows/publish-pypi.yml'
  workflow_dispatch:

concurrency:
  group: publish-pypi
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

# Trusted publishing (OIDC, no secrets needed). Configure each package's
# publisher at https://pypi.org/manage/project/<pkg>/settings/publishing/
# with:
#   Owner       = arkhai-io
#   Repo        = simple-compute-market
#   Workflow    = publish-pypi.yml
#   Environment = pypi-<pkg>            (matches `environment.name` below)
#
# Distribution names follow the core/kit/domain split with an `arkhai-`
# prefix (to be dropped once published under the organization's PyPI
# scope):
#   arkhai-kit-policy, arkhai-vms-provisioning,
#   arkhai-core-storefront-client, arkhai-core-registry-client
# None of the published packages has internal deps on another published
# package, so there is no sequencing inside one run.

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      policy:               ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.policy }}
      vms-provisioning:     ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.vms-provisioning }}
      storefront-client:    ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.storefront-client }}
      registry-client:      ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.registry-client }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            policy:
              - 'kit/policy/**'
            vms-provisioning:
              - 'domains/vms/provisioning/service/**'
            storefront-client:
              - 'core/storefront-client/**'
            registry-client:
              - 'core/registry-client/**'

  publish-policy:
    needs: detect-changes
    if: needs.detect-changes.outputs.policy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi-arkhai-kit-policy
      url: https://pypi.org/p/arkhai-kit-policy
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.13"
      - name: Check version not yet on PyPI
        id: check
        env:
          PKG_DIR: kit/policy
        run: |
          set -euo pipefail
          version=$(awk -F'"' '/^version *= */{print $2; exit}' "${PKG_DIR}/pyproject.toml")
          name=$(awk -F'"' '/^name *= */{print $2; exit}' "${PKG_DIR}/pyproject.toml")
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if curl -sSL "https://pypi.org/pypi/${name}/json" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if '${version}' in d.get('releases', {}) else 1)"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${name} ${version} already on PyPI; skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build wheel + sdist
        if: steps.check.outputs.skip == 'false'
        working-directory: kit/policy
        # --no-sources strips tool.uv.sources overrides so the wheel records
        # plain PyPI deps instead of workspace paths.
        run: uv build --no-sources
      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: kit/policy/dist

  publish-vms-provisioning:
    needs: detect-changes
    if: needs.detect-changes.outputs.vms-provisioning == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi-arkhai-vms-provisioning
      url: https://pypi.org/p/arkhai-vms-provisioning
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.13"
      - name: Check version not yet on PyPI
        id: check
        env:
          PKG_DIR: domains/vms/provisioning/service
        run: |
          set -euo pipefail
          version=$(awk -F'"' '/^version *= */{print $2; exit}' "${PKG_DIR}/pyproject.toml")
          name=$(awk -F'"' '/^name *= */{print $2; exit}' "${PKG_DIR}/pyproject.toml")
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if curl -sSL "https://pypi.org/pypi/${name}/json" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if '${version}' in d.get('releases', {}) else 1)"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${name} ${version} already on PyPI; skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build wheel + sdist
        if: steps.check.outputs.skip == 'false'
        working-directory: domains/vms/provisioning/service
        run: uv build --no-sources
      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: domains/vms/provisioning/service/dist

  publish-storefront-client:
    needs: detect-changes
    if: needs.detect-changes.outputs.storefront-client == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi-arkhai-core-storefront-client
      url: https://pypi.org/p/arkhai-core-storefront-client
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.13"
      - name: Check version not yet on PyPI
        id: check
        env:
          PKG_DIR: core/storefront-client
        run: |
          set -euo pipefail
          version=$(awk -F'"' '/^version *= */{print $2; exit}' "${PKG_DIR}/pyproject.toml")
          name=$(awk -F'"' '/^name *= */{print $2; exit}' "${PKG_DIR}/pyproject.toml")
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if curl -sSL "https://pypi.org/pypi/${name}/json" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if '${version}' in d.get('releases', {}) else 1)"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${name} ${version} already on PyPI; skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build wheel + sdist
        if: steps.check.outputs.skip == 'false'
        working-directory: core/storefront-client
        run: uv build --no-sources
      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: core/storefront-client/dist

  publish-registry-client:
    needs: detect-changes
    if: needs.detect-changes.outputs.registry-client == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi-arkhai-core-registry-client
      url: https://pypi.org/p/arkhai-core-registry-client
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.8.13"
      - name: Check version not yet on PyPI
        id: check
        env:
          PKG_DIR: core/registry-client
        run: |
          set -euo pipefail
          version=$(awk -F'"' '/^version *= */{print $2; exit}' "${PKG_DIR}/pyproject.toml")
          name=$(awk -F'"' '/^name *= */{print $2; exit}' "${PKG_DIR}/pyproject.toml")
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if curl -sSL "https://pypi.org/pypi/${name}/json" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if '${version}' in d.get('releases', {}) else 1)"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${name} ${version} already on PyPI; skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build wheel + sdist
        if: steps.check.outputs.skip == 'false'
        working-directory: core/registry-client
        run: uv build --no-sources
      - name: Publish to PyPI
        if: steps.check.outputs.skip == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: core/registry-client/dist

name: Build and Push Async Provisioning Service Docker Image

on:
  push:
    branches:
      - main
      - develop
      - feature/registry-containerization
    paths:
      - 'async-provisioning-service/**'
      - '.github/workflows/docker-build-push-async-provisioning.yml'
    tags:
      - 'async-provisioning-v*.*.*'  # Triggers on version tags like async-provisioning-v1.0.0
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggers

env:
  DOCKER_REGISTRY_ORG: whitewidget
  IMAGE_NAME: arkhai-async-provisioning-service
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.10.0"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT_SUBMODULES }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_REGISTRY_ORG }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch pushes: use git SHA
            type=sha,format=short,enable=${{ github.ref_type == 'branch' }}
            # Tag pushes: use latest + version
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=match,pattern=async-provisioning-(v.*),group=1,enable=${{ github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.title=Async Provisioning Service
            org.opencontainers.image.description=Arkhai Async Provisioning Service for resource management
            org.opencontainers.image.vendor=WhiteWidget

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./async-provisioning-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
            UV_VERSION=${{ env.UV_VERSION }}

      - name: Generate build summary
        run: |
          echo "### Docker Image Build Summary :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_REGISTRY_ORG }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** Docker Hub" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.DOCKER_REGISTRY_ORG }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"

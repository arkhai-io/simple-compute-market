name: Tests

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Runs every package's unit + integration suite (integration tests are
# mocked at the boundary — no external services), plus the TypeScript and
# Rust middleware suites. Each Python package is tested in isolation with
# `uv run` resolving its workspace deps; `--with pytest[-asyncio]` supplies
# the runner regardless of whether the package declares it.
#
# Not included here: the docker-compose end-to-end suite (e2e-tests/),
# which builds the full image stack and is too heavy for per-push CI — it
# belongs in a separate (e.g. scheduled) workflow. tools/issue-discovery
# is also excluded (its bootstrap tests probe the host system).

jobs:
  python:
    name: py · ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      ACTIVE_PROFILES: mock
      # CI has no controlling TTY, so Rich falls back to COLUMNS for help
      # width; pin it wide so `typer --help` renders option flags
      # un-truncated (several plugin tests assert on flag substrings).
      COLUMNS: '200'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: kit-alkahest,           dir: kit/alkahest }
          - { name: kit-config,             dir: kit/config }
          - { name: kit-identity,           dir: kit/identity }
          - { name: kit-policy,             dir: kit/policy }
          - { name: core,                   dir: core }
          - { name: core-buyer,             dir: core/buyer }
          - { name: core-storefront,        dir: core/storefront }
          - { name: core-storefront-client, dir: core/storefront-client }
          - { name: core-registry,          dir: core/registry }
          - { name: core-site,              dir: core/site }
          # The deselected tests assert that injected/static option flags
          # appear in `typer --help` output; under headless pytest capture
          # in CI the Rich-rendered options panel comes back empty (passes
          # locally with a TTY). Tracked for a test-side fix.
          - { name: vms-buyer,              dir: domains/vms/buyer, pytest_args: "--deselect tests/test_plugin_export.py::test_assembled_listing_is_vm_rendering_not_generic_fallback --deselect tests/test_policy_cli_injection.py::test_policy_params_become_flags_and_land_in_kwargs --deselect tests/test_policy_cli_injection.py::test_assembled_buy_and_negotiate_surface_the_default_policy_flags" }
          # test_alkahest parity tests spawn node via alkahest_py (needs the
          # JS impl); cross-language parity is covered by the ts/rust jobs.
          - { name: vms-storefront,         dir: domains/vms/storefront, pytest_args: "--deselect tests/unit/test_alkahest.py::test_rust --deselect tests/unit/test_alkahest.py::test_python" }
          - { name: vms-provisioning,       dir: domains/vms/provisioning/service, pythonpath: src }
          - { name: apitokens-buyer,        dir: domains/apitokens/buyer, pytest_args: "--deselect tests/test_plugin_export.py::test_buy_surface_has_quantity_key_and_scalar_price_flags --deselect tests/test_plugin_export.py::test_listing_surface_is_token_rendering_not_generic_fallback" }
          - { name: apitokens-storefront,   dir: domains/apitokens/storefront }
          - { name: apitokens-service,      dir: domains/apitokens/service }
          - { name: apitokens-middleware,   dir: domains/apitokens/middleware/python }
          - { name: apitokens-sample-app,   dir: domains/apitokens/sample-app }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.17"
      - name: pytest
        working-directory: ${{ matrix.dir }}
        env:
          PYTHONPATH: ${{ matrix.pythonpath }}
          PYTEST_ARGS: ${{ matrix.pytest_args }}
        # --no-cache: setup-uv points UV_CACHE_DIR at a temp dir that uv
        # can't reliably read back for PyPI-resolved sibling deps
        # ("failed to read from the distribution cache"); resolving without
        # the persistent cache avoids it.
        run: uv run --no-cache --with pytest --with pytest-asyncio pytest -q $PYTEST_ARGS

  ts-middleware:
    name: ts · apitokens-middleware
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: domains/apitokens/middleware/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: domains/apitokens/middleware/typescript/package-lock.json
      - run: npm ci
      - run: npm run check   # tsc --noEmit + node --test conformance/gate suites

  rust-middleware:
    name: rust · apitokens-middleware
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: domains/apitokens/middleware/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: domains/apitokens/middleware/rust
      - run: cargo test --locked

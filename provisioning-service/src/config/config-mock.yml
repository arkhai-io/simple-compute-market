# ---------------------------------------------------------------------------
# Profile: mock
#
# Activates MockAnsibleService instead of the real AnsibleService.
# No Ansible binary, SSH key, or KVM host is required.
# Returned VM credentials are deterministic fakes.
#
# Usage:
#   ACTIVE_PROFILES=mock  (docker-compose e2e tests without real hardware)
#   ACTIVE_PROFILES=docker,mock  (Docker container, mock Ansible)
#
# The agent always calls the provisioning service HTTP API regardless of
# this profile — mock mode is a provisioning service concern, not an agent
# concern.  Set this profile on the provisioning-service container; the
# agent container needs no configuration change.
# ---------------------------------------------------------------------------

ansible_cfg: ""
playbook_path: "/dev/null"
inventory_path: "/dev/null"

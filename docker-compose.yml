version: '3.8'

services:
  # 1. Local test chain (Anvil)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: market-anvil
    ports:
      - "8545:8545"
    environment:
      - ANVIL_IP_ADDR=0.0.0.0
    command: >
      anvil

    networks:
      - market-network

  # # 2. Deploy contracts (runs once after anvil is ready)
  contracts-deploy:
    build:
      context: ./erc-8004-contracts
      dockerfile: Dockerfile
    container_name: market-contracts-deploy
    depends_on:
      anvil:
        condition: service_started

    environment:
      - ANVIL_RPC_URL=http://anvil:8545
      - ENV_FILE=/app/shared-env/.env

    networks:
      - market-network
    volumes:
      - contracts-artifacts:/app/artifacts
      - contracts-deployments:/app/deployments
      - shared-env:/app/shared-env
    command: >
      sh -lc "
      npm run deploy:anvil
      "

  # # 3. Registry/Indexer service
  registry:
    image: whitewidget/arkhai-erc-8004-registry:latest
    depends_on:
      contracts-deploy:
        condition: service_completed_successfully
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ./erc-8004-registry-py/.env:/app/service.env:ro
      - shared-env:/app/shared-env

    networks:
      - market-network

    command: >
      sh -lc "set -a;
      . /app/service.env;
      . /app/shared-env/.env;
      set +a;
      exec uv run uvicorn src.main:app --host 0.0.0.0 --port 8080"
      
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


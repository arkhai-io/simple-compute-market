# compose_local is deprecated. This file remains checked in only so existing
# callers receive an explicit failure until the compose surface is rebuilt
# against the canonical local bootstrap wrappers.
services:
  # 1. Local test chain (Anvil)
  anvil:
    image: arkhai:test-env
    container_name: anvil
    ports:
      - "8545:8545"
    environment:
      - ANVIL_IP_ADDR=0.0.0.0
    networks:
      - market-network

  # # 2. Deploy contracts (runs once after anvil is ready)
  contracts-deploy:
    build:
      context: ./erc-8004-contracts
      dockerfile: Dockerfile
    container_name: market-contracts-deploy
    depends_on:
      anvil:
        condition: service_started

    environment:
      - ANVIL_RPC_URL=http://anvil:8545
      - ENV_FILE=/app/shared-env/.env

    networks:
      - market-network
    volumes:
      - contracts-artifacts:/app/artifacts
      - contracts-deployments:/app/deployments
      - shared-env:/app/shared-env
    command: >
      sh -c "
      echo 'compose_local is deprecated; use the manual local bootstrap in README.md or scripts/deploy_local_contracts.py instead.' >&2 &&
      exit 1
      "

  # # 3. Registry/Indexer service
  registry:
    image: arkhai:registry
    depends_on:
      contracts-deploy:
        condition: service_completed_successfully
    ports:
      - "18080:8080"
    env_file:
      - ./erc-8004-registry-py/.env.docker-compose
    volumes:
      - shared-env:/app/shared-env
    networks:
      - market-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 3. Buyer agent (Alice)
  buy_agent:
    build:
      context: .
      dockerfile: core/Dockerfile
      args:
        INSTALL_RL_DEPS: "false"
    platform: linux/amd64
    container_name: market-agent-buy
    depends_on:
      registry:
        condition: service_healthy
    ports:
      - "18000:8000"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./core/agent/.env.alice.docker-compose
    environment:
      # Force re-registration on every fresh Anvil — clear stale IDs from env file
      - ONCHAIN_AGENT_ID=
      - ZEROTIER_IP=
    volumes:
      - shared-env:/app/shared-env
      - zerotier-buy:/var/lib/zerotier-one
    networks:
      - market-network
    deploy:
      resources:
        limits:
          memory: 512m
    command:
      - sh
      - -c
      - |
        set -a
        . /app/shared-env/.env
        set +a
        exec ./entrypoint.sh

  # 4. Seller agent (Bob)
  sell_agent:
    build:
      context: .
      dockerfile: core/Dockerfile
      args:
        INSTALL_RL_DEPS: "false"
    platform: linux/amd64
    container_name: market-agent-sell
    depends_on:
      registry:
        condition: service_healthy
    ports:
      - "18001:8001"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ./core/agent/.env.bob.docker-compose
    environment:
      # Force re-registration on every fresh Anvil — clear stale IDs from env file
      - ONCHAIN_AGENT_ID=
      - ZEROTIER_IP=
    volumes:
      - shared-env:/app/shared-env
      - zerotier-sell:/var/lib/zerotier-one
    networks:
      - market-network
    deploy:
      resources:
        limits:
          memory: 512m
    command:
      - sh
      - -c
      - |
        set -a
        . /app/shared-env/.env
        set +a
        echo "Importing seller resources..."
        PYTHONPATH="/:/app:/app/core/agent" uv run python core/agent/scripts/import_resources_csv.py \
          --csv core/agent/app/data/ww1-machine.csv
        exec ./entrypoint.sh

  # 5. Redis (job queue for provisioning service)
  redis:
    image: redis:7-alpine
    container_name: market-redis
    ports:
      - "16379:6379"
    networks:
      - market-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # 6. Async provisioning service
  provisioning:
    build:
      context: .
      dockerfile: async-provisioning-service/Dockerfile
    container_name: market-provisioning
    depends_on:
      redis:
        condition: service_healthy
      registry:
        condition: service_healthy
    ports:
      - "18081:8081"
    env_file:
      - ./async-provisioning-service/.env.docker-compose
    volumes:
      - ./compute-provisioning-iac:/app/compute-provisioning-iac
      - ${HOME}/.ssh/id_ed25519:/home/appuser/.ssh/id_ed25519:ro
    networks:
      - market-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m
networks:
  market-network:
    driver: bridge

volumes:
  contracts-artifacts:
  contracts-deployments:
  registry-data:
  shared-env:
  zerotier-buy:
  zerotier-sell:

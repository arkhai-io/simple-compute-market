services:
  # 1. Local test chain (Anvil). The arkhai:dev-env image boots anvil with
  #    the Alkahest contracts + mock tokens pre-baked into its state snapshot
  #    (dev-env/state/state.json), so no separate deploy step is needed.
  anvil:
    image: arkhai:dev-env
    container_name: anvil
    ports:
      - "8545:8545"
    environment:
      - ANVIL_IP_ADDR=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -s -X POST http://localhost:8545 -H 'Content-Type: application/json' -d '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' | grep -q result || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # 2. Registry/Indexer service
  registry:
    image: arkhai:registry
    depends_on:
      anvil:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - ./core/registry/.env.docker-compose
    volumes:
      - ./shared-env:/app/shared-env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      # CMD-SHELL form works reliably under both Docker and Podman; the
      # CMD+argv form can be mis-parsed on Podman for non-trivial Python code.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 2b. Second Registry/Indexer — a "private" registry alongside the
  # public one, exercising the multi-registry code paths permanently
  # in CI. Same image, same chain, independent SQLite. Both EventSync
  # the same anvil so the seller's on-chain agent registration is
  # picked up by both; publish/discover fan-out and fan-in against
  # the union (domains/vms/storefront/.../utils/multi_registry_client.py).
  registry-b:
    image: arkhai:registry
    depends_on:
      anvil:
        condition: service_healthy
    ports:
      - "8082:8080"
    env_file:
      - ./core/registry/.env.docker-compose
    environment:
      # Private-registry config: read and write gate independently, both
      # on here, so every non-admin request must carry
      # ``Authorization: Bearer <key>`` matching a non-revoked row in
      # api_keys. The BOOTSTRAP_API_KEY seeds a single write-scoped row at
      # startup (write implies read) so the storefront can publish to
      # registry-b on a fresh ``compose up`` without an out-of-band mint
      # step, and the buyer can discover from it with the same token.
      # Bob's storefront.bob.toml carries the matching token in
      # [registry.auth].
      - REGISTRY_REQUIRE_READ_API_KEY=true
      - REGISTRY_REQUIRE_WRITE_API_KEY=true
      - REGISTRY_ADMIN_API_KEY=test-admin-token
      - REGISTRY_BOOTSTRAP_API_KEY=test-buyer-token
    volumes:
      - ./shared-env:/app/shared-env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 3. Bob's storefront — the primary test seller.
  # Buyers are pure HTTP clients (the `market` CLI / domains.vms.buyer
  # library). The buyer-side e2e runs as a one-shot container on this same
  # network (the e2e-tests image, which bundles the `market`
  # binary), so discovery resolves the seller's registry-advertised URL
  # (bob-storefront:8001) and reaches it the way a real remote buyer would.
  # See `make test-buyer-machine`.
  bob-storefront:
    image: arkhai:storefront
    platform: linux/amd64
    depends_on:
      registry:
        condition: service_healthy
      registry-b:
        condition: service_healthy
    ports:
      - "8001:8001"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # Sole config-bearing env var: tell the typed config loader where
      # to find the mounted TOML. The storefront config loader resolves
      # $XDG_CONFIG_HOME/arkhai/config.toml → /etc/arkhai/storefront.toml.
      - XDG_CONFIG_HOME=/etc
      # Provisioning-mode override stays a host-level env var because
      # tests flip it per-invocation (e.g. PROVISIONING_MODE=mock make
      # e2e-mock-happy). Wired into the storefront runtime via TOML override.
      - ARKHAI_PROVISIONING_MODE=${PROVISIONING_MODE:-http}
      - MOCK_PROVISIONING_SUCCESS=${MOCK_PROVISIONING_SUCCESS:-true}
      # The storefront's policy discovery needs `domains/` on PYTHONPATH
      # so it can find domains.vms.negotiation.rl callables.
      - PYTHONPATH=/app:/app/src
    volumes:
      - ./domains/vms/storefront/storefront.bob.toml:/etc/arkhai/storefront.toml:ro
      # Compute inventory seed CSV — storefront.bob.toml's
      # seller.resources_csv_path expects this at /app/resources.csv.
      - ./domains/vms/storefront/src/market_storefront/data/kvm1-machine.csv:/app/resources.csv:ro
      - zerotier-bob:/var/lib/zerotier-one
      # Named volume so `docker compose down -v` actually wipes storefront
      # state (resources, listings, negotiations, settlement jobs). Replaced
      # the earlier host bind mount under domains/vms/storefront/src/.../data/ — that
      # path was inside the source tree and survived `down -v`, leaving
      # reserved resources from prior runs that broke 05b on the next run.
      # Resource seeding now happens in storefront startup (40b1b9b).
      - bob-storefront-data:/app/src/market_storefront/data/storefront
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # 3b. Alice's storefront — exercises heterogeneous registry
  # topology in the multi-registry e2e scenario. Alice's config.toml
  # lists only the public registry, so her listings appear only
  # there, while Bob's fan out to both. This is the only thing that
  # makes the multi-registry scenario non-trivial: without an Alice,
  # every listing has the same registry footprint and the test can't
  # distinguish per-provider config from per-listing config.
  alice-storefront:
    image: arkhai:storefront
    platform: linux/amd64
    depends_on:
      registry:
        condition: service_healthy
    ports:
      - "8002:8002"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - XDG_CONFIG_HOME=/etc
      - ARKHAI_PROVISIONING_MODE=${PROVISIONING_MODE:-http}
      - MOCK_PROVISIONING_SUCCESS=${MOCK_PROVISIONING_SUCCESS:-true}
      - PYTHONPATH=/app:/app/src
    volumes:
      - ./domains/vms/storefront/storefront.alice.toml:/etc/arkhai/storefront.toml:ro
      # Reuses Bob's seed CSV — the multi-registry test seeds inventory
      # at runtime via admin_import_resources anyway, so the on-disk CSV
      # content is irrelevant. Bind-mounted to satisfy the config's
      # resources_csv_path requirement.
      - ./domains/vms/storefront/src/market_storefront/data/kvm1-machine.csv:/app/resources.csv:ro
      - zerotier-alice:/var/lib/zerotier-one
      - alice-storefront-data:/app/src/market_storefront/data/storefront
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # 4. Redis (job queue for provisioning service)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # 5. Provisioning service.
  # Configuration is bundled in the image (domains/vms/provisioning/service/src/settings.toml,
  # plus dynaconf profile loading via ACTIVE_PROFILES). Compose-time
  # overrides go in `environment:` below.
  provisioning:
    image: arkhai:provisioning
    platform: linux/amd64
    depends_on:
      redis:
        condition: service_healthy
      registry:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=sqlite:////app/data/provisioning.db
      - REDIS_URL=redis://redis:6379
      # Mounts /test/* router used by integration tests' provisioning_test_client
      # (TestStage07 mock-rules). Should never be set in staging/prod.
      - ACTIVE_PROFILES=mock
      # Storefront callback target for the lease watchdog.
      # When the watchdog releases a lease, it PATCHes this URL to mark the
      # storefront resource available. Must match the bob-storefront service
      # name and port defined in this compose file.
      - PROVISIONING_STOREFRONT_URL=http://bob-storefront:8001
      - PROVISIONING_STOREFRONT_ADMIN_KEY=${STOREFRONT_ADMIN_KEY:-test-api-key}
    volumes:
      - ./domains/vms/provisioning/iac:/opt/domains/vms/provisioning/iac
      - ${HOME}/.ssh/id_ed25519:/home/appuser/.ssh/id_ed25519:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m

  # ----------------------------------------------------------------------
  # API-tokens domain topology (item 6). A second registry speaking the
  # api_tokens schema, the tokens service (keys/credits/quota ledger), the
  # tokens storefront (self-seeds one quota-backed listing on startup), and
  # a sample app gated by the Python middleware. The buyer drives this with
  # `market tokens buy`; its schema filter routes discovery to the
  # api-tokens registry while leaving the vms.compute registry alone.
  # ----------------------------------------------------------------------

  # 6. Registry for the api_tokens schema — same image as `registry`,
  # different filter-spec (selected via REGISTRY_FILTER_SPEC_PATH).
  api-tokens-registry:
    image: arkhai:registry
    depends_on:
      anvil:
        condition: service_healthy
    ports:
      - "8090:8080"
    env_file:
      - ./core/registry/.env.docker-compose
    environment:
      - REGISTRY_FILTER_SPEC_PATH=/app/filter-spec-apitokens.yaml
    volumes:
      - ./shared-env:/app/shared-env
      - ./domains/apitokens/registry/filter-spec.yaml:/app/filter-spec-apitokens.yaml:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 7. Tokens service — keys, prepaid credit grants, consumption, and the
  # quota ledger. Admin-gated (X-Admin-Key); no chain dependency.
  tokens-service:
    image: arkhai:apitokens-service
    ports:
      - "8092:8082"
    environment:
      - APITOKENS_STOREFRONT_ADMIN_KEY=test-api-key
    volumes:
      - tokens-service-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8082/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # 8. Sample gated app — one metered endpoint (/api/forecast) behind the
  # Python token-gating middleware. Verifies/consumes against tokens-service.
  sample-app:
    image: arkhai:apitokens-sample-app
    depends_on:
      tokens-service:
        condition: service_healthy
    ports:
      - "8095:8085"
    environment:
      - APITOKENS_MIDDLEWARE_SERVICE_URL=http://tokens-service:8082
      - APITOKENS_MIDDLEWARE_ADMIN_KEY=test-api-key
      - APITOKENS_MIDDLEWARE_AMOUNT_PER_REQUEST=1
      # Short verify cache so a re-purchase (top-up) becomes visible to
      # the gate quickly — the e2e polls through this window.
      - APITOKENS_MIDDLEWARE_VERIFY_TTL_SECONDS=3
      - APITOKENS_MIDDLEWARE_PURCHASE_SERVICE_NAME=weather-api
      - APITOKENS_MIDDLEWARE_PURCHASE_STOREFRONT_URL=http://tokens-storefront:8000
      - APITOKENS_MIDDLEWARE_PURCHASE_REGISTRY_URL=http://api-tokens-registry:8080
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # 9. Tokens storefront — quota-backed listings + issuance-backed
  # settlement. Self-seeds one listing on startup (storefront.tokens.toml
  # [seed] block) pointing at the sample app.
  tokens-storefront:
    image: arkhai:apitokens-storefront
    platform: linux/amd64
    depends_on:
      anvil:
        condition: service_healthy
      api-tokens-registry:
        condition: service_healthy
      tokens-service:
        condition: service_healthy
      sample-app:
        condition: service_healthy
    ports:
      - "8093:8000"
    environment:
      - XDG_CONFIG_HOME=/etc
      - PYTHONPATH=/app
    volumes:
      - ./domains/apitokens/storefront/storefront.tokens.toml:/etc/arkhai/storefront.toml:ro
      - ./domains/vms/storefront/src/market_storefront/data/alkahest_anvil_addresses.json:/app/alkahest_anvil_addresses.json:ro
      - tokens-storefront-data:/app/src/apitokens_storefront/data/storefront
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  zerotier-bob:
  zerotier-alice:
  bob-storefront-data:
  alice-storefront-data:
  tokens-service-data:
  tokens-storefront-data:

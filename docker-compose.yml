services:
  # 1. Local test chain (Anvil)
  anvil:
    image: arkhai:test-env
    container_name: anvil
    ports:
      - "8545:8545"
    environment:
      - ANVIL_IP_ADDR=0.0.0.0
    networks:
      - market-network

  # 2. One-shot contract deployer — writes IDENTITY_REGISTRY_ADDRESS to shared-env/.env, then exits.
  #    registry and agents depend on this completing before they start.
  contracts-deploy:
    image: arkhai:contract-deployer
    container_name: market-contracts-deploy
    depends_on:
      anvil:
        condition: service_started
    environment:
      - ENV_FILE=/app/shared-env/.env
      - RPC_URL=http://anvil:8545
    volumes:
      - ./shared-env:/app/shared-env
    networks:
      - market-network
    command: sh -c ./deploy-local.sh

  # 3. Registry/Indexer service
  registry:
    image: arkhai:registry
    depends_on:
      contracts-deploy:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    env_file:
      - ./registry-service/.env.docker-compose
    volumes:
      - ./shared-env:/app/shared-env
    networks:
      - market-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      # CMD-SHELL form works reliably under both Docker and Podman; the
      # CMD+argv form can be mis-parsed on Podman for non-trivial Python code.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 3b. Second Registry/Indexer — a "private" registry alongside the
  # public one, exercising the multi-registry code paths permanently
  # in CI. Same image, same chain, independent SQLite. Both EventSync
  # the same anvil so the seller's on-chain agent registration is
  # picked up by both; publish/discover fan-out and fan-in against
  # the union (storefront/utils/multi_registry_client.py).
  registry-b:
    image: arkhai:registry
    depends_on:
      contracts-deploy:
        condition: service_completed_successfully
    ports:
      - "8082:8080"
    env_file:
      - ./registry-service/.env.docker-compose
    environment:
      # Private-registry config: every non-admin request must carry
      # ``Authorization: Bearer <key>`` matching a non-revoked row in
      # api_keys. The BOOTSTRAP_API_KEY seeds a single row at startup
      # so the storefront can publish to registry-b on a fresh
      # ``compose up`` without an out-of-band mint step. Bob's
      # config.bob.toml carries the matching token in [registry.auth].
      - REGISTRY_REQUIRE_API_KEY=true
      - REGISTRY_ADMIN_API_KEY=test-admin-token
      - REGISTRY_BOOTSTRAP_API_KEY=test-buyer-token
    volumes:
      - ./shared-env:/app/shared-env
    networks:
      - market-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 4. Seller agent (Bob).
  # Buyers are pure HTTP clients (the `market` CLI / market_buyer
  # library) — no buyer container in this stack. To exercise a buy
  # against this seller, run `market buy ...` from the host (or a
  # one-shot pod / Job that sees the same network).
  sell_agent:
    image: arkhai:storefront
    platform: linux/amd64
    container_name: market-agent-sell
    depends_on:
      registry:
        condition: service_healthy
      registry-b:
        condition: service_healthy
    ports:
      - "8001:8001"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # Sole config-bearing env var: tell the typed config loader where
      # to find the mounted TOML. service.config_loader resolves
      # $XDG_CONFIG_HOME/arkhai/config.toml → /etc/arkhai/config.toml.
      - XDG_CONFIG_HOME=/etc
      # Provisioning-mode override stays a host-level env var because
      # tests flip it per-invocation (e.g. PROVISIONING_MODE=mock make
      # e2e-mock-happy). Wired into the agent runtime via TOML override.
      - ARKHAI_PROVISIONING_MODE=${PROVISIONING_MODE:-http}
      - MOCK_PROVISIONING_SUCCESS=${MOCK_PROVISIONING_SUCCESS:-true}
      # The seller agent's policy discovery needs `domain/` on PYTHONPATH
      # so it can find domain.compute.agent.app.policy callables.
      - PYTHONPATH=/app:/app/src
    volumes:
      - ./storefront/config.bob.toml:/etc/arkhai/config.toml:ro
      # Compute inventory seed CSV — config.bob.toml's
      # seller.resources_csv_path expects this at /app/resources.csv.
      # Mirrors the deploy-seller-agent Makefile target.
      - ./storefront/src/market_storefront/data/ww1-machine.csv:/app/resources.csv:ro
      - zerotier-sell:/var/lib/zerotier-one
      # Named volume so `docker compose down -v` actually wipes seller state
      # (resources, listings, negotiations, settlement jobs). Replaced the
      # earlier host bind mount under storefront/src/.../data/sell-agent —
      # that path was inside the source tree and survived `down -v`, leaving
      # reserved resources from prior runs that broke 05b on the next run.
      # Resource seeding now happens in storefront startup (40b1b9b).
      - sell-agent-data:/app/src/market_storefront/data/sell-agent
    networks:
      - market-network
    deploy:
      resources:
        limits:
          memory: 512m

  # 6. Redis (job queue for provisioning service)
  redis:
    image: redis:7-alpine
    container_name: market-redis
    ports:
      - "6379:6379"
    networks:
      - market-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # 7. Provisioning service.
  # Configuration is bundled in the image (provisioning-service/src/settings.toml,
  # plus dynaconf profile loading via ACTIVE_PROFILES). Compose-time
  # overrides go in `environment:` below.
  provisioning:
    image: arkhai:provisioning
    platform: linux/amd64
    container_name: market-provisioning
    depends_on:
      redis:
        condition: service_healthy
      registry:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=sqlite:////app/data/provisioning.db
      - REDIS_URL=redis://redis:6379
      # Mounts /test/* router used by integration tests' provisioning_test_client
      # (TestStage07 mock-rules). Should never be set in staging/prod.
      - ACTIVE_PROFILES=mock
    volumes:
      - ./compute-provisioning-iac:/app/compute-provisioning-iac
      - ${HOME}/.ssh/id_ed25519:/home/appuser/.ssh/id_ed25519:ro
    networks:
      - market-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384m

networks:
  market-network:
    driver: bridge

volumes:
  zerotier-sell:
  sell-agent-data:

---
# VM Management - Start Tasks

- name: Start VM
  shell: virsh start {{ vm_name }}
  register: start_result
  delegate_to: "{{ target_host }}"

- name: Get current timestamp for start action
  shell: date -u +"%Y-%m-%dT%H:%M:%SZ"
  register: start_timestamp
  delegate_to: localhost

- name: Create JSON data structure for VM start
  set_fact:
    vm_start_data:
      action: "start"
      vm_name: "{{ vm_name }}"
      timestamp: "{{ start_timestamp.stdout }}"
      host: "{{ target_host }}"
      status: "{{ 'success' if (start_result is defined and start_result.rc == 0) else 'failed' }}"
      operation_initiated: "{{ 'yes' if start_result is defined else 'no' }}"
      result_message: "{{ start_result.stdout if start_result is defined else 'No output' }}"
      error: "{{ start_result.stderr | default('') if start_result is defined and start_result.rc != 0 else '' }}"

- name: Display start result
  debug:
    msg: "VM {{ vm_name }} {{ 'started successfully' if start_result.rc == 0 else 'failed to start' }}"
  when: start_result is defined

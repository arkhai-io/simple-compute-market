- name: Debug GCS config
  debug:
    var: vm_golden_image_gcs_url
  when: 
    - vm_action == "create" and vm_image_type == "golden"

- name: Debug GCS config
  debug:
    var: vm_golden_image_gcs_path
  when: 
    - vm_action == "create" and vm_image_type == "golden"  

- name: Check if Ubuntu Noble golden image already exists
  stat:
    path: /var/lib/libvirt/images/{{ vm_golden_image_name }}.qcow2
  register: ubuntu_image_exists
  when: 
    - vm_action == "create" and vm_image_type == "golden"
  delegate_to: "{{ target_host }}"

- name: Fail if golden image does not exist and no GCS url and path provided
  fail:
    msg: "Golden image '{{ vm_golden_image_name }}' does not exist on host '{{ target_host }}'. Please upload the golden image or provide GCS details before creating VMs from it."
  when: 
    - vm_action == "create" and vm_image_type == "golden" and not ubuntu_image_exists.stat.exists and (vm_golden_image_gcs_url == "" or vm_golden_image_gcs_path == "")

- name: If golden image does not exist in KVM images, download from GCS
  block:
    - name: Verify GCS Bucket if exists
      shell: gcloud storage ls {{ vm_golden_image_gcs_url }}/{{ vm_golden_image_gcs_path }}
      register: gcs_bucket_check
      failed_when: gcs_bucket_check.rc != 0
    - name: Download golden image from GCS
      shell: |
        gcloud storage cp {{ vm_golden_image_gcs_url }}/{{ vm_golden_image_gcs_path }}/{{ vm_golden_image_name }}.qcow2 /var/lib/libvirt/images/{{ vm_golden_image_name }}.qcow2
  when: 
    - vm_action == "create" and vm_image_type == "golden" and not ubuntu_image_exists.stat.exists

- name: Create VM-specific disk from golden image
  shell: |
    # Create a copy of the golden image for this VM
    cp /var/lib/libvirt/images/{{ vm_golden_image_name }}.qcow2 /var/lib/libvirt/images/{{ vm_name }}.qcow2
    # Resize if needed
    qemu-img resize /var/lib/libvirt/images/{{ vm_name }}.qcow2 {{ vm_disk_size }}
    # Set proper ownership
    chown libvirt-qemu:kvm /var/lib/libvirt/images/{{ vm_name }}.qcow2
  when:
    - vm_action == "create" and vm_image_type == "golden"
  delegate_to: "{{ target_host }}"

# ===== MULTI-GPU SUPPORT FOR GOLDEN IMAGE (WITHOUT RETRY) =====
# When vm_gpu_devices is defined (list of GPUs), use multi-GPU approach without retry
- name: Create VM from golden image with multiple GPUs (no retry)
  include_tasks: gpu-virt-install-multi.yml
  when:
    - vm_action == "create" and vm_image_type == "golden"

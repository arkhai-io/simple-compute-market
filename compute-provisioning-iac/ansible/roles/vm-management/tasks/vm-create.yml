    - (vm_tenant_pubkey is not defined or vm_tenant_pubkey == "")

- name: Create VM cleanup script on target host
  copy:
    dest: "/usr/local/bin/cleanup_vm_{{ vm_name }}.sh"
    mode: '0755'
    content: |
      #!/bin/bash
      set -e
      
      VM_NAME="{{ vm_name }}"
      VM_IMAGE_TYPE="{{ vm_image_type }}"
      TARGET_HOST="{{ target_host }}"
      
      # Accept log file as parameter for informational purposes
      if [ -n "$1" ]; then
        LOG_FILE="$1"
      else
        LOG_DIR="/var/log/vm-cleanup"
        mkdir -p "$LOG_DIR"
        LOG_FILE="$LOG_DIR/${VM_NAME}_cleanup_$(date +%Y%m%d_%H%M%S).log"
      fi
      
      # Function to log with timestamp (caller handles file redirection)
      log() {
        echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] $1"
      }
      
      # Function to log errors (caller handles file redirection)
      log_error() {
        echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] ERROR: $1" >&2
      }
      
      # Function to track step completion (caller handles file redirection)
      track_step() {
        local step_name="$1"
        local status="$2"
        echo "STEP_STATUS|$step_name|$status|$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
      }
      
      log "=== Starting VM Cleanup for $VM_NAME ==="
      log "Log file: $LOG_FILE"
      log "Cleanup started at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
      track_step "cleanup_start" "started"
      
      # Get VM IP before cleanup
      log "=== Getting VM IP for cleanup ==="
      VM_IP=""
      
      # Method 1: Try domifaddr (works if VM is running)
      VM_IP=$(virsh domifaddr $VM_NAME 2>/dev/null | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' | head -1)
      
      # Method 2: If domifaddr fails, get IP from static DHCP lease
      if [ -z "$VM_IP" ]; then
        # Get MAC address first
        VM_MAC=$(virsh domiflist $VM_NAME 2>/dev/null | grep -oE '([0-9a-f]{2}:){5}[0-9a-f]{2}' | head -1)
        if [ -n "$VM_MAC" ]; then
          # Look up IP from static DHCP lease using MAC
          VM_IP=$(virsh net-dumpxml default 2>/dev/null | grep "mac='$VM_MAC'" | grep -oE "ip='[^']+'" | cut -d"'" -f2)
        fi
      fi
      
      log "VM IP: ${VM_IP:-NOT FOUND}"
      
      if [ -z "$VM_IP" ]; then
        log_error "Cannot determine IP address for VM '$VM_NAME'"
        log "Cleanup will continue but may be incomplete"
        track_step "get_vm_ip" "failed"
      else
        track_step "get_vm_ip" "success"
      fi
      
      # Get external port before cleanup
      log "=== Getting external port for cleanup ==="
      EXTERNAL_PORT=""
      if [ -n "$VM_IP" ]; then
        EXTERNAL_PORT=$(iptables -t nat -L PREROUTING -n | grep "to.*$VM_IP:22" | grep -oE 'dpt:[0-9]+' | cut -d: -f2 | head -1)
      fi
      log "External port: ${EXTERNAL_PORT:-NOT FOUND}"
      track_step "get_external_port" "success"
      
      # Remove FRP proxy configuration
      log "=== Removing FRP proxy configuration ==="
      if [ -f /etc/frp/frpc.toml ]; then
        if sed -i "/# BEGIN ANSIBLE MANAGED BLOCK FOR VM $VM_NAME/,/# END ANSIBLE MANAGED BLOCK FOR VM $VM_NAME/d" /etc/frp/frpc.toml 2>/dev/null; then
          log "FRP configuration block removed"
          if systemctl is-active --quiet frpc; then
            if systemctl restart frpc; then
              log "FRP client restarted successfully"
              track_step "remove_frp_config" "success"
            else
              log_error "Failed to restart frpc"
              track_step "remove_frp_config" "partial"
            fi
          else
            track_step "remove_frp_config" "success"
          fi
        else
          log "No FRP configuration found for this VM"
          track_step "remove_frp_config" "skipped"
        fi
      else
        log "FRP configuration file not found"
        track_step "remove_frp_config" "skipped"
      fi
      
      # Clean up iptables port forwarding rules
      log "=== Cleaning up port forwarding rules ==="
      IPTABLES_CLEANUP_COUNT=0
      if [ -n "$VM_IP" ]; then
        log "Removing DNAT rules for VM IP $VM_IP..."
        iptables -t nat -L PREROUTING -n --line-numbers | grep "to:$VM_IP:22" | awk '{print $1}' | sort -nr | while read line; do
          if [ -n "$line" ]; then
            log "Removing DNAT rule line $line"
            iptables -t nat -D PREROUTING $line
            IPTABLES_CLEANUP_COUNT=$((IPTABLES_CLEANUP_COUNT + 1))
          fi
        done
        
        log "Removing POSTROUTING MASQUERADE rules for VM IP $VM_IP..."
        iptables -t nat -L POSTROUTING -n --line-numbers | grep "MASQUERADE.*$VM_IP" | awk '{print $1}' | sort -nr | while read line; do
          if [ -n "$line" ]; then
            log "Removing MASQUERADE rule line $line"
            iptables -t nat -D POSTROUTING $line
            IPTABLES_CLEANUP_COUNT=$((IPTABLES_CLEANUP_COUNT + 1))
          fi
        done
        
        log "Removing FORWARD rules for VM IP $VM_IP..."
        iptables -L FORWARD -n --line-numbers | grep "ACCEPT.*$VM_IP.*dpt:22" | awk '{print $1}' | sort -nr | while read line; do
          if [ -n "$line" ]; then
            log "Removing FORWARD rule (incoming SSH) line $line"
            iptables -D FORWARD $line
            IPTABLES_CLEANUP_COUNT=$((IPTABLES_CLEANUP_COUNT + 1))
          fi
        done
        
        iptables -L FORWARD -n --line-numbers | grep "ACCEPT.*$VM_IP.*spt:22" | awk '{print $1}' | sort -nr | while read line; do
          if [ -n "$line" ]; then
            log "Removing FORWARD rule (outgoing SSH) line $line"
            iptables -D FORWARD $line
            IPTABLES_CLEANUP_COUNT=$((IPTABLES_CLEANUP_COUNT + 1))
          fi
        done
        log "Removed $IPTABLES_CLEANUP_COUNT iptables rules"
        track_step "cleanup_iptables" "success"
      else
        log "No VM IP available, skipping iptables cleanup"
        track_step "cleanup_iptables" "skipped"
      fi
      
      # Check if VM has attached GPU
      log "=== Checking for GPU attachment ==="
      GPU_ATTACHED=$(virsh dumpxml $VM_NAME 2>/dev/null | grep -A 5 "hostdev.*pci" | grep "address.*domain" | sed "s/.*domain='\([^']*\)'.*bus='\([^']*\)'.*slot='\([^']*\)'.*function='\([^']*\)'.*/\1:\2:\3.\4/" || echo "")
      if [ -n "$GPU_ATTACHED" ]; then
        log "GPU detected: $GPU_ATTACHED"
        GPU_MODEL=$(lspci -s ${GPU_ATTACHED#0000:} 2>/dev/null | grep -i "vga\|3d\|display" | cut -d: -f3- || echo "Unknown GPU")
        log "GPU Model: $GPU_MODEL"
        log "GPU will be returned to available pool after VM is undefined"
        track_step "check_gpu" "found"
      else
        log "No GPU attached to this VM"
        track_step "check_gpu" "none"
      fi
      
      # Clean up firewall rules for external ports
      log "=== Cleaning up firewall rules ==="
      FIREWALL_RULES_REMOVED=0
      if [ -n "$EXTERNAL_PORT" ] && [ "$EXTERNAL_PORT" != "22" ]; then
        log "Cleaning up firewall rules for port $EXTERNAL_PORT"
        
        # UFW cleanup
        if command -v ufw >/dev/null 2>&1 && ufw status | grep -q "Status: active"; then
          while ufw status numbered | grep -q "$EXTERNAL_PORT/tcp"; do
            RULE_NUM=$(ufw status numbered | grep "$EXTERNAL_PORT/tcp" | head -1 | grep -oE '^\[ *[0-9]+' | grep -oE '[0-9]+')
            if [ -n "$RULE_NUM" ]; then
              log "Removing UFW rule number $RULE_NUM for port $EXTERNAL_PORT"
              echo y | ufw delete "$RULE_NUM" || break
              FIREWALL_RULES_REMOVED=$((FIREWALL_RULES_REMOVED + 1))
            else
              break
            fi
          done
        fi
        
        # firewalld cleanup
        if command -v firewall-cmd >/dev/null 2>&1 && systemctl is-active --quiet firewalld; then
          if firewall-cmd --permanent --remove-port=$EXTERNAL_PORT/tcp 2>/dev/null; then
            log "Removed firewalld rule for port $EXTERNAL_PORT"
            firewall-cmd --reload 2>/dev/null || true
            FIREWALL_RULES_REMOVED=$((FIREWALL_RULES_REMOVED + 1))
          fi
        fi
        
        # iptables INPUT rules
        iptables -L INPUT -n --line-numbers | grep "dpt:$EXTERNAL_PORT" | awk '{print $1}' | sort -nr | while read line; do
          if [ -n "$line" ]; then
            log "Removing INPUT rule line $line"
            iptables -D INPUT $line
            FIREWALL_RULES_REMOVED=$((FIREWALL_RULES_REMOVED + 1))
          fi
        done
        log "Removed $FIREWALL_RULES_REMOVED firewall rules"
        track_step "cleanup_firewall" "success"
      else
        log "No external port to clean up"
        track_step "cleanup_firewall" "skipped"
      fi
      
      # Save iptables rules
      log "=== Saving iptables rules ==="
      if command -v iptables-save >/dev/null 2>&1; then
        if [ -f /etc/iptables/rules.v4 ]; then
          iptables-save > /etc/iptables/rules.v4
          log "Iptables rules saved to /etc/iptables/rules.v4"
        elif [ -d /etc/sysconfig ]; then
          iptables-save > /etc/sysconfig/iptables
          log "Iptables rules saved to /etc/sysconfig/iptables"
        else
          iptables-save > /etc/iptables.rules
          log "Iptables rules saved to /etc/iptables.rules"
        fi
        track_step "save_iptables" "success"
      else
        log "iptables-save not available"
        track_step "save_iptables" "skipped"
      fi
      
      # Clean up VM-related files
      log "=== Cleaning up VM-related files ==="
      FILES_REMOVED=0
      if [ "$VM_IMAGE_TYPE" == "scratch" ]; then
        for f in ~/.ssh/{{ vm_root_ssh_filename }} ~/.ssh/{{ vm_root_ssh_filename }}.pub; do
          if [ -f "$f" ]; then
            rm -f "$f" && FILES_REMOVED=$((FILES_REMOVED + 1))
          fi
        done
      fi
      for f in ~/.ssh/${VM_NAME}_tenant_ed25519 ~/.ssh/${VM_NAME}_tenant_ed25519.pub; do
        if [ -f "$f" ]; then
          rm -f "$f" && FILES_REMOVED=$((FILES_REMOVED + 1))
        fi
      done
      FILES_REMOVED=$((FILES_REMOVED + $(find /tmp -name "${VM_NAME}_*_ed25519*" -type f -delete -print 2>/dev/null | wc -l)))
      FILES_REMOVED=$((FILES_REMOVED + $(find /tmp -maxdepth 1 -name "cloudinit_${VM_NAME}_*" -type d -exec rm -rf {} + 2>/dev/null -print | wc -l)))
      if [ -f /var/lib/libvirt/images/${VM_NAME}-init.iso ]; then
        rm -f /var/lib/libvirt/images/${VM_NAME}-init.iso && FILES_REMOVED=$((FILES_REMOVED + 1))
      fi
      log "Removed $FILES_REMOVED VM-related files"
      track_step "cleanup_files" "success"
      
      # Get VM MAC address for DHCP lease removal
      log "=== Removing static DHCP lease ==="
      VM_MAC=$(virsh domiflist $VM_NAME 2>/dev/null | grep -oE '([0-9a-f]{2}:){5}[0-9a-f]{2}' | head -1)
      if [ -n "$VM_MAC" ]; then
        if virsh net-dumpxml default | grep -q "$VM_MAC"; then
          if virsh net-update default delete ip-dhcp-host \
            "<host mac='$VM_MAC'/>" \
            --live --config 2>/dev/null; then
            log "Static DHCP lease removed for MAC $VM_MAC"
            track_step "remove_dhcp_lease" "success"
          else
            log_error "DHCP lease removal failed"
            track_step "remove_dhcp_lease" "failed"
          fi
        else
          log "No static DHCP lease found for MAC $VM_MAC"
          track_step "remove_dhcp_lease" "skipped"
        fi
      else
        log "No MAC address found for VM"
        track_step "remove_dhcp_lease" "skipped"
      fi
      
      # Remove VM definition and storage
      log "=== Undefining VM and removing storage ==="
      if virsh undefine $VM_NAME --remove-all-storage --nvram 2>&1; then
        log "VM $VM_NAME undefined and storage removed successfully"
        track_step "undefine_vm" "success"
      else
        log_error "VM undefine completed with warnings or errors"
        track_step "undefine_vm" "partial"
      fi
      
      log "=== VM Cleanup Completed for $VM_NAME ==="
      log "Cleanup finished at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
      track_step "cleanup_end" "completed"
      
      # Generate summary
      log "=== CLEANUP SUMMARY ==="
      log "All cleanup operations completed"
      log "Review STEP_STATUS entries above for detailed results"
      log "Log output location: $LOG_FILE"
      
      # Remove this cleanup script itself
      log "Removing cleanup script: /usr/local/bin/cleanup_vm_${VM_NAME}.sh"
      rm -f /usr/local/bin/cleanup_vm_${VM_NAME}.sh
      
      exit 0
  when: 
    - vm_action == "create" 
    - vm_create_result is defined
  delegate_to: "{{ target_host }}"

- name: Clean up temporary files after VM creation
  shell: |
    echo "=== Cleaning up temporary files after VM creation ==="
    
    # Remove cloud-init directory (avoid removing root /tmp)
    echo "Removing cloud-init directory..."
    rm -rf /tmp/cloudinit_{{ vm_name }}_{{ random_string }}

    # Remove any leftover files from /tmp
    echo "Removing any leftover VM creation files from /tmp..."
    find /tmp -name "*{{ vm_name }}*" -type f 2>/dev/null | while read file; do
      echo "Removing: $file"
      rm -f "$file"
    done
    
    echo "=== Temporary file cleanup completed ==="
  when: 
    - vm_action == "create" 
    - vm_create_result is defined
  delegate_to: "{{ target_host }}"

- name: Add single-tenant VM to inventory
  block:
    - name: Add VM to [kvms] group in hosts file
      lineinfile:
        path: "{{ playbook_dir }}/../../inventory/hosts"
        insertafter: "^\\[kvms\\]"
        line: "{{ vm_name }} ansible_host={{ (frp_subdomain + '.' + frp_domain) if (frp_server_addr is defined) else target_host }} ansible_port={{ frp_remote_port if (frp_server_addr is defined) else external_ssh_port }} ansible_user=root ansible_ssh_private_key_file=~/.ssh/{{ vm_root_ssh_filename }}"
        backup: yes
        create: yes
      delegate_to: localhost
    
    - name: Ensure [kvms] group exists in single-tenant hosts file
      lineinfile:
        path: "{{ playbook_dir }}/../../inventory/hosts"
        line: "[kvms]"
        insertbefore: BOF
        backup: yes
        create: yes
      delegate_to: localhost
  when: 
    - vm_action == "create" 
    - vm_create_result is defined 
    - vm_ip is defined

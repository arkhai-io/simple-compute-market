---
# VM Management - Create Tasks

- name: Generate random string for unique filenames
  set_fact:
    random_string: "{{ lookup('password', '/dev/null chars=ascii_lowercase,digits length=8') }}"
  when: vm_action == "create"

- name: Generate random port for SSH forwarding
  shell: |
    # Generate random port between 10000-65000
    while true; do
      PORT=$(shuf -i 10000-65000 -n 1)
      # Check if port is not in use
      if ! netstat -tuln | grep -q ":$PORT "; then
        echo $PORT
        break
      fi
    done
  register: random_port_result
  when:
    - vm_action == "create"
    - frp_server_addr is not defined
  delegate_to: "{{ target_host }}"

- name: Set external SSH port fact
  set_fact:
    external_ssh_port: "{{ random_port_result.stdout }}"
  when:
    - vm_action == "create"
    - frp_server_addr is not defined

- name: Debug tenant public key parameter
  debug:
    msg:
      - "=== TENANT PUBLIC KEY DEBUG ==="
      - "vm_tenant_pubkey is defined: {{ vm_tenant_pubkey is defined }}"
      - "vm_tenant_pubkey value: '{{ vm_tenant_pubkey | default('NOT PROVIDED') }}'"
      - "vm_tenant_pubkey length: {{ (vm_tenant_pubkey | default('')) | length }}"
      - "Key type detected: {{ vm_tenant_pubkey.split(' ')[0] if (vm_tenant_pubkey is defined and vm_tenant_pubkey != '') else 'N/A' }}"
      - "==============================="
  when: vm_action == "create"

- name: Generate SSH key pair for tenant access (when no tenant public key provided)
  openssh_keypair:
    path: "~/.ssh/{{ vm_name }}_tenant_ed25519"
    type: ed25519
    size: 256
    state: present
    force: yes
  register: ssh_keypair_tenant
  when: 
    - vm_action == "create"
    - (vm_tenant_pubkey is not defined or vm_tenant_pubkey == "")
  delegate_to: "{{ target_host }}"

- name: Generate random password for tenant user
  set_fact:
    tenant_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when: vm_action == "create"

- name: Set tenant user Name
  set_fact:
    tenant_user: "{{ vm_name | regex_replace('[^a-zA-Z0-9]', '') | lower }}"
  when: vm_action == "create"

- name: Declare root SSH Name
  set_fact:
    vm_root_ssh_filename: "{{ vm_name + '_root_ed25519' }}"
  when: vm_action == "create"

# Define as VM creation from scratch
- name: Check if Ubuntu Noble cloud image already exists
  stat:
    path: /var/lib/libvirt/images/noble-server-cloudimg-amd64.img
  register: ubuntu_image_exists
  when: 
    - vm_action == "create" and vm_image_type == "scratch"
  delegate_to: "{{ target_host }}"

- name: Download Ubuntu Noble Server cloud image
  get_url:
    url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
    dest: /tmp/noble-server-cloudimg-amd64.img
    mode: '0644'
  when:
    - vm_action == "create" and vm_image_type == "scratch" and not ubuntu_image_exists.stat.exists
  delegate_to: "{{ target_host }}"

- name: Move Ubuntu cloud image to libvirt directory
  command: mv /tmp/noble-server-cloudimg-amd64.img /var/lib/libvirt/images/
  when:
    - vm_action == "create" and vm_image_type == "scratch" and not ubuntu_image_exists.stat.exists
  delegate_to: "{{ target_host }}"

- name: Set ownership and permissions for Ubuntu cloud image
  file:
    path: /var/lib/libvirt/images/noble-server-cloudimg-amd64.img
    owner: libvirt-qemu
    group: kvm
    mode: '0644'
  when: 
    - vm_action == "create" and vm_image_type == "scratch" and not ubuntu_image_exists.stat.exists
  delegate_to: "{{ target_host }}"

- name: Generate SSH key pair for root access
  openssh_keypair:
    path: "~/.ssh/{{ vm_root_ssh_filename }}"
    type: ed25519
    size: 256
    state: present
    force: yes
  register: ssh_keypair_root
  when:
    - vm_action == "create" and vm_image_type == "scratch"
  delegate_to: "{{ target_host }}"

- name: Generate random password for root user
  set_fact:
    root_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"
  when:
    - vm_action == "create" and vm_image_type == "scratch"

- name: Create cloud-init working directory
  file:
    path: "/tmp/cloudinit_{{ vm_name }}_{{ random_string }}"
    state: directory
    mode: '0755'
  when:
    - vm_action == "create" and vm_image_type == "scratch"
  delegate_to: "{{ target_host }}"

- name: Create VM disk image from cloud image
  shell: qemu-img create -f qcow2 -F qcow2 -b /var/lib/libvirt/images/noble-server-cloudimg-amd64.img /var/lib/libvirt/images/{{ vm_name }}.qcow2 {{ vm_disk_size }}
  when:
    - vm_action == "create" and vm_image_type == "scratch"
  delegate_to: "{{ target_host }}"

- name: Create cloud-init user-data file (basic SSH and networking only)
  copy:
    dest: "/tmp/cloudinit_{{ vm_name }}_{{ random_string }}/user-data"
    content: |
      #cloud-config
      users:
        - name: root
          ssh-authorized-keys:
            - {{ ssh_keypair_root.public_key }}
          sudo: ['ALL=(ALL) NOPASSWD:ALL']
          groups: sudo
          shell: /bin/bash
          lock_passwd: false
      chpasswd:
        list: |
          root:{{ root_password }}
        expire: false
      ssh_pwauth: true
      disable_root: false
  when:
    - vm_action == "create" and vm_image_type == "scratch"
  delegate_to: "{{ target_host }}"

- name: Add network configuration and packages, including GPU drivers, to cloud-init
  blockinfile:
    path: "/tmp/cloudinit_{{ vm_name }}_{{ random_string }}/user-data"
    marker: "      # {mark} ANSIBLE MANAGED BLOCK - NETWORK AND PACKAGES"
    block: |
      
      # Network configuration
      network:
        version: 2
        ethernets:
          enp1s0:
            dhcp4: true
            dhcp6: false
      
      # Essential packages for SSH and monitoring
      package_update: true
      packages:
        - openssh-server
        - curl
        - wget
        - net-tools
        - qemu-guest-agent
        - acpid
        - cloud-guest-utils
      
      # SSH configuration
      write_files:
        - path: /etc/ssh/sshd_config.d/90-cloudinit.conf
          content: |
            PasswordAuthentication yes
            PubkeyAuthentication yes
            PermitRootLogin yes
            ChallengeResponseAuthentication no
            UseDNS no
          owner: root:root
          permissions: '0644'
        - path: /etc/cloud/cloud.cfg.d/99-ssh-ready.cfg
          content: |
            # Signal SSH readiness
            ssh_svcname: ssh
          owner: root:root
          permissions: '0644'
      
      # Commands to run after packages are installed
      runcmd:
        - echo "Starting cloud-init final setup..."
        - systemctl enable ssh || systemctl enable sshd
        - systemctl start ssh || systemctl start sshd
        - systemctl enable qemu-guest-agent
        - systemctl start qemu-guest-agent
        - systemctl enable acpid
        - systemctl start acpid
        - echo "SSH should now be ready"
        - |
          if lspci | grep -qi nvidia; then
            echo "========================================"
            echo "NVIDIA GPU detected - Installing driver for passthrough"
            echo "========================================"
            export DEBIAN_FRONTEND=noninteractive
            
            # Install prerequisites
            echo "Installing kernel headers and build tools..."
            apt-get update
            apt-get install -y --no-install-recommends --quiet \
              build-essential \
              dkms \
              linux-headers-$(uname -r) \
              ubuntu-drivers-common \
              pciutils \
              wget \
              software-properties-common
            
            # Use ubuntu-drivers to auto-install latest recommended driver
            echo "Installing NVIDIA driver (this may take several minutes)..."
            ubuntu-drivers install --gpgpu nvidia 2>&1 | tee /var/log/nvidia-driver-install.log
            
            # Install CUDA Toolkit
            echo "Installing CUDA Toolkit..."
            wget -O- https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb | dpkg -i -
            add-apt-repository -y contrib
            apt-get update
            apt-get install -y --no-install-recommends --quiet cuda-toolkit 2>&1 | tee -a /var/log/cuda-install.log
            
            # Verify installation
            if nvidia-detector 2>/dev/null | head -1 | grep -q "nvidia-driver"; then
              echo "✓ NVIDIA driver detected by nvidia-detector"
              NVIDIA_DETECTED=$(nvidia-detector 2>/dev/null | head -1)
              echo "Detected driver package: $NVIDIA_DETECTED"
            else
              echo "⚠ WARNING: NVIDIA driver not detected by nvidia-detector. Installation may need completion after reboot."
            fi
            
            if command -v nvcc &> /dev/null; then
              echo "✓ CUDA Toolkit installed successfully"
              echo "CUDA version: $(nvcc --version | grep "release" | sed -n -e 's/^.*release \([0-9]\+\.[0-9]\+\).*$/\1/p')"
            else
              echo "⚠ WARNING: CUDA Toolkit not found."
            fi
            
            # Create marker file for post-reboot validation
            echo "$(date): NVIDIA driver and CUDA installed via cloud-init" > /var/log/nvidia-driver-ready
            echo "========================================"
            echo "NVIDIA driver and CUDA installation complete"
            echo "GPU will be fully operational after VM reboot"
            echo "========================================"
            # Set flag to trigger reboot
            touch /var/run/reboot-required-gpu-driver
            
          elif lspci | grep -qi amd; then
            echo "========================================"
            echo "AMD GPU detected - Installing driver"
            echo "========================================"
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y \
              firmware-amd-graphics \
              xserver-xorg-video-amdgpu \
              mesa-vulkan-drivers \
              vulkan-tools \
              pciutils
            echo "✓ AMD driver installation complete"
            echo "========================================"
            # AMD drivers also benefit from reboot
            touch /var/run/reboot-required-gpu-driver
          else
            echo "No NVIDIA or AMD GPU detected, skipping driver installation."
          fi
        - echo "VM setup completed at $(date)" >> /var/log/vm-setup.log
      
      # Reboot if GPU driver was installed (ensures kernel modules load properly)
      power_state:
        delay: now
        mode: reboot
        message: "Rebooting to activate GPU drivers"
        timeout: 300
      
      # Final message
      final_message: "VM {{ vm_name }} cloud-init setup completed successfully"
  when:
    - vm_action == "create" and vm_image_type == "scratch"
  delegate_to: "{{ target_host }}"

- name: Create cloud-init meta-data file
  copy:
    dest: "/tmp/cloudinit_{{ vm_name }}_{{ random_string }}/meta-data"
    content: |
      instance-id: {{ vm_name }}
      local-hostname: {{ vm_name }}
    mode: '0644'
  when:
    - vm_action == "create" and vm_image_type == "scratch"
  delegate_to: "{{ target_host }}"

- name: Install genisoimage package
  package:
    name: genisoimage
    state: present
  when:
    - vm_action == "create" and vm_image_type == "scratch"
  delegate_to: "{{ target_host }}"

- name: Create cloud-init ISO
  shell: genisoimage -output /var/lib/libvirt/images/{{ vm_name }}-init.iso -V cidata -r -J /tmp/cloudinit_{{ vm_name }}_{{ random_string }}/user-data /tmp/cloudinit_{{ vm_name }}_{{ random_string }}/meta-data
  when:
    - vm_action == "create" and vm_image_type == "scratch"
  delegate_to: "{{ target_host }}"

- name: Determine GPU provisioning mode
  set_fact:
    gpu_provision_mode: "{{ 'partitioned' if (vm_gpu_partition_size is defined and vm_gpu_partition_size | length > 0) else 'passthrough' }}"
    gpu_partition_type: "{{ 'mig' if (vm_gpu_partition_size is defined and vm_gpu_partition_size | length > 0 and vm_gpu_partition_size is search('g\\.[0-9]+gb')) else 'sriov' if (vm_gpu_partition_size is defined and vm_gpu_partition_size | length > 0 and vm_gpu_partition_size is search('vf[0-9]+')) else 'none' }}"
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined 
    - vm_gpu_provisioned | bool

- name: Block partitioned GPU creation (not yet implemented)
  fail:
    msg: |
      Partitioned GPU provisioning is not yet implemented.
      Requested: {{ gpu_partition_type | upper }} partition ({{ vm_gpu_partition_size }})
      
      To use full GPU passthrough instead, remove the vm_gpu_partition_size parameter.
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_partition_size is defined
    - vm_gpu_partition_size | length > 0

- name: Load GPU capabilities lockfile if GPU provisioning requested
  slurp:
    src: /etc/libvirt/gpu-capabilities/gpu-lockfile.json
  register: gpu_lockfile_content
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined 
    - vm_gpu_provisioned | bool
  delegate_to: "{{ target_host }}"

- name: Parse GPU lockfile JSON
  set_fact:
    gpu_lockfile: "{{ gpu_lockfile_content.content | b64decode | from_json }}"
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined 
    - vm_gpu_provisioned | bool
    - gpu_lockfile_content is defined
    - gpu_lockfile_content.content is defined
  ignore_errors: yes

- name: Get all GPUs currently attached to VMs
  shell:
    cmd: |
      echo "=== GPU Attachments Across All VMs ==="
      HOST_GPU=$(lspci -D -vmm | awk '/^Class:.*VGA|^Class:.*3D|^Class:.*Display/ {getline; if ($0 ~ /^Slot:/) print $2}' | while read pci; do
        if [ -f "/sys/bus/pci/devices/${pci}/boot_vga" ] && [ "$(cat /sys/bus/pci/devices/${pci}/boot_vga 2>/dev/null)" = "1" ]; then
          echo "$pci"
          break
        fi
      done)
      
      if [ ! -z "$HOST_GPU" ]; then
        echo "Host is using GPU: $HOST_GPU"
        HOST_GPU_MODEL=$(lspci -s ${HOST_GPU#0000:} | grep -i "vga\|3d\|display" | cut -d: -f3-)
        HOST_GPU_DRIVER=$(lspci -nnk -s ${HOST_GPU#0000:} | grep "Kernel driver in use:" | awk '{print $5}' || echo "none")
        echo "Model: $HOST_GPU_MODEL"
        echo "Driver: $HOST_GPU_DRIVER"
      else
        echo "No host GPU detected (headless or no boot_vga)"
        HOST_GPU="NONE"
      fi
      echo ""
      
      # 1. List all VMs with attached GPU PCI IDs (single clean output)
      echo "GPU Attachments Across All VMs:"
      ATTACHED_GPUS_LIST=""
      for vm in $(virsh list --all --name); do
        [ -z "$vm" ] && continue
        GPU_DEVICES=$(virsh dumpxml "$vm" 2>/dev/null | grep -A 5 "hostdev.*pci" | grep "address.*domain" | sed "s/.*domain='\([^']*\)'.*bus='\([^']*\)'.*slot='\([^']*\)'.*function='\([^']*\)'.*/\1:\2:\3:\4/" || echo "")
        if [ -n "$GPU_DEVICES" ]; then
          while read -r pci_addr; do
            [ -z "$pci_addr" ] && continueThen remove all task that contains installation of GPU driver that is not
            normalized_pci=$(echo "$pci_addr" | sed 's/0x//g' | awk -F: '{printf "%04s:%02s:%02s.%s", $1, $2, $3, $4}' | sed 's/ /0/g')
            ATTACHED_GPUS_LIST="$ATTACHED_GPUS_LIST $normalized_pci"
            GPU_MODEL=$(lspci -s ${normalized_pci#0000:} 2>/dev/null | grep -i "vga\|3d\|display" | cut -d: -f3- || echo "Unknown GPU")
            GPU_DRIVER=$(lspci -nnk -s ${normalized_pci#0000:} 2>/dev/null | grep "Kernel driver in use:" | awk '{print $5}' || echo "none")
            echo "VM: $vm"
            echo "  PCI: $normalized_pci - $GPU_MODEL"
            echo "      Driver: $GPU_DRIVER"
          done <<< "$GPU_DEVICES"
        else
          echo "VM: $vm"
          echo "  No GPU attached"
        fi
      done
      ATTACHED_GPUS_LIST=$(echo "$ATTACHED_GPUS_LIST" | xargs)
      echo ""

      # 2. Get LOCKFILE_AVAILABLE list
      {% if gpu_lockfile is defined and gpu_lockfile.gpu_modes.passthrough.available_devices is defined %}
      LOCKFILE_AVAILABLE="{{ gpu_lockfile.gpu_modes.passthrough.available_devices | join(' ') }}"
      {% else %}
      LOCKFILE_AVAILABLE=""
      {% endif %}

      # 3. List all GPUs not attached to any VM (and not host GPU)
      echo "=== Available GPUs (Not Attached and Not Host GPU) ==="
      if [ -z "$LOCKFILE_AVAILABLE" ]; then
        echo "  No available devices in lockfile"
      else
        for gpu_pci in $LOCKFILE_AVAILABLE; do
          [ -z "$gpu_pci" ] && continue
          if [ "$HOST_GPU" != "NONE" ] && [ "$gpu_pci" == "$HOST_GPU" ]; then
            continue
          fi
          if echo " $ATTACHED_GPUS_LIST " | grep -q " $gpu_pci "; then
            continue
          fi
          GPU_MODEL=$(lspci -s ${gpu_pci#0000:} 2>/dev/null | grep -i "vga\|3d\|display" | cut -d: -f3- || echo "Unknown GPU")
          GPU_DRIVER=$(lspci -nnk -s ${gpu_pci#0000:} 2>/dev/null | grep "Kernel driver in use:" | awk '{print $5}' || echo "none")
          echo "  PCI: $gpu_pci - $GPU_MODEL"
          echo "      Driver: $GPU_DRIVER ✓ Ready for passthrough"
        done
      fi
    executable: /bin/bash
  register: all_vm_gpu_attachments
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined 
    - vm_gpu_provisioned | bool
    - gpu_provision_mode is defined
    - gpu_provision_mode == 'passthrough'
  delegate_to: "{{ target_host }}"

- name: Display GPU attachment status across all VMs
  debug:
    var: all_vm_gpu_attachments.stdout_lines
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined 
    - vm_gpu_provisioned | bool
    - gpu_provision_mode is defined
    - gpu_provision_mode == 'passthrough'
    - all_vm_gpu_attachments is defined

- name: Find least-used available GPU (avoid exhausting first GPU)
  shell:
    cmd: |
      set -e
      # Get available devices from parsed lockfile
      {% if gpu_lockfile is not defined or gpu_lockfile.gpu_modes.passthrough.available_devices is not defined %}
      echo "NO_LOCKFILE"
      exit 0
      {% endif %}
      
      HOST_GPU=$(lspci -D -vmm | awk '/^Class:.*VGA|^Class:.*3D|^Class:.*Display/ {getline; if ($0 ~ /^Slot:/) print $2}' | while read pci; do
        if [ -f "/sys/bus/pci/devices/${pci}/boot_vga" ] && [ "$(cat /sys/bus/pci/devices/${pci}/boot_vga 2>/dev/null)" = "1" ]; then
          echo "$pci"
          break
        fi
      done)
      
      if [ -z "$HOST_GPU" ]; then
        HOST_GPU="NONE"
      fi
      
      # Use available devices from parsed lockfile
      LOCKFILE_AVAILABLE='{{ gpu_lockfile.gpu_modes.passthrough.available_devices | join(" ") }}'
      
      # Declare array to collect attached PCI devices
      declare -a ATTACHED_GPUS_ARRAY=()
      
      # Collect attached PCI devices from VMs
      for vm in $(virsh list --all --name); do
        if [ ! -z "$vm" ]; then
          GPU_DEVICES=$(virsh dumpxml "$vm" 2>/dev/null | grep -A 5 "hostdev.*pci" | grep "address.*domain" | sed "s/.*domain='\([^']*\)'.*bus='\([^']*\)'.*slot='\([^']*\)'.*function='\([^']*\)'.*/\1:\2:\3:\4/" || echo "")
          if [ ! -z "$GPU_DEVICES" ]; then
            while read -r pci_addr; do
              if [ ! -z "$pci_addr" ]; then
                # Normalize PCI address (remove 0x prefixes and ensure proper format)
                normalized_pci=$(echo "$pci_addr" | sed 's/0x//g' | awk -F: '{printf "%04s:%02s:%02s.%s", $1, $2, $3, $4}' | sed 's/ /0/g')
                ATTACHED_GPUS_ARRAY+=("$normalized_pci")
              fi
            done < <(echo "$GPU_DEVICES")
          fi
        fi
      done
      
      # Create sorted unique list of attached GPUs
      ATTACHED_GPUS=$(printf '%s\n' "${ATTACHED_GPUS_ARRAY[@]}" | sort -u)
      
      # Filter out attached GPUs from lockfile available devices
      AVAILABLE_UNATTACHED=""
      for gpu_pci in $LOCKFILE_AVAILABLE; do
        if [ -z "$gpu_pci" ]; then
          continue
        fi
        
        # Check if this GPU is attached to any VM
        IS_ATTACHED=0
        for attached in $ATTACHED_GPUS; do
          if [ "$gpu_pci" == "$attached" ]; then
            IS_ATTACHED=1
            break
          fi
        done
        
        if [ $IS_ATTACHED -eq 0 ]; then
          AVAILABLE_UNATTACHED="$AVAILABLE_UNATTACHED $gpu_pci"
        fi
      done
      
      # Use all available unattached GPUs
      FILTERED_GPUS="$AVAILABLE_UNATTACHED"
      
      # Get all GPU attachments with VM counts (using filtered list)
      declare -A GPU_VM_COUNT
      for gpu_pci in $FILTERED_GPUS; do
        if [ -z "$gpu_pci" ]; then
          continue
        fi
        
        if [ "$HOST_GPU" != "NONE" ] && [ "$gpu_pci" == "$HOST_GPU" ]; then
          echo "Skipping host GPU: $gpu_pci" >&2
          continue
        fi
        
        # Count VMs using this GPU
        COUNT=0
        for vm in $(virsh list --all --name); do
          if [ ! -z "$vm" ]; then
            # Get normalized PCI addresses from VM and check if they match our GPU
            VM_GPUS=$(virsh dumpxml "$vm" 2>/dev/null | grep -A 5 "hostdev.*pci" | grep "address.*domain" | sed "s/.*domain='\([^']*\)'.*bus='\([^']*\)'.*slot='\([^']*\)'.*function='\([^']*\)'.*/\1:\2:\3:\4/" | sed 's/0x//g' | awk -F: '{printf "%04s:%02s:%02s.%s\n", $1, $2, $3, $4}' | sed 's/ /0/g')
            if echo "$VM_GPUS" | grep -q "^${gpu_pci}$"; then
              COUNT=$((COUNT + 1))
            fi
          fi
        done
        
        GPU_VM_COUNT[$gpu_pci]=$COUNT
      done
      
      # Check if we have any available GPUs
      GPU_COUNT=0
      for key in "${!GPU_VM_COUNT[@]}"; do
        GPU_COUNT=$((GPU_COUNT + 1))
      done
      
      if [ $GPU_COUNT -eq 0 ]; then
        echo "NO_AVAILABLE_GPU"
        exit 0
      fi
      
      # Find GPU with lowest usage count
      MIN_COUNT=999999
      SELECTED_GPU=""
      for gpu_pci in "${!GPU_VM_COUNT[@]}"; do
        COUNT=${GPU_VM_COUNT[$gpu_pci]}
        if [ $COUNT -lt $MIN_COUNT ]; then
          MIN_COUNT=$COUNT
          SELECTED_GPU=$gpu_pci
        fi
      done
      
      if [ ! -z "$SELECTED_GPU" ]; then
        echo "$SELECTED_GPU"
      else
        echo "NO_AVAILABLE_GPU"
      fi
    executable: /bin/bash
  register: available_gpu_pci
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined 
    - vm_gpu_provisioned | bool
    - gpu_provision_mode is defined
    - gpu_provision_mode == 'passthrough'
    - gpu_lockfile is defined
    - gpu_lockfile.gpu_modes.passthrough.available_devices is defined
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1
  delegate_to: "{{ target_host }}"

- name: Fail if GPU lockfile not found
  fail:
    msg: |
      GPU capabilities lockfile not found on host {{ target_host }}.
      
      The lockfile is required for GPU provisioning and should be at:
      /etc/libvirt/gpu-capabilities/gpu-lockfile.json
      
      To generate the lockfile:
      1. Ensure GPU passthrough is configured (IOMMU, vfio-pci binding)
      2. Run: systemctl start gpu-detect
      3. Verify: cat /etc/libvirt/gpu-capabilities/gpu-lockfile.json
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - gpu_provision_mode is defined
    - gpu_provision_mode == 'passthrough'
    - available_gpu_pci is defined
    - available_gpu_pci.stdout is defined
    - available_gpu_pci.stdout == "NO_LOCKFILE"
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

- name: Fail if no available GPU found
  fail:
    msg: |
      No available GPU found on host {{ target_host }}.
      All GPUs are either:
      - Attached to VMs
      - Used by the host
      - Not bound to vfio-pci driver
      
      {{ all_vm_gpu_attachments.stdout }}
      
      To make a GPU available for passthrough:
      1. Ensure GPU is bound to vfio-pci driver (see GPU passthrough configuration)
      2. Free up a GPU by shutting down a VM, or
      3. Add more GPUs to the host
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - gpu_provision_mode is defined
    - gpu_provision_mode == 'passthrough'
    - available_gpu_pci is defined
    - available_gpu_pci.stdout is defined
    - available_gpu_pci.stdout == "NO_AVAILABLE_GPU"
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

- name: Get total available GPUs for retry calculation (not attached to VMs)
  shell: |
    if [ ! -f /etc/libvirt/gpu-capabilities/gpu-lockfile.json ]; then
      echo "0"
      exit 0
    fi
    
    # Get all GPUs from lockfile
    AVAILABLE_GPUS=$(jq -r '.gpu_modes.passthrough.available_devices[]' /etc/libvirt/gpu-capabilities/gpu-lockfile.json 2>/dev/null)
    
    if [ -z "$AVAILABLE_GPUS" ]; then
      echo "0"
      exit 0
    fi
    
    # Collect all GPUs currently attached to VMs
    declare -a ATTACHED_GPUS_ARRAY=()
    for vm in $(virsh list --all --name); do
      if [ ! -z "$vm" ]; then
        GPU_DEVICES=$(virsh dumpxml "$vm" 2>/dev/null | grep -A 5 "hostdev.*pci" | grep "address.*domain" | sed "s/.*domain='\([^']*\)'.*bus='\([^']*\)'.*slot='\([^']*\)'.*function='\([^']*\)'.*/\1:\2:\3:\4/" || echo "")
        if [ ! -z "$GPU_DEVICES" ]; then
          while read -r pci_addr; do
            if [ ! -z "$pci_addr" ]; then
              normalized_pci=$(echo "$pci_addr" | sed 's/0x//g' | awk -F: '{printf "%04s:%02s:%02s.%s", $1, $2, $3, $4}' | sed 's/ /0/g')
              ATTACHED_GPUS_ARRAY+=("$normalized_pci")
            fi
          done < <(echo "$GPU_DEVICES")
        fi
      fi
    done
    
    # Count GPUs that are in lockfile but NOT attached to any VM
    UNATTACHED_COUNT=0
    for gpu_pci in $AVAILABLE_GPUS; do
      IS_ATTACHED=0
      for attached in "${ATTACHED_GPUS_ARRAY[@]}"; do
        if [ "$gpu_pci" = "$attached" ]; then
          IS_ATTACHED=1
          break
        fi
      done
      if [ $IS_ATTACHED -eq 0 ]; then
        UNATTACHED_COUNT=$((UNATTACHED_COUNT + 1))
      fi
    done
    
    echo "$UNATTACHED_COUNT"
  args:
    executable: /bin/bash
  register: total_available_gpus
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1
  delegate_to: "{{ target_host }}"

- name: Initialize GPU retry variables
  set_fact:
    attempted_gpus: []
    gpu_retry_count: 0
    max_gpu_retries: "{{ total_available_gpus.stdout | default('1') | int }}"
    virt_install_success: false
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

- name: Check GPU mode support using parsed lockfile
  set_fact:
    gpu_mode_supported: "{% if gpu_lockfile is not defined %}NO_LOCKFILE{% elif gpu_provision_mode == 'passthrough' %}{{ 'SUPPORTED' if (gpu_lockfile.gpu_modes.passthrough.supported | default(false)) else 'NOT_SUPPORTED' }}{% elif gpu_provision_mode == 'partitioned' and gpu_partition_type == 'mig' %}{{ 'SUPPORTED' if (gpu_lockfile.gpu_modes.partitioned.nvidia_mig.supported | default(false)) else 'NOT_SUPPORTED' }}{% elif gpu_provision_mode == 'partitioned' and gpu_partition_type == 'sriov' %}{{ 'SUPPORTED' if (gpu_lockfile.gpu_modes.partitioned.sriov.supported | default(false)) else 'NOT_SUPPORTED' }}{% else %}NOT_SUPPORTED{% endif %}"
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool

- name: Validate GPU provisioning request against capabilities
  fail:
    msg: |
      GPU provisioning error: Requested mode '{{ gpu_provision_mode }}' not supported on {{ target_host }}.
      {% if gpu_provision_mode == 'partitioned' %}
      Requested partition: {{ gpu_partition_type }} ({{ vm_gpu_partition_size }})
      {% endif %}
      
      Available capabilities:
      - Passthrough: {{ gpu_lockfile.gpu_modes.passthrough.supported if gpu_lockfile is defined else 'Unknown' }}
      - Partitioned: {{ gpu_lockfile.gpu_modes.partitioned.supported if gpu_lockfile is defined else 'Unknown' }}
      {% if gpu_lockfile is defined and gpu_lockfile.gpu_modes.partitioned.supported %}
        - MIG: {{ gpu_lockfile.gpu_modes.partitioned.nvidia_mig.supported }}
        - SR-IOV: {{ gpu_lockfile.gpu_modes.partitioned.sriov.supported }}
      {% endif %}
      
      
      {% if gpu_provision_mode == 'partitioned' and gpu_partition_type == 'mig' and gpu_lockfile is defined %}
      To enable MIG:
      {% for step in gpu_lockfile.gpu_modes.partitioned.nvidia_mig.setup_required %}
      {{ loop.index }}. {{ step }}
      {% endfor %}
      {% elif gpu_provision_mode == 'partitioned' and gpu_partition_type == 'sriov' and gpu_lockfile is defined %}
      To enable SR-IOV:
      {% for step in gpu_lockfile.gpu_modes.partitioned.sriov.setup_required %}
      {{ loop.index }}. {{ step }}
      {% endfor %}
      {% elif gpu_provision_mode == 'partitioned' and gpu_partition_type == 'none' %}
      Invalid partition format '{{ vm_gpu_partition_size }}'. Use: 1g.5gb, 2g.10gb (MIG) or vf0, vf1 (SR-IOV)
      {% endif %}
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - gpu_mode_supported is defined
    - gpu_mode_supported != "SUPPORTED"

- name: Get GPU PCI address for passthrough
  set_fact:
    gpu_pci_for_passthrough: "{{ available_gpu_pci }}"
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - gpu_provision_mode == 'passthrough'
    - available_gpu_pci is defined
    - available_gpu_pci.stdout is defined
    - available_gpu_pci.stdout != "NO_AVAILABLE_GPU"
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

- name: Find audio device associated with the GPU
  shell: |
    GPU_PCI="{{ gpu_pci_for_passthrough.stdout }}"
    # Extract domain, bus, and slot from GPU PCI address (e.g., 0000:22:00.0 -> domain:0000 bus:22 slot:00)
    GPU_DOMAIN=$(echo "$GPU_PCI" | cut -d':' -f1)
    GPU_BUS=$(echo "$GPU_PCI" | cut -d':' -f2)
    GPU_SLOT=$(echo "$GPU_PCI" | cut -d':' -f3 | cut -d'.' -f1)
    # Find audio device on the same domain:bus:slot but with function 1
    AUDIO_DEVICE=$(lspci -D | grep "^${GPU_DOMAIN}:${GPU_BUS}:${GPU_SLOT}\.1" | grep -i "audio" | awk '{print $1}' | head -1)
    if [ -z "$AUDIO_DEVICE" ]; then
      echo "NO_AUDIO_DEVICE"
    else
      echo "$AUDIO_DEVICE"
    fi
  register: gpu_audio_device
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - gpu_provision_mode == 'passthrough'
    - gpu_pci_for_passthrough is defined
    - gpu_pci_for_passthrough.stdout is defined
    - gpu_pci_for_passthrough.stdout != "NO_AVAILABLE_GPU"
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1
  delegate_to: "{{ target_host }}"

- name: Display GPU and audio device info
  debug:
    msg:
      - "GPU PCI Address: {{ gpu_pci_for_passthrough.stdout }}"
      - "Audio Device PCI Address: {{ gpu_audio_device.stdout if (gpu_audio_device is defined and gpu_audio_device.stdout != 'NO_AUDIO_DEVICE') else 'Not found or not available' }}"
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - gpu_provision_mode == 'passthrough'
    - gpu_pci_for_passthrough is defined
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

- name: Get MIG instance PCI address for partitioned GPU
  shell: |
    nvidia-smi mig -lgi | grep "{{ vm_gpu_partition_size }}" | head -1 | awk '{print $1}' || echo "MIG_INSTANCE_NOT_CREATED"
  register: gpu_mig_instance_addr
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - gpu_provision_mode == 'partitioned'
    - gpu_partition_type == 'mig'
  ignore_errors: yes
  delegate_to: "{{ target_host }}"

- name: Get SR-IOV VF PCI address for partitioned GPU
  shell: |
    VF_NUM=$(echo "{{ vm_gpu_partition_size }}" | sed 's/vf//')
    lspci -D | grep "Virtual Function" | sed -n "$((VF_NUM + 1))p" | awk '{print $1}' || echo "VF_NOT_FOUND"
  register: gpu_sriov_vf_addr
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - gpu_provision_mode == 'partitioned'
    - gpu_partition_type == 'sriov'
  ignore_errors: yes
  delegate_to: "{{ target_host }}"

- name: Set GPU device for VM
  set_fact:
    vm_gpu_device: >-
      {{ gpu_pci_for_passthrough.stdout if (gpu_provision_mode == 'passthrough' and gpu_pci_for_passthrough is defined and gpu_pci_for_passthrough.stdout is defined)
         else gpu_mig_instance_addr.stdout if (gpu_partition_type == 'mig' and gpu_mig_instance_addr is defined and gpu_mig_instance_addr.stdout is defined)
         else gpu_sriov_vf_addr.stdout if (gpu_partition_type == 'sriov' and gpu_sriov_vf_addr is defined and gpu_sriov_vf_addr.stdout is defined)
         else '' }}
    vm_gpu_assigned: true
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

- name: Debug GPU retry configuration
  debug:
    msg:
      - "=== GPU Retry Configuration ==="
      - "Total GPUs in lockfile: {{ gpu_lockfile.gpu_modes.passthrough.available_devices | length if gpu_lockfile is defined else 'N/A' }}"
      - "Currently unattached GPUs: {{ total_available_gpus.stdout | default('0') }}"
      - "Max retry attempts: {{ max_gpu_retries }}"
      - "Initial GPU to try: {{ vm_gpu_device | default('Not yet assigned') }}"
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

- name: Validate GPU device was found
  fail:
    msg: |
      GPU device not found for mode '{{ gpu_provision_mode }}'{% if gpu_provision_mode == 'partitioned' %} ({{ gpu_partition_type }}: {{ vm_gpu_partition_size }}){% endif %}.
      Result: {{ vm_gpu_device }}
      
      {% if gpu_provision_mode == 'partitioned' and gpu_partition_type == 'mig' %}
      Create MIG instances: nvidia-smi mig -cgi <profile_id>
      List instances: nvidia-smi mig -lgi
      {% elif gpu_provision_mode == 'partitioned' and gpu_partition_type == 'sriov' %}
      Enable VFs: echo <NUM_VFS> > /sys/bus/pci/devices/<GPU_PCI>/sriov_numvfs
      {% endif %}
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_device is defined
    - vm_gpu_device == '' or vm_gpu_device is search('NOT_CREATED|NOT_FOUND')
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

- name: Get GPU model information
  shell: |
    PCI_ADDR=$(echo "{{ vm_gpu_device }}" | sed 's/^[0-9]*://g')
    GPU_MODEL=$(lspci -s $PCI_ADDR | grep -oP '(?<=: ).*')
    
    echo "GPU_MODEL=$GPU_MODEL"
    echo "GPU_PCI_ID={{ vm_gpu_device }}"
  register: gpu_info_result
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_device is defined
    - vm_gpu_device != ''
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1
  delegate_to: "{{ target_host }}"

- name: Set GPU information facts
  set_fact:
    gpu_model: "{{ gpu_info_result.stdout_lines | select('match', '^GPU_MODEL=') | first | default('GPU_MODEL=Unknown') | regex_replace('^GPU_MODEL=', '') }}"
    gpu_pci_id: "{{ vm_gpu_device }}"
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_device is defined
    - vm_gpu_device != ''
    - gpu_info_result is defined
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

- name: Display GPU provisioning configuration
  debug:
    msg:
      - "=== GPU Provisioning for VM {{ vm_name }} ==="
      - "Mode: {{ gpu_provision_mode | upper }}"
      - "{% if gpu_provision_mode == 'partitioned' %}Partition Type: {{ gpu_partition_type | upper }}{% endif %}"
      - "{% if gpu_provision_mode == 'partitioned' %}Partition Size: {{ vm_gpu_partition_size }}{% endif %}"
      - "GPU Device PCI Address: {{ vm_gpu_device }}"
      - "GPU Model: {{ gpu_model | default('Unknown') }}"
      - ""
      - "This GPU will be attached to the VM during creation."
  when: 
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_device is defined
    - vm_gpu_device != ''
    - vm_gpu_count is not defined or vm_gpu_count | int <= 1

# ===== AUTO-SELECT GPUS BY COUNT =====
# When vm_gpu_count is defined (number), automatically select that many available GPUs
- name: Auto-select available GPUs by count
  shell: |
    #!/bin/bash
    
    REQUESTED_COUNT={{ vm_gpu_count | default(0) }}
    
    if [ $REQUESTED_COUNT -eq 0 ]; then
      echo "[]"
      exit 0
    fi
    
    # Read GPU lockfile
    if [ ! -f /etc/libvirt/gpu-capabilities/gpu-lockfile.json ]; then
      echo "[]"
      exit 0
    fi
    
    # Get list of available GPUs from lockfile
    AVAILABLE_GPUS=$(jq -r '.gpu_modes.passthrough.available_devices[]' /etc/libvirt/gpu-capabilities/gpu-lockfile.json 2>/dev/null)
    
    if [ -z "$AVAILABLE_GPUS" ]; then
      echo "[]"
      exit 0
    fi
    
    # Collect all GPUs currently attached to VMs
    declare -a ATTACHED_GPUS_ARRAY=()
    for vm in $(virsh list --all --name); do
      if [ ! -z "$vm" ]; then
        GPU_DEVICES=$(virsh dumpxml "$vm" 2>/dev/null | grep -A 5 "hostdev.*pci" | grep "address.*domain" | sed "s/.*domain='\([^']*\)'.*bus='\([^']*\)'.*slot='\([^']*\)'.*function='\([^']*\)'.*/\1:\2:\3:\4/" || echo "")
        if [ ! -z "$GPU_DEVICES" ]; then
          while read -r pci_addr; do
            if [ ! -z "$pci_addr" ]; then
              normalized_pci=$(echo "$pci_addr" | sed 's/0x//g' | awk -F: '{printf "%04s:%02s:%02s.%s\n", $1, $2, $3, $4}' | sed 's/ /0/g')
              ATTACHED_GPUS_ARRAY+=("$normalized_pci")
            fi
          done < <(echo "$GPU_DEVICES")
        fi
      fi
    done
    
    # Create sorted unique list of attached GPUs
    ATTACHED_GPUS=$(printf '%s\n' "${ATTACHED_GPUS_ARRAY[@]}" | sort -u)
    
    # Filter out attached GPUs from lockfile available devices
    AVAILABLE_UNATTACHED=""
    for gpu_pci in $AVAILABLE_GPUS; do
      if [ -z "$gpu_pci" ]; then
        continue
      fi
      
      # Check if this GPU is attached to any VM
      IS_ATTACHED=0
      for attached in $ATTACHED_GPUS; do
        if [ "$gpu_pci" == "$attached" ]; then
          IS_ATTACHED=1
          break
        fi
      done
      
      if [ $IS_ATTACHED -eq 0 ]; then
        AVAILABLE_UNATTACHED="$AVAILABLE_UNATTACHED $gpu_pci"
      fi
    done
    
    # Remove first available GPU from filtered list (reserve it)
    RESERVED_GPU=""
    FILTERED_GPUS=""
    for gpu_pci in $AVAILABLE_UNATTACHED; do
      if [ -z "$gpu_pci" ]; then
        continue
      fi
      if [ -z "$RESERVED_GPU" ]; then
        RESERVED_GPU="$gpu_pci"
      else
        FILTERED_GPUS="$FILTERED_GPUS $gpu_pci"
      fi
    done
    
    # Build associative array of GPU to VM count (using filtered list)
    declare -A GPU_VM_COUNT
    for gpu_pci in $FILTERED_GPUS; do
      if [ -z "$gpu_pci" ]; then
        continue
      fi
      
      # Count VMs using this GPU
      COUNT=0
      for vm in $(virsh list --all --name); do
        if [ ! -z "$vm" ]; then
          VM_GPUS=$(virsh dumpxml "$vm" 2>/dev/null | grep -A 5 "hostdev.*pci" | grep "address.*domain" | sed "s/.*domain='\([^']*\)'.*bus='\([^']*\)'.*slot='\([^']*\)'.*function='\([^']*\)'.*/\1:\2:\3:\4/" | sed 's/0x//g' | awk -F: '{printf "%04s:%02s:%02s.%s\n", $1, $2, $3, $4}' | sed 's/ /0/g')
          if echo "$VM_GPUS" | grep -q "^${gpu_pci}$"; then
            COUNT=$((COUNT + 1))
          fi
        fi
      done
      
      GPU_VM_COUNT[$gpu_pci]=$COUNT
    done
    
    # Sort GPUs by usage count and select requested number
    # Build sorted list of GPUs
    SORTED_GPUS=$(
      for gpu_pci in "${!GPU_VM_COUNT[@]}"; do
        COUNT=${GPU_VM_COUNT[$gpu_pci]}
        echo "$COUNT $gpu_pci"
      done | sort -n | awk '{print $2}'
    )
    
    # Select requested number and build JSON
    SELECTED_COUNT=0
    echo -n "["
    for pci in $SORTED_GPUS; do
      if [ $SELECTED_COUNT -ge $REQUESTED_COUNT ]; then
        break
      fi
      
      # Find audio device for this GPU
      GPU_DOMAIN=$(echo "$pci" | cut -d':' -f1)
      GPU_BUS=$(echo "$pci" | cut -d':' -f2)
      GPU_SLOT=$(echo "$pci" | cut -d':' -f3 | cut -d'.' -f1)
      AUDIO_DEVICE=$(lspci -D | grep "^${GPU_DOMAIN}:${GPU_BUS}:${GPU_SLOT}\.1" | grep -i "audio" | awk '{print $1}' | head -1)
      
      if [ -z "$AUDIO_DEVICE" ]; then
        AUDIO_DEVICE="NO_AUDIO_DEVICE"
      fi
      
      # Output JSON for this GPU
      if [ $SELECTED_COUNT -gt 0 ]; then
        echo -n ","
      fi
      echo -n "{\"pci\":\"$pci\",\"audio\":\"$AUDIO_DEVICE\"}"
      
      SELECTED_COUNT=$((SELECTED_COUNT + 1))
    done
    echo "]"
  args:
    executable: /bin/bash
  register: auto_selected_gpus_json
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_count is defined
    - vm_gpu_count | int > 1
    - vm_gpu_devices is not defined or (vm_gpu_devices | length) <= 1
  delegate_to: "{{ target_host }}"

- name: Parse auto-selected GPUs from JSON
  set_fact:
    vm_gpu_devices: "{{ auto_selected_gpus_json.stdout | from_json }}"
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_count is defined
    - vm_gpu_count | int > 0
    - auto_selected_gpus_json is defined
    - auto_selected_gpus_json.stdout is defined

- name: Validate enough GPUs were found
  fail:
    msg: |
      Requested {{ vm_gpu_count }} GPUs but only {{ vm_gpu_devices | length }} available GPUs were found.
      
      Please check:
      1. GPU availability on the host
      2. GPU lockfile: /etc/libvirt/gpu-capabilities/gpu-lockfile.json
      3. Current GPU allocations: virsh list --all
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_count is defined
    - vm_gpu_count | int > 0
    - vm_gpu_devices is defined
    - (vm_gpu_devices | length) < (vm_gpu_count | int)

- name: Display auto-selected GPUs
  debug:
    msg:
      - "=== Auto-Selected {{ vm_gpu_count }} GPUs ==="
      - "{{ vm_gpu_devices }}"
  when:
    - vm_action == "create"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_count is defined
    - vm_gpu_count | int > 0
    - vm_gpu_devices is defined
    - (vm_gpu_devices | length) > 0

# ===== MULTI-GPU SUPPORT (WITHOUT RETRY) =====
# When vm_gpu_devices has > 1 GPU, use multi-GPU approach without retry
- name: Create VM with multiple GPUs (no retry)
  include_tasks: gpu-virt-install-multi.yml
  when:
    - vm_action == "create" 
    - vm_image_type in ["scratch", "base"]
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_devices is defined
    - vm_gpu_devices | length > 1

# ===== SINGLE GPU SUPPORT (WITH RETRY) =====
# When only vm_gpu_device is defined (single GPU), use retry logic
- name: Create VM with virt-install (with GPU) - Retry Block
  block:
    - name: Try virt-install with current GPU
      shell: |
        virt-install \
          --name {{ vm_name }} \
          --ram {{ vm_ram }} \
          --disk path=/var/lib/libvirt/images/{{ vm_name }}.qcow2,format=qcow2 \
          --disk path=/var/lib/libvirt/images/{{ vm_name }}-init.iso,device=cdrom \
          --vcpus {{ vm_vcpus }} \
          --cpu host-passthrough,cache.mode=passthrough \
          --machine q35 \
          --boot uefi \
          --features smm=on \
          --tpm none \
          --os-variant {{ vm_os_variant }} \
          --network network=default,model=virtio \
          --channel unix,target_type=virtio,name=org.qemu.guest_agent.0 \
          --hostdev {{ vm_gpu_device }}{% if vm_gpu_rom_file is defined and vm_gpu_rom_file != '' %},romfile={{ vm_gpu_rom_file }}{% endif %} \
          {% if gpu_audio_device is defined and gpu_audio_device.stdout is defined and gpu_audio_device.stdout != 'NO_AUDIO_DEVICE' %}--hostdev {{ gpu_audio_device.stdout }} \{% endif %}

          --graphics none \
          --console pty,target_type=serial \
          --import \
          --noautoconsole
      register: vm_create_result
      delegate_to: "{{ target_host }}"

    - name: Mark virt-install as successful
      set_fact:
        virt_install_success: true

  rescue:
    - name: Check if error is GPU-related
      set_fact:
        is_gpu_error: "{{ (vm_create_result.stderr | default('') is search('hostdev|PCI|GPU|vfio|IOMMU')) or (vm_create_result.msg | default('') is search('hostdev|PCI|GPU|vfio|IOMMU')) }}"

    - name: Add failed GPU to attempted list
      set_fact:
        attempted_gpus: "{{ attempted_gpus + [vm_gpu_device] }}"
      when: is_gpu_error | bool

    - name: Increment retry count
      set_fact:
        gpu_retry_count: "{{ gpu_retry_count | int + 1 }}"
      when: is_gpu_error | bool

    - name: Check if we should continue retrying
      set_fact:
        should_retry: "{{ (gpu_retry_count | int) < (max_gpu_retries | int) and (is_gpu_error | bool) }}"

    - name: Get alternative GPU (excluding attempted ones)
      shell: |
        #!/bin/bash
        
        # Read GPU lockfile
        if [ ! -f /etc/libvirt/gpu-capabilities/gpu-lockfile.json ]; then
          echo "NO_LOCKFILE"
          exit 0
        fi
        
        # Get list of available GPUs from lockfile
        AVAILABLE_GPUS=$(jq -r '.gpu_modes.passthrough.available_devices[]' /etc/libvirt/gpu-capabilities/gpu-lockfile.json 2>/dev/null)
        
        if [ -z "$AVAILABLE_GPUS" ]; then
          echo "NO_AVAILABLE_GPU"
          exit 0
        fi
        
        # Build array of attempted GPUs
        declare -a ATTEMPTED_GPUS_ARRAY
        {% if attempted_gpus is defined and attempted_gpus | length > 0 %}
        ATTEMPTED_GPUS_ARRAY=({% for gpu in attempted_gpus %}"{{ gpu }}" {% endfor %})
        {% endif %}
        
        # Build associative array of GPU to VM count, excluding attempted GPUs
        declare -A GPU_VM_COUNT
        for gpu_pci in $AVAILABLE_GPUS; do
          if [ -z "$gpu_pci" ]; then
            continue
          fi
          
          # Skip already attempted GPUs
          IS_ATTEMPTED=0
          for attempted in "${ATTEMPTED_GPUS_ARRAY[@]}"; do
            if [ "$gpu_pci" = "$attempted" ]; then
              IS_ATTEMPTED=1
              break
            fi
          done
          
          if [ $IS_ATTEMPTED -eq 1 ]; then
            continue
          fi
          
          # Count VMs using this GPU
          COUNT=0
          for vm in $(virsh list --all --name); do
            if [ ! -z "$vm" ]; then
              VM_GPUS=$(virsh dumpxml "$vm" 2>/dev/null | grep -A 5 "hostdev.*pci" | grep "address.*domain" | sed "s/.*domain='\([^']*\)'.*bus='\([^']*\)'.*slot='\([^']*\)'.*function='\([^']*\)'.*/\1:\2:\3:\4/" | sed 's/0x//g' | awk -F: '{printf "%04s:%02s:%02s.%s\n", $1, $2, $3, $4}' | sed 's/ /0/g')
              if echo "$VM_GPUS" | grep -q "^${gpu_pci}$"; then
                COUNT=$((COUNT + 1))
              fi
            fi
          done
          
          GPU_VM_COUNT[$gpu_pci]=$COUNT
        done
        
        # Check if we have any available GPUs
        GPU_COUNT=0
        for key in "${!GPU_VM_COUNT[@]}"; do
          GPU_COUNT=$((GPU_COUNT + 1))
        done
        
        if [ $GPU_COUNT -eq 0 ]; then
          echo "NO_AVAILABLE_GPU"
          exit 0
        fi
        
        # Find GPU with lowest usage count
        MIN_COUNT=999999
        SELECTED_GPU=""
        for gpu_pci in "${!GPU_VM_COUNT[@]}"; do
          COUNT=${GPU_VM_COUNT[$gpu_pci]}
          if [ $COUNT -lt $MIN_COUNT ]; then
            MIN_COUNT=$COUNT
            SELECTED_GPU=$gpu_pci
          fi
        done
        
        if [ ! -z "$SELECTED_GPU" ]; then
          echo "$SELECTED_GPU"
        else
          echo "NO_AVAILABLE_GPU"
        fi
      args:
        executable: /bin/bash
      register: alternative_gpu_pci
      when: should_retry | bool
      delegate_to: "{{ target_host }}"

    - name: Find audio device for alternative GPU
      shell: |
        GPU_PCI="{{ alternative_gpu_pci.stdout }}"
        GPU_DOMAIN=$(echo "$GPU_PCI" | cut -d':' -f1)
        GPU_BUS=$(echo "$GPU_PCI" | cut -d':' -f2)
        GPU_SLOT=$(echo "$GPU_PCI" | cut -d':' -f3 | cut -d'.' -f1)
        AUDIO_DEVICE=$(lspci -D | grep "^${GPU_DOMAIN}:${GPU_BUS}:${GPU_SLOT}\.1" | grep -i "audio" | awk '{print $1}' | head -1)
        if [ -z "$AUDIO_DEVICE" ]; then
          echo "NO_AUDIO_DEVICE"
        else
          echo "$AUDIO_DEVICE"
        fi
      register: alternative_gpu_audio
      when:
        - should_retry | bool
        - alternative_gpu_pci is defined
        - alternative_gpu_pci.stdout is defined
        - alternative_gpu_pci.stdout != "NO_AVAILABLE_GPU"
      delegate_to: "{{ target_host }}"

    - name: Update GPU device variables for retry
      set_fact:
        vm_gpu_device: "{{ alternative_gpu_pci.stdout }}"
        gpu_audio_device: "{{ alternative_gpu_audio }}"
      when:
        - should_retry | bool
        - alternative_gpu_pci is defined
        - alternative_gpu_pci.stdout is defined
        - alternative_gpu_pci.stdout != "NO_AVAILABLE_GPU"

    - name: Display retry information
      debug:
        msg:
          - "=== GPU Retry Attempt {{ gpu_retry_count }}/{{ max_gpu_retries }} ==="
          - "Previous GPU failed: {{ attempted_gpus[-1] if attempted_gpus | length > 0 else 'N/A' }}"
          - "Trying alternative GPU: {{ vm_gpu_device }}"
          - "Alternative Audio Device: {{ alternative_gpu_audio.stdout if (alternative_gpu_audio is defined and alternative_gpu_audio.stdout is defined) else 'N/A' }}"
      when:
        - should_retry | bool
        - alternative_gpu_pci is defined
        - alternative_gpu_pci.stdout is defined
        - alternative_gpu_pci.stdout != "NO_AVAILABLE_GPU"

    - name: Recursively retry with next GPU
      include_tasks: gpu-virt-install-retry.yml
      when:
        - should_retry | bool
        - alternative_gpu_pci is defined
        - alternative_gpu_pci.stdout is defined
        - alternative_gpu_pci.stdout != "NO_AVAILABLE_GPU"

    - name: Fail if no alternative GPU available or max retries reached
      fail:
        msg: |
          Failed to create VM with GPU after {{ gpu_retry_count }} attempts.
          {% if alternative_gpu_pci.stdout == 'NO_AVAILABLE_GPU' or not should_retry | bool %}
          All available GPUs have been exhausted.
          {% endif %}
          
          Attempted GPUs: {{ attempted_gpus | join(', ') }}
          
          Last error: {{ vm_create_result.stderr | default('Unknown error') }}
          
          Please check:
          1. GPU hardware status
          2. VFIO-PCI driver binding
          3. IOMMU configuration
          4. PCI device availability
      when:
        - not (virt_install_success | default(false) | bool)
        - alternative_gpu_pci.stdout == "NO_AVAILABLE_GPU" or not should_retry | bool

  when:
    - vm_action == "create" and vm_image_type == "scratch"
    - vm_gpu_provisioned is defined and vm_gpu_provisioned | bool
    - vm_gpu_device is defined and vm_gpu_device != ''
    - vm_gpu_devices is not defined or (vm_gpu_devices | length) <= 1

- name: Create VM with virt-install (without GPU)
  shell: |
    virt-install \
      --name {{ vm_name }} \
      --ram {{ vm_ram }} \
      --disk path=/var/lib/libvirt/images/{{ vm_name }}.qcow2,format=qcow2 \
      --disk path=/var/lib/libvirt/images/{{ vm_name }}-init.iso,device=cdrom \
      --vcpus {{ vm_vcpus }} \
      --os-variant {{ vm_os_variant }} \
      --network network=default,model=virtio \
      --channel unix,target_type=virtio,name=org.qemu.guest_agent.0 \
      --graphics none \
      --console pty,target_type=serial \
      --import \
      --noautoconsole
  register: vm_create_result
  when:
    - vm_action == "create" and vm_image_type == "scratch"
    - vm_gpu_provisioned is not defined or not (vm_gpu_provisioned | bool)
  delegate_to: "{{ target_host }}"


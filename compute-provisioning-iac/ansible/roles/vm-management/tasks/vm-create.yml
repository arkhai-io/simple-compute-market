  set_fact:
    vm_golden_image_root_ssh_name: "{{ vm_image_root_fname }}"
  when: vm_action == "create" and vm_image_type == "golden"

- name: Copy golden image root SSH to create a new one
  block:
    - name: Copy golden image root SSH
      copy:
        src: "~/.ssh/{{ vm_golden_image_root_ssh_name }}"
        dest: "~/.ssh/{{ vm_root_ssh_filename }}"
        remote_src: yes
        mode: '0600'
    - name: Copy golden image root SSH pub key
      copy:
        src: "~/.ssh/{{ vm_golden_image_root_ssh_name }}.pub"
        dest: "~/.ssh/{{ vm_root_ssh_filename }}.pub"
        remote_src: yes

# Overlay for live KVM provisioning. Layered on top of compose/seller.yml:
#
#   docker compose -f compose/seller.yml -f compose/seller.live.yml up -d
#
# Adds the SSH-key bind-mount on seller-provisioning. The pubkey must be
# authorized on the KVM host(s) you list under [kvm_hosts] in the ansible
# inventory baked into the image.
#
# Environment override:
#   SELLER_SSH_PRIVKEY       — path to KVM-host SSH privkey (default: ./keys/id_ed25519)

services:
  seller-provisioning:
    volumes:
      - ${SELLER_SSH_PRIVKEY:-./keys/id_ed25519}:/home/appuser/.ssh/id_ed25519:ro

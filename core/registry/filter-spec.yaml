# Registry filter spec — advertises the listing JSON Schema and the
# filter vocabulary the registry honours at /listings query time.
# Served verbatim at GET /filter-spec.  Buyers cache by URL+etag and
# pass `If-Match: <etag>` on every query so a spec rotation is a
# 412 instead of a silent semantic shift.
#
# Bump `version` on backwards-incompatible changes.  Add filters
# without bumping (etag changes; clients re-fetch).
#
# `schema.id` is the registry's stable schema identity — the name a
# buyer schema plugin declares compatibility with
# (BuyerSchemaPlugin.schema_id). With several registries configured,
# the buyer offers each plugin only registries whose declared id
# matches; registries without the header match any plugin
# (pre-identity deployments).

version: 4

schema:
  id: vms.compute
  version: 1

listing_shape:
  $schema: "https://json-schema.org/draft/2020-12/schema"
  type: object
  additionalProperties: true
  # v4: the publisher's storefront URL is `storefront_url` (was `seller`),
  # matching the GET /publishers entity. gpu_model is gated to a vetted
  # NVIDIA vocabulary; region stays open because city/datacenter naming
  # has no canonical list.
  required: [listing_id, offer_resource, accepted_escrows, storefront_url]
  properties:
    listing_id: {type: string, minLength: 1}
    storefront_url: {type: string, minLength: 1}
    offer_resource:
      type: object
      required: [gpu_model, region]
      additionalProperties: true
      properties:
        gpu_model:
          type: string
          # Common NVIDIA models. Marketplace operators fork this list
          # per indexer — a long-tail indexer can drop the enum entirely;
          # a curated indexer can shrink it.
          enum:
            # Datacenter — Blackwell
            - B200
            - B100
            # Datacenter — Hopper
            - H200
            - H100
            # Datacenter — Ampere
            - A100
            - A40
            - A10
            # Datacenter — Ada Lovelace
            - L40S
            - L40
            - L4
            # Datacenter — Turing/Volta
            - V100
            - T4
            # Workstation — Ada Lovelace
            - RTX 6000 Ada
            - RTX 5000 Ada
            - RTX 4500 Ada
            - RTX 4000 Ada
            # Workstation — Ampere
            - RTX A6000
            - RTX A5500
            - RTX A5000
            - RTX A4500
            - RTX A4000
            # Consumer — Blackwell
            - RTX 5090
            - RTX 5080
            - RTX 5070 Ti
            - RTX 5070
            # Consumer — Ada Lovelace
            - RTX 4090
            - RTX 4080 Super
            - RTX 4080
            - RTX 4070 Ti Super
            - RTX 4070 Ti
            - RTX 4070 Super
            - RTX 4070
            # Consumer — Ampere
            - RTX 3090 Ti
            - RTX 3090
            - RTX 3080 Ti
            - RTX 3080
            - RTX 3070 Ti
            - RTX 3070
        region: {type: string}
        sla: {type: number}
        cpu_type: {type: string}
        host_disk_type: {type: string}
        motherboard: {type: string}
        gpu_interconnect:
          type: string
          enum: [nvlink, nvswitch, pcie_only, infiniband]
        virtualization_type:
          type: string
          enum: [bare_metal, vm, container]
        static_ip: {type: boolean}
        datacenter_grade: {type: boolean}
        gpu_count: {type: integer, minimum: 0}
        vcpu_count: {type: integer, minimum: 0}
        ram_gb: {type: integer, minimum: 0}
        disk_gb: {type: integer, minimum: 0}
        host_cpu_cores: {type: integer, minimum: 0}
        host_ram_gb: {type: integer, minimum: 0}
        host_disk_gb: {type: integer, minimum: 0}
        total_gpu_count: {type: integer, minimum: 0}
        nic_speed_gbps: {type: integer, minimum: 0}
        internet_download_mbps: {type: integer, minimum: 0}
        internet_upload_mbps: {type: integer, minimum: 0}
        open_ports_count: {type: integer, minimum: 0}
    accepted_escrows:
      type: array
      minItems: 1
      items:
        type: object
        required: [chain_name, escrow_address, literal_fields]
        additionalProperties: true
        properties:
          chain_name: {type: string, minLength: 1}
          escrow_address: {type: string, minLength: 1}
          literal_fields:
            type: object
            additionalProperties: true
            properties:
              token: {type: string}
          rates:
            type: array
            items:
              type: object
              additionalProperties: true
              properties:
                field: {type: string}
                per: {type: string}
                value: {type: string}
    max_duration_seconds:
      type: [integer, "null"]
      minimum: 1
    oracle_address:
      type: [string, "null"]

filters:
  # Equality filters — offer_resource axes.  `op: in` covers eq via `in: [x]`.
  - {name: region,              path: $.offer_resource.region,              op: in, value_type: string,  on_missing: fail}
  - {name: gpu_model,           path: $.offer_resource.gpu_model,           op: in, value_type: string,  on_missing: fail}
  - {name: sla,                 path: $.offer_resource.sla,                 op: in, value_type: number,  on_missing: fail}
  - {name: cpu_type,            path: $.offer_resource.cpu_type,            op: in, value_type: string,  on_missing: fail}
  - {name: host_disk_type,      path: $.offer_resource.host_disk_type,      op: in, value_type: string,  on_missing: fail}
  - {name: motherboard,         path: $.offer_resource.motherboard,         op: in, value_type: string,  on_missing: fail}
  - {name: gpu_interconnect,    path: $.offer_resource.gpu_interconnect,    op: in, value_type: string,  on_missing: fail}
  - {name: virtualization_type, path: $.offer_resource.virtualization_type, op: in, value_type: string,  on_missing: fail}
  - {name: static_ip,           path: $.offer_resource.static_ip,           op: in, value_type: boolean, on_missing: fail}
  - {name: datacenter_grade,    path: $.offer_resource.datacenter_grade,    op: in, value_type: boolean, on_missing: fail}

  # Numeric ">=" filters — sugared via alias_kind so `?ram_gb_min=16` parses
  # to `range: {min: 16, min_inclusive: true}`.  Offers missing the field
  # are rejected (`on_missing: fail`); an unknown spec can't be assumed
  # to satisfy a stated requirement.
  - {name: gpu_count_min,              path: $.offer_resource.gpu_count,              op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: vcpu_count_min,             path: $.offer_resource.vcpu_count,             op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: ram_gb_min,                 path: $.offer_resource.ram_gb,                 op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: disk_gb_min,                path: $.offer_resource.disk_gb,                op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: host_cpu_cores_min,         path: $.offer_resource.host_cpu_cores,         op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: host_ram_gb_min,            path: $.offer_resource.host_ram_gb,            op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: host_disk_gb_min,           path: $.offer_resource.host_disk_gb,           op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: total_gpu_count_min,        path: $.offer_resource.total_gpu_count,        op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: nic_speed_gbps_min,         path: $.offer_resource.nic_speed_gbps,         op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: internet_download_mbps_min, path: $.offer_resource.internet_download_mbps, op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: internet_upload_mbps_min,   path: $.offer_resource.internet_upload_mbps,   op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}
  - {name: open_ports_count_min,       path: $.offer_resource.open_ports_count,       op: range, value_type: integer, alias_kind: lower_bound, on_missing: fail}

  # Payment-token filter: array projection over accepted_escrows[*].literal_fields.token.
  # `on_missing: pass` is underreport-friendly — a seller advertising no
  # tokens shouldn't be invisible to a query asking for any specific token.
  # Buyers that want strict matching pass `?strict.token=true` per-query.
  - {name: token,                      path: "$.accepted_escrows[*].literal_fields.token",    op: in,     value_type: string,  on_missing: pass}

  # Exclude-tokens filter: array projection, ``not_in`` semantics.
  # ``?token_exclude=not_in:[0x...]`` rejects listings that accept any of
  # the listed token addresses. `on_missing: pass` is again underreport-
  # friendly — a seller with no escrows has no conflict to assert.
  - {name: token_exclude,              path: "$.accepted_escrows[*].literal_fields.token",    op: not_in, value_type: string,  on_missing: pass}

  # Oracle-presence filter: ``?has_oracle=exists:true`` matches listings
  # with a non-null oracle_address. Pure presence check — value of the
  # field is irrelevant.
  - {name: has_oracle,                 path: $.oracle_address,                        op: exists, value_type: boolean, on_missing: fail}
